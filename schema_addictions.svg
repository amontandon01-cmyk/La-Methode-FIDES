<svg viewBox="0 0 1400 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cycle de l’addiction</title>
  <desc id="desc">Schéma simple et aéré du cycle addictif avec transfert d’addiction.</desc>

  <defs>
    <style>
      .bg { fill: rgb(235, 229, 216); }
      .card { fill: rgba(255,255,255,0.98); stroke: rgba(190,43,86,0.16); stroke-width: 2.2; }
      .soft { fill: rgba(190,43,86,0.08); stroke: rgba(190,43,86,0.12); stroke-width: 2; }
      .pill { fill: rgb(190, 43, 86); }
      .line { stroke: rgb(190, 43, 86); stroke-width: 3; fill: none; }
      .lineDash { stroke: rgb(190, 43, 86); stroke-width: 2.6; fill: none; stroke-dasharray: 8 8; }
      .title { font: 700 34px 'Inter', 'Segoe UI', sans-serif; fill: rgb(96, 38, 55); }
      .subtitle { font: 600 18px 'Inter', 'Segoe UI', sans-serif; fill: rgb(131, 77, 93); }
      .h { font: 700 22px 'Inter', 'Segoe UI', sans-serif; fill: rgb(123, 43, 69); }
      .p { font: 500 17px 'Inter', 'Segoe UI', sans-serif; fill: rgb(86, 70, 77); }
      .pSmall { font: 500 15px 'Inter', 'Segoe UI', sans-serif; fill: rgb(96, 80, 86); }
      .num { font: 700 16px 'Inter', 'Segoe UI', sans-serif; fill: white; dominant-baseline: middle; text-anchor: middle; }
      .centerTitle { font: 700 28px 'Inter', 'Segoe UI', sans-serif; fill: rgb(123, 43, 69); text-anchor: middle; }
      .centerText { font: 500 17px 'Inter', 'Segoe UI', sans-serif; fill: rgb(96, 80, 86); text-anchor: middle; }
    </style>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(111,66,83,0.12)"></feDropShadow>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="rgb(190, 43, 86)"></path>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="980" rx="28"></rect>

  <text x="700" y="60" class="title" text-anchor="middle">Cycle de l’addiction</text>
  <text x="700" y="90" class="subtitle" text-anchor="middle">Une tentative de soulagement qui se répète sans apaiser la blessure de fond</text>

  <!-- centre -->
  <circle cx="700" cy="380" r="108" class="soft" filter="url(#shadow)"></circle>
  <text x="700" y="364" class="centerTitle">Cycle addictif</text>
  <text x="700" y="394" class="centerText">Le refuge soulage</text>
  <text x="700" y="419" class="centerText">sans guérir la racine</text>

  <!-- 1 -->
  <rect x="550" y="140" width="300" height="104" rx="26" class="card" filter="url(#shadow)"></rect>
  <circle cx="580" cy="118" r="19" class="pill"></circle>
  <text x="580" y="121" class="num">1</text>
  <text x="700" y="180" class="h" text-anchor="middle">Déclencheur</text>
  <text x="700" y="208" class="p" text-anchor="middle">Stress, vide, frustration, insécurité</text>

  <!-- 2 -->
  <rect x="150" y="250" width="340" height="104" rx="26" class="card" filter="url(#shadow)"></rect>
  <circle cx="180" cy="228" r="19" class="pill"></circle>
  <text x="180" y="231" class="num">2</text>
  <text x="320" y="290" class="h" text-anchor="middle">Émotions inconfortables</text>
  <text x="320" y="318" class="p" text-anchor="middle">Peur, tristesse, colère, honte</text>

  <!-- 3 -->
  <rect x="150" y="470" width="340" height="104" rx="26" class="card" filter="url(#shadow)"></rect>
  <circle cx="180" cy="448" r="19" class="pill"></circle>
  <text x="180" y="451" class="num">3</text>
  <text x="320" y="510" class="h" text-anchor="middle">Tension intérieure</text>
  <text x="320" y="538" class="p" text-anchor="middle">Quelque chose devient difficile</text>
  <text x="320" y="562" class="p" text-anchor="middle">à porter ou à traverser</text>

  <!-- 4 -->
  <rect x="550" y="590" width="300" height="104" rx="26" class="card" filter="url(#shadow)"></rect>
  <circle cx="580" cy="568" r="19" class="pill"></circle>
  <text x="580" y="571" class="num">4</text>
  <text x="700" y="628" class="h" text-anchor="middle">Refuge</text>
  <text x="700" y="654" class="p" text-anchor="middle">Substance, écrans, sport, travail,</text>
  <text x="700" y="678" class="p" text-anchor="middle">achats, famille, sucre</text>

  <!-- 5 -->
  <rect x="910" y="470" width="340" height="104" rx="26" class="card" filter="url(#shadow)"></rect>
  <circle cx="940" cy="448" r="19" class="pill"></circle>
  <text x="940" y="451" class="num">5</text>
  <text x="1080" y="510" class="h" text-anchor="middle">Soulagement immédiat</text>
  <text x="1080" y="538" class="p" text-anchor="middle">Apaisement, coupure, remplissage</text>

  <!-- 6 -->
  <rect x="910" y="250" width="340" height="104" rx="26" class="card" filter="url(#shadow)"></rect>
  <circle cx="940" cy="228" r="19" class="pill"></circle>
  <text x="940" y="231" class="num">6</text>
  <text x="1080" y="290" class="h" text-anchor="middle">Retombée</text>
  <text x="1080" y="316" class="p" text-anchor="middle">Vide, honte, culpabilité</text>
  <text x="1080" y="340" class="p" text-anchor="middle">ou envie de recommencer</text>

  <!-- arrows straight -->
  <path d="M550 192 L510 192 L510 302 L490 302" class="line" marker-end="url(#arrow)"></path>
  <path d="M320 354 L320 470" class="line" marker-end="url(#arrow)"></path>
  <path d="M490 522 L520 522 L520 642 L550 642" class="line" marker-end="url(#arrow)"></path>
  <path d="M850 642 L880 642 L880 522 L910 522" class="line" marker-end="url(#arrow)"></path>
  <path d="M1080 470 L1080 354" class="line" marker-end="url(#arrow)"></path>
  <path d="M910 302 L890 302 L890 192 L850 192" class="line" marker-end="url(#arrow)"></path>

  <!-- question -->
  <rect x="365" y="748" width="670" height="54" rx="27" class="pill"></rect>
  <text x="700" y="782" class="p" text-anchor="middle" style="fill:white; font-weight:700;">Question clé : qu’est-ce que ce refuge m’aide à ne pas ressentir ?</text>

  <!-- transfer -->
  <rect x="110" y="812" width="1180" height="122" rx="28" class="soft" filter="url(#shadow)"></rect>

  <rect x="440" y="822" width="190" height="42" rx="21" class="card"></rect>
  <text x="535" y="849" class="pSmall" text-anchor="middle" style="font-weight:700; fill:rgb(123,43,69);">J’arrête un refuge</text>

  <path d="M630 843 L730 843" class="lineDash" marker-end="url(#arrow)"></path>

  <rect x="730" y="822" width="230" height="42" rx="21" class="card"></rect>
  <text x="845" y="849" class="pSmall" text-anchor="middle" style="font-weight:700; fill:rgb(123,43,69);">La tension reste active</text>

  <path d="M960 843 L1060 843" class="lineDash" marker-end="url(#arrow)"></path>

  <rect x="1060" y="822" width="160" height="42" rx="21" class="card"></rect>
  <text x="1140" y="849" class="pSmall" text-anchor="middle" style="font-weight:700; fill:rgb(123,43,69);">Autre refuge</text>

  <text x="150" y="892" class="h">Transfert d’addiction</text>
  <text x="150" y="920" class="p">Le comportement visible change, mais le mécanisme peut rester le même.</text>
</svg>