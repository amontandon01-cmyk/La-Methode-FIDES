<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" style="width:100%; height:auto; display:block;">
  <title id="title">Schéma pédagogique de la culpabilité</title>
  <desc id="desc">La culpabilité se met en lumière quand la protection cède, que la croyance remonte et que le deuil commence. Elle peut se manifester dans le triangle de Karpman et s’ouvrir vers une responsabilité plus juste.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#cf97a8"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="660" rx="28" fill="#f7f1e8"/>

  <text x="600" y="72" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#7e1f3a">
    La culpabilité
  </text>
  <text x="600" y="102" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#7b6662">
    Quand la protection cède, la culpabilité se met en lumière
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="250" height="88" rx="20" fill="#fffaf4" stroke="#ddc6bf" stroke-width="2"/>
    <rect x="70" y="286" width="250" height="88" rx="20" fill="#fffaf4" stroke="#ddc6bf" stroke-width="2"/>
    <rect x="70" y="402" width="250" height="88" rx="20" fill="#fffaf4" stroke="#ddc6bf" stroke-width="2"/>
  </g>

  <text x="195" y="205" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#2d2320">
    La protection cède
  </text>
  <text x="195" y="230" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#6f5d58">
    déni, fuite, justification
  </text>

  <text x="195" y="321" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#2d2320">
    La croyance remonte
  </text>
  <text x="195" y="346" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#6f5d58">
    « j’aurais dû », « je n’aurais pas dû »
  </text>

  <text x="195" y="437" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#2d2320">
    Le deuil commence
  </text>
  <text x="195" y="462" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#6f5d58">
    la réalité devient visible
  </text>

  <g filter="url(#shadow)">
    <circle cx="525" cy="330" r="120" fill="#be2b56"/>
  </g>

  <text x="525" y="320" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#ffffff">
    Culpabilité
  </text>
  <text x="525" y="354" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#f8e4ea">
    mise en lumière
  </text>

  <path d="M320 214 C390 214, 420 250, 450 285" fill="none" stroke="#cf97a8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M400 330 C410 330, 390 330, 328 330" fill="none" stroke="#cf97a8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M320 446 C390 446, 420 410, 450 375" fill="none" stroke="#cf97a8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M645 330 C700 330, 730 330, 760 330" fill="none" stroke="#cf97a8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M525 450 C525 500, 525 525, 525 548" fill="none" stroke="#cf97a8" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="780" y="150" width="340" height="340" rx="24" fill="#fffaf4" stroke="#ddc6bf" stroke-width="2"/>
    <rect x="810" y="212" width="280" height="72" rx="16" fill="#f5dbe3" stroke="#be2b56" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="810" y="300" width="280" height="72" rx="16" fill="#f5dbe3" stroke="#be2b56" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="810" y="388" width="280" height="78" rx="16" fill="#f5dbe3" stroke="#be2b56" stroke-opacity="0.28" stroke-width="2"/>
  </g>

  <text x="950" y="188" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#7e1f3a">
    Triangle de Karpman
  </text>

  <text x="950" y="240" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#7e1f3a">
    Victime
  </text>
  <text x="950" y="264" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#6a5661">
    je porte la faute
  </text>

  <text x="950" y="328" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#7e1f3a">
    Sauveur-réparateur
  </text>
  <text x="950" y="352" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#6a5661">
    je dois réparer pour être en paix
  </text>

  <text x="950" y="414" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#7e1f3a">
    Persécuteur
  </text>
  <text x="950" y="438" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#6a5661">
    je rejette la faute sur l’autre
  </text>

  <g filter="url(#shadow)">
    <rect x="355" y="570" width="340" height="78" rx="24" fill="#f5dbe3" stroke="#be2b56" stroke-opacity="0.30" stroke-width="2"/>
  </g>

  <text x="525" y="603" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#7e1f3a">
    Responsabilité plus juste
  </text>
  <text x="525" y="628" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#7e1f3a">
    tri, conscience, réparation, relâchement
  </text>
</svg>
