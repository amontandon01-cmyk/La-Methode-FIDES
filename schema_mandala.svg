<svg viewBox="0 0 1000 760" xmlns="http://www.w3.org/2000/svg">

<style>
.bg{fill:#EBE5D8}
.panel{fill:#ffffff;opacity:.84}

.geo{fill:none;stroke:#BE2B56;stroke-opacity:.08;stroke-width:1.5}
.ring{fill:none;stroke:#BE2B56;stroke-opacity:.16;stroke-width:1.8}

.axis{stroke:#BE2B56;stroke-opacity:.14;stroke-width:1.6}
.axisReturn{stroke:#BE2B56;stroke-opacity:.14;stroke-width:1.5;stroke-dasharray:4 6;fill:none}

.centerCircle{fill:#fff;stroke:#BE2B56;stroke-opacity:.25;stroke-width:2}

.vuln{fill:#F7E8EC;stroke:#BE2B56;stroke-opacity:.22}
.wound{fill:#fff;stroke:#BE2B56;stroke-opacity:.18}
.protect{fill:#fff;stroke:#BE2B56;stroke-opacity:.12}

.baseNode{fill:#fff;stroke:#BE2B56;stroke-opacity:.14;stroke-width:1}

.title{font:700 28px Georgia;fill:#BE2B56}
.subtitle{font:600 13px Arial;fill:#444}

.center{font:700 28px Georgia;fill:#BE2B56}
.centerSub{font:600 12px Arial;fill:#555}

.label{font:700 15px Georgia;fill:#BE2B56}
.small{font:600 12px Arial;fill:#333}
.tiny{font:500 11px Arial;fill:#555}

.outer{font:600 11px Arial;fill:#BE2B56}
.footer{font:600 12px Arial;fill:#444}
</style>

<!-- fond -->
<rect width="1000" height="760" class="bg"></rect>
<rect x="40" y="28" width="920" height="704" rx="30" class="panel"></rect>

<!-- titre -->
<text x="500" y="58" text-anchor="middle" class="title">La Méthode FIDES</text>
<text x="500" y="82" text-anchor="middle" class="subtitle">De la blessure à la transformation</text>

<!-- géométrie / mandala abaissé -->
<circle cx="500" cy="410" r="150" class="geo"></circle>
<circle cx="500" cy="410" r="210" class="geo"></circle>
<circle cx="500" cy="410" r="260" class="ring"></circle>

<!-- centre -->
<circle cx="500" cy="415" r="100" class="centerCircle"></circle>
<text x="500" y="405" text-anchor="middle" class="center">Sérénité</text>
<text x="500" y="428" text-anchor="middle" class="centerSub">Source • Lien • Transformation</text>

<!-- éléments du site répartis autour du cercle -->
<rect x="90" y="500" width="110" height="24" rx="12" class="baseNode"></rect>
<text x="145" y="515" text-anchor="middle" class="outer">Empathie</text>

<rect x="690" y="150" width="150" height="24" rx="12" class="baseNode"></rect>
<text x="765" y="166" text-anchor="middle" class="outer">Langages d’apprentissage</text>

<rect x="500" y="100" width="150" height="24" rx="12" class="baseNode"></rect>
<text x="575" y="116" text-anchor="middle" class="outer">Les vulnérabilités </text>

<rect x="792" y="452" width="148" height="24" rx="12" class="baseNode"></rect>
<text x="866" y="468" text-anchor="middle" class="outer">Valeurs de vie</text>

<rect x="760" y="280" width="180" height="24" rx="12" class="baseNode"></rect>
<text x="850" y="296" text-anchor="middle" class="outer">Pensées &amp; croyances limitantes</text>

<rect x="720" y="592" width="120" height="24" rx="12" class="baseNode"></rect>
<text x="780" y="608" text-anchor="middle" class="outer">Addiction</text>

<rect x="150" y="120" width="204" height="24" rx="12" class="baseNode"></rect>
<text x="250" y="135" text-anchor="middle" class="outer">Cercle de la zone de confort</text>

<rect x="110" y="630" width="178" height="24" rx="12" class="baseNode"></rect>
<text x="200" y="645" text-anchor="middle" class="outer">Conditionnement &amp; dogmes</text>

<rect x="55" y="360" width="150" height="24" rx="12" class="baseNode"></rect>
<text x="130" y="375" text-anchor="middle" class="outer">Triangle de Karpman</text>

<rect x="150" y="230" width="100" height="24" rx="12" class="baseNode"></rect>
<text x="200" y="245" text-anchor="middle" class="outer">Culpabilité</text>

<!-- TRAHISON : espacée et plus bas -->
<line x1="500" y1="330" x2="500" y2="210" class="axis"></line>

<circle cx="500" cy="285" r="38" class="vuln"></circle>
<text x="500" y="290" text-anchor="middle" class="label">Foi</text>

<circle cx="500" cy="205" r="44" class="wound"></circle>
<text x="500" y="210" text-anchor="middle" class="small">Trahison</text>

<rect x="455" y="145" width="90" height="24" rx="12" class="protect"></rect>
<text x="500" y="161" text-anchor="middle" class="tiny">contrôle</text>

<path d="M500 170 C520 245 520 285 500 320" class="axisReturn"></path>

<!-- ABANDON -->
<line x1="575" y1="380" x2="660" y2="347" class="axis"></line>

<circle cx="618" cy="367" r="38" class="vuln"></circle>
<text x="618" y="372" text-anchor="middle" class="label">Amour</text>

<circle cx="692" cy="342" r="44" class="wound"></circle>
<text x="692" y="347" text-anchor="middle" class="small">Abandon</text>

<rect x="647" y="287" width="90" height="24" rx="12" class="protect"></rect>
<text x="692" y="303" text-anchor="middle" class="tiny">validation</text>

<path d="M657 332 C605 343 553 362 520 390" class="axisReturn"></path>

<!-- INJUSTICE -->
<line x1="545" y1="480" x2="610" y2="572" class="axis"></line>

<circle cx="575" cy="522" r="38" class="vuln"></circle>

<text x="575" y="517" text-anchor="middle" class="label">Discer-</text>
<text x="575" y="533" text-anchor="middle" class="label">nement</text>

<circle cx="615" cy="590" r="44" class="wound"></circle>
<text x="615" y="595" text-anchor="middle" class="small">Injustice</text>

<rect x="560" y="630" width="120" height="24" rx="12" class="protect"></rect>
<text x="620" y="645" text-anchor="middle" class="tiny">indépendance</text>

<path d="M600 565 C560 525 540 482 520 445" class="axisReturn"></path>

<!-- REJET -->
<line x1="455" y1="480" x2="390" y2="572" class="axis"></line>

<circle cx="425" cy="522" r="38" class="vuln"></circle>
<text x="425" y="527" text-anchor="middle" class="label">Vie</text>

<circle cx="385" cy="589" r="44" class="wound"></circle>
<text x="383" y="591" text-anchor="middle" class="small">Rejet</text>

<rect x="335" y="630" width="90" height="24" rx="12" class="protect"></rect>
<text x="380" y="645" text-anchor="middle" class="tiny">reconnaissance</text>

<path d="M400 565 C440 525 460 482 480 445" class="axisReturn"></path>

<!-- HUMILIATION -->
<line x1="425" y1="380" x2="340" y2="347" class="axis"></line>

<circle cx="382" cy="367" r="38" class="vuln"></circle>
<text x="382" y="372" text-anchor="middle" class="label">Dignité</text>

<circle cx="308" cy="342" r="44" class="wound"></circle>
<text x="308" y="347" text-anchor="middle" class="small">Humiliation</text>

<rect x="248" y="287" width="120" height="24" rx="12" class="protect"></rect>
<text x="308" y="303" text-anchor="middle" class="tiny">autodénigrement</text>

<path d="M343 332 C395 343 447 362 480 390" class="axisReturn"></path>

<!-- phrase finale -->
<text x="500" y="714" text-anchor="middle" class="footer">
Les blessures émotionnelles révèlent les protections que l’être crée pour traverser les vulnérabilités de l’amour.
</text>

</svg>