<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="740" viewBox="0 0 1360 740" role="img" aria-labelledby="title desc">
  <title id="title">Polarités — dans l’amour à deux · lecture FIDES</title>
  <desc id="desc">Schéma horizontal éditable avec yin et yang, HPE et HPI, et les intelligences associées, dans une composition symétrique.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.08"></feDropShadow>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ebe5d8"></stop>
      <stop offset="100%" stop-color="#e6dfd0"></stop>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.93"></stop>
    </linearGradient>
    <clipPath id="clipHumiliation">
      <rect x="600" y="486" width="160" height="38" rx="19"></rect>
    </clipPath>
  </defs>

  <style>
    .bg { fill: url(#bgGrad); }
    .panel { fill: url(#panelGrad); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
    .title { font: 700 40px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: #211c1d; }
    .subtitle { font: 500 20px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: rgba(0,0,0,0.62); }
    .kicker { font: 600 18px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: rgba(0,0,0,0.72); }
    .bodySm { font: 500 18px/1.45 "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: rgba(0,0,0,0.82); }
    .sectionYin { font: 700 18px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: rgba(0,0,0,0.72); }
    .sectionYang { font: 700 18px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; letter-spacing: 2px; text-transform: uppercase; fill: #be2b56; }
    .bigYin { font: 700 40px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: #211c1d; }
    .bigYang { font: 700 40px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: #be2b56; }
    .label { font: 700 25px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: #211c1d; }
    .body { font: 500 23px/1.42 "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; fill: rgba(0,0,0,0.84); }
    .chipYinText, .chipYangText { font: 600 18px "Avenir Next", Avenir, Inter, Helvetica, Arial, sans-serif; }
    .chipYinText { fill: #211c1d; }
    .chipYangText { fill: #be2b56; }
    .divider { stroke: rgba(190,43,86,0.12); stroke-width: 2; }
  </style>

  <rect class="bg" x="0" y="0" width="1360" height="740"></rect>

  <text x="680" y="70" text-anchor="middle" class="title">Polarités</text>
  <text x="680" y="104" text-anchor="middle" class="subtitle">Dans l’amour à deux · lecture FIDES</text>

  <g filter="url(#shadow)">
    <rect x="220" y="130" width="920" height="130" rx="28" class="panel"></rect>
  </g>

  <g transform="translate(320 195) scale(2)">
    <circle cx="0" cy="0" r="18" fill="#faf6f0" stroke="rgba(190,43,86,0.18)" stroke-width="2"></circle>
    <path d="M 0 -18 A 18 18 0 0 1 0 18 A 9 9 0 0 0 0 0 A 9 9 0 0 1 0 -18 Z" fill="#be2b56"></path>
    <path d="M 0 -18 A 18 18 0 0 0 0 18 A 9 9 0 0 1 0 0 A 9 9 0 0 0 0 -18 Z" fill="#d8c8b4"></path>
    <circle cx="0" cy="-9" r="9" fill="#d8c8b4"></circle>
    <circle cx="0" cy="9" r="9" fill="#be2b56"></circle>
    <circle cx="0" cy="-9" r="2.4" fill="#faf6f0"></circle>
    <circle cx="0" cy="9" r="2.4" fill="#faf6f0"></circle>
  
  </g>

  <text x="710" y="175" text-anchor="middle" class="kicker">Polarités du lien amoureux</text>
  <text x="710" y="200" text-anchor="middle" class="bodySm">Deux manières dominantes d’aimer, de percevoir, de ressentir</text>
  <text x="710" y="225" text-anchor="middle" class="bodySm">et de chercher l’équilibre dans le lien.</text>

  <g filter="url(#shadow)">
    <rect x="100" y="292" width="1160" height="372" rx="32" class="panel"></rect>
  </g>

  <line x1="680" y1="332" x2="680" y2="628" class="divider"></line>

  <!-- LEFT / YIN -->
  <g>
    <text x="390" y="358" text-anchor="middle" class="sectionYin">prédominance yin</text>
    <text x="390" y="404" text-anchor="middle" class="bigYin">YIN</text>
    <text x="390" y="438" text-anchor="middle" class="label">HPE</text>
    <text x="390" y="468" text-anchor="middle" class="kicker">Haut potentiel émotionnel</text>

    <rect x="214" y="486" width="118" height="38" rx="19" fill="#efe7da" stroke="rgba(190,43,86,0.10)" stroke-width="1.5"></rect>
    <text x="273" y="510" text-anchor="middle" class="chipYinText">Rejet</text>

    <rect x="396" y="486" width="148" height="38" rx="19" fill="#efe7da" stroke="rgba(190,43,86,0.10)" stroke-width="1.5"></rect>
    <text x="470" y="510" text-anchor="middle" class="chipYinText">Injustice</text>

    <rect x="210" y="548" width="360" height="44" rx="22" fill="#efe7da" stroke="rgba(190,43,86,0.10)" stroke-width="1.5"></rect>
    <text x="390" y="576" text-anchor="middle" class="chipYinText">Intelligence émotionnelle</text>
    <rect x="234" y="604" width="312" height="44" rx="22" fill="#efe7da" stroke="rgba(190,43,86,0.10)" stroke-width="1.5"></rect>
    <text x="390" y="632" text-anchor="middle" class="chipYinText">Intelligence spirituelle</text>
  </g>

  <!-- CENTRE -->
  <g>
    <rect x="600" y="486" width="160" height="38" rx="19" fill="#efe7da" stroke="rgba(190,43,86,0.10)" stroke-width="1.5"></rect>
    <rect x="680" y="486" width="80" height="38" clip-path="url(#clipHumiliation)" fill="rgb(190,43,86)" fill-opacity="0.08"></rect>
    <text x="680" y="510" text-anchor="middle" class="chipYinText">Humiliation</text>
  </g>

  <!-- RIGHT / YANG -->
  <g>
    <text x="970" y="358" text-anchor="middle" class="sectionYang">prédominance yang</text>
    <text x="970" y="404" text-anchor="middle" class="bigYang">YANG</text>
    <text x="970" y="438" text-anchor="middle" class="label">HPI</text>
    <text x="970" y="468" text-anchor="middle" class="kicker">Haut potentiel intellectuel</text>

    <rect x="816" y="486" width="156" height="38" rx="19" fill="rgba(190,43,86,0.08)"></rect>
    <text x="894" y="510" text-anchor="middle" class="chipYangText">Trahison</text>

    <rect x="1008" y="486" width="144" height="38" rx="19" fill="rgba(190,43,86,0.08)"></rect>
    <text x="1080" y="510" text-anchor="middle" class="chipYangText">Abandon</text>

    <rect x="790" y="548" width="360" height="44" rx="22" fill="rgba(190,43,86,0.10)"></rect>
    <text x="970" y="576" text-anchor="middle" class="chipYangText">Intelligence intellectuelle</text>
    <rect x="806" y="604" width="328" height="44" rx="22" fill="rgba(190,43,86,0.10)"></rect>
    <text x="970" y="632" text-anchor="middle" class="chipYangText">Intelligence corporelle</text>
  </g>
</svg>