<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1400" width="1600" height="1400" role="img" aria-labelledby="title desc">
<title id="title">Personnalités prédominantes — version simplifiée</title>
<desc id="desc">Mandala simplifié présentant trois grandes dynamiques émotionnelles prédominantes.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.10)"/>
  </filter>
  <style>
    .bg { fill: rgb(235, 229, 216); }
    .panel { fill: rgba(255,255,255,0.95); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
    .card { fill: rgba(255,255,255,0.98); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
    .soft { fill: rgba(190,43,86,0.10); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
    .ring { fill: none; stroke: rgba(190,43,86,0.10); stroke-width: 2; }
    .connector { stroke: rgba(190,43,86,0.18); stroke-width: 2.5; fill: none; }
    .title { font-family: Georgia, "Times New Roman", serif; font-size: 52px; font-weight: 700; fill: rgb(190,43,86); }
    .subtitle { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 20px; fill: rgba(0,0,0,0.62); }
    .centerTitle { font-family: Georgia, "Times New Roman", serif; font-size: 44px; font-weight: 700; fill: rgb(190,43,86); }
    .centerText { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 21px; fill: rgba(0,0,0,0.86); }
    .cardTitle { font-family: Georgia, "Times New Roman", serif; font-size: 31px; font-weight: 700; fill: rgb(190,43,86); }
    .pill { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: rgba(190,43,86,0.88); }
    .body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 22px; fill: rgba(0,0,0,0.86); }
    .dot { fill: rgb(190,43,86); }
  </style>
</defs>
<rect class="bg" x="0" y="0" width="1600" height="1300"/>
<rect class="panel" x="70" y="55" width="1460" height="1190" rx="34" filter="url(#shadow)"/>
<text x="800" y="136" text-anchor="middle" class="title">Personnalités prédominantes</text>
<text x="800" y="171" text-anchor="middle" class="subtitle">Lecture simple des trois grandes dynamiques</text>

<circle class="ring" cx="800" cy="690" r="395"/>
<circle class="soft" cx="800" cy="690" r="220" filter="url(#shadow)"/>
<circle class="card" cx="800" cy="690" r="156"/>

<text x="800" y="642" text-anchor="middle" class="centerTitle">
<tspan x="800" y="642">Trois grandes</tspan>
<tspan x="800" y="688">dynamiques</tspan>
</text>
<text x="800" y="746" text-anchor="middle" class="centerText">
<tspan x="800" y="746">La blessure colore surtout</tspan>
<tspan x="800" y="776">la manière dont l’émotion</tspan>
<tspan x="800" y="806">se manifeste</tspan>
</text>
<line class="connector" x1="800" y1="470" x2="800" y2="530"/>
<line class="connector" x1="675" y1="780" x2="610" y2="810"/>
<line class="connector" x1="925" y1="780" x2="970" y2="810"/>
<rect class="card" x="575" y="180" width="450" height="320" rx="34" filter="url(#shadow)"/>
<text x="800.0" y="242" text-anchor="middle" class="cardTitle">Surprise / peur</text>
<rect class="soft" x="690.0" y="264" width="220" height="42" rx="21"/>
<text x="800.0" y="291" text-anchor="middle" class="pill">Trahison • Abandon</text>
<circle class="dot" cx="643" cy="348" r="5"/>
<text x="665" y="356" class="body">L’émotion déborde</text>
<circle class="dot" cx="643" cy="406" r="5"/>
<text x="665" y="414" class="body">Le besoin de contrôle augmente</text>
<circle class="dot" cx="643" cy="464" r="5"/>
<text x="665" y="472" class="body">La sécurité est cherchée à l’extérieur</text>
<rect class="card" x="200" y="760" width="460" height="320" rx="34" filter="url(#shadow)"/>
<text x="430.0" y="822" text-anchor="middle" class="cardTitle">Tristesse / colère intérieure</text>
<rect class="soft" x="325.0" y="844" width="220" height="42" rx="21"/>
<text x="435.0" y="871" text-anchor="middle" class="pill">Rejet • Injustice</text>
<circle class="dot" cx="278" cy="928" r="5"/>
<text x="300" y="936" class="body">L’émotion se retient</text>
<circle class="dot" cx="278" cy="986" r="5"/>
<text x="300" y="994" class="body">Retrait, silence ou rigidité</text>
<circle class="dot" cx="278" cy="1044" r="5"/>
<text x="300" y="1052" class="body">Le ressenti reste peu nommé</text>
<rect class="card" x="950" y="760" width="430" height="320" rx="34" filter="url(#shadow)"/>
<text x="1165.0" y="822" text-anchor="middle" class="cardTitle">Dégoût / humiliation</text>
<rect class="soft" x="1075.0" y="844" width="180" height="42" rx="21"/>
<text x="1165.0" y="871" text-anchor="middle" class="pill">Humiliation</text>
<circle class="dot" cx="1008" cy="928" r="5"/>
<text x="1030" y="936" class="body">L’émotion s’oublie</text>
<circle class="dot" cx="1008" cy="986" r="5"/>
<text x="1030" y="994" class="body">Le sacrifice prend la place</text>
<circle class="dot" cx="1008" cy="1044" r="5"/>
<text x="1030" y="1052" class="body">Le lien à soi devient flou</text>
<rect class="soft" x="250" y="1100" width="1100" height="96" rx="28"/>
<text x="800" y="1150" text-anchor="middle" class="centerText">Déborde • Se retient • S’oublie</text>
<text x="800" y="1183" text-anchor="middle" class="subtitle">Trois mouvements différents d’une même douleur activée</text>
</svg>