<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>La méthode FIDES — Atlas</title>

  <style>
    :root{
      --bg0:#0b0e14;
      --panel: rgba(255,255,255,0.04);
      --navbg: rgba(0,0,0,0.14);
      --card: rgba(0,0,0,0.16);
      --stroke: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.90);
      --muted: rgba(255,255,255,0.60);
      --shadow: 0 10px 26px rgba(0,0,0,0.45);
      --radius2: 20px;
      --radius: 16px;
      --maxw: 1180px;

      --sbSize: 8px;
      --sbPad: 12px;
      --sbTrack: rgba(0,0,0,0.18);
      --sbThumb1: rgba(205,215,235,0.22);
      --sbThumb2: rgba(205,215,235,0.14);
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg0);
      color: var(--text);
    }

    .app{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 16px;
      height: 100%;
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow:hidden;
      height: calc(100vh - 32px);   /* IMPORTANT : hauteur garantie */
      display:flex;
      flex-direction:column;
    }

    header{
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 12px;
      background: rgba(0,0,0,0.10);
      flex: 0 0 auto;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 14px;
      min-width: 0;
    }

    .logoBtn{
      display:flex;
      align-items:center;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .logo{
      height: 66px;
      width: auto;
      display:block;
      object-fit: contain;
      background: rgba(255,255,255,0.96);
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(0,0,0,0.10);
    }

    .titleBox{ min-width: 0; }
    header h1{
      margin:0;
      font-size: 15.5px;
      font-weight: 900;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    header p{
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12.6px;
      line-height: 1.35;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    /* Menu : visible seulement mobile */
    .btn{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 11px;
      cursor:pointer;
      font-weight: 820;
      font-size: 12.5px;
      white-space: nowrap;
    }
    @media (min-width: 981px){
      #menuBtn{ display:none; }
    }

    .content{
      display:grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
      flex: 1 1 auto;  /* IMPORTANT : prend la place restante */
    }

    .scrollArea{
      overflow:auto;
      padding-right: var(--sbPad);
      scrollbar-gutter: stable both-edges;
      min-height: 0;
    }

    .scrollArea{
      scrollbar-width: thin;
      scrollbar-color: rgba(205,215,235,0.28) var(--sbTrack);
    }
    .scrollArea::-webkit-scrollbar{ width: var(--sbSize); height: var(--sbSize); }
    .scrollArea::-webkit-scrollbar-track{
      background: var(--sbTrack);
      border-radius: 999px;
      margin: 10px;
    }
    .scrollArea::-webkit-scrollbar-thumb{
      background: linear-gradient(180deg, var(--sbThumb1), var(--sbThumb2));
      border: 2px solid var(--sbTrack);
      border-radius: 999px;
    }

    nav{
      border-right: 1px solid rgba(255,255,255,0.08);
      background: var(--navbg);
      padding: 14px;
    }

    main{
      padding: 16px;
    }

    .navSection{
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .navTitle{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 4px 0 10px;
    }
    .navItem{
      width:100%;
      text-align:left;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.12);
      color: rgba(255,255,255,0.90);
      border-radius: 14px;
      padding: 10px 10px;
      cursor:pointer;
      font-weight: 820;
      font-size: 12.8px;
      margin-bottom: 8px;
    }
    .navItem[aria-current="page"]{
      border-color: rgba(205,215,235,0.25);
      background: rgba(205,215,235,0.08);
    }
    .navSmall{
      display:block;
      margin-top: 3px;
      color: rgba(255,255,255,0.60);
      font-size: 11.4px;
      font-weight: 650;
      line-height: 1.25;
    }

    .card{
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }
    .lead{
      font-size: 14px;
      font-weight: 900;
      margin: 0 0 8px;
      line-height: 1.35;
    }
    p, li{
      color: rgba(255,255,255,0.86);
      font-size: 13.2px;
      line-height: 1.6;
    }
    ul{ margin: 8px 0 0 18px; }

    .mapGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .mapTile{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.12);
      border-radius: 16px;
      padding: 14px;
      cursor:pointer;
    }

    .woundGrid{ display:grid; gap: 10px; }
    .row{
      display:grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.10);
    }
    .label{ font-weight: 950; font-size: 12.8px; color: rgba(255,255,255,0.88); }
    .value{ color: rgba(255,255,255,0.84); font-size: 13.2px; line-height: 1.6; }

    /* Mobile drawer nav */
    .backdrop{ display:none; }
    @media (max-width: 980px){
      .content{ grid-template-columns: 1fr; }
      nav{
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: min(420px, calc(100% - 56px));
        transform: translateX(-110%);
        transition: transform .14s ease;
        z-index: 50;
        box-shadow: 0 20px 70px rgba(0,0,0,0.60);
        border-top-right-radius: 18px;
        border-bottom-right-radius: 18px;
      }
      nav[data-open="true"]{ transform: translateX(0); }
      .backdrop{
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 40;
        display:none;
      }
      .backdrop[data-open="true"]{ display:block; }
      .mapGrid{ grid-template-columns: 1fr; }
      .row{ grid-template-columns: 1fr; }
    }

    /* Fallback si JS ne tourne pas */
    .nojs{ display:none; }
    noscript .nojs{ display:block; }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">

      <header>
        <div class="brand">
          <button class="logoBtn" id="logoBtn" type="button" title="Accueil">
            <img class="logo" src="image.png" alt="LA MÉTHODE FIDES">
          </button>
          <div class="titleBox">
            <h1 id="pageTitle">Carte du système</h1>
            <p id="pageSubtitle">Socles • Blessures • Référentiels</p>
          </div>
        </div>

        <button class="btn" id="menuBtn" type="button">Menu</button>
      </header>

      <div class="content">
        <div class="backdrop" id="backdrop" data-open="false"></div>
        <nav class="scrollArea" id="nav" data-open="false" aria-label="Menu"></nav>
        <main class="scrollArea" id="main">
          <noscript>
            <div class="card nojs">
              <div class="kicker">Erreur</div>
              <div class="lead">JavaScript est désactivé</div>
              <p>Active JavaScript pour afficher le contenu.</p>
            </div>
          </noscript>
        </main>
      </div>

    </div>
  </div>

  <script>
    // Données minimales (tu peux réinjecter le reste après validation visuelle)
    const PAGES = [
      { id:"home", type:"HOME", title:"Carte du système", subtitle:"Socles • Blessures • Référentiels" },
      { id:"socle_confort", type:"SOCLE", title:"Le cercle de la zone de confort", subtitle:"Confort → Peur → Apprentissage → Expansion.",
        content: [
          { kicker:"But pédagogique", lead:"Montrer les différentes zones (confort, peur, apprentissage, expansion).", bullets:[
            "Zone de confort = sécurité illusoire, répétition des habitudes, évitement de l’inconfort.",
            "Zone de peur = doutes, jugements des autres, perte de repères.",
            "Zone d’apprentissage = nouvelles compétences, élargissement de soi, expérimentation.",
            "Zone d’expansion = réalisation de soi, alignement avec sa valeur, contribution au monde."
          ]},
          { kicker:"Message clé", lead:"Pour avancer, il faut oser franchir la peur et passer par l’apprentissage.", text:
            "Sans ce passage, on reste prisonnier de l’illusion de sécurité."
          }
        ]
      }
    ];

    const NAV = [
      { section:"Carte", items:["home"] },
      { section:"Socles", items:["socle_confort"] },
    ];

    const navEl = document.getElementById("nav");
    const mainEl = document.getElementById("main");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const menuBtn = document.getElementById("menuBtn");
    const backdrop = document.getElementById("backdrop");
    const logoBtn = document.getElementById("logoBtn");

    function escapeHTML(str){
      return String(str)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    const getPage = (id) => PAGES.find(p => p.id === id);

    function getRoute(){
      return (location.hash || "#home").slice(1);
    }
    function go(id){
      location.hash = "#" + id;
    }

    function setMenu(open){
      navEl.setAttribute("data-open", open ? "true" : "false");
      backdrop.setAttribute("data-open", open ? "true" : "false");
    }

    menuBtn.addEventListener("click", () => {
      const open = navEl.getAttribute("data-open") === "true";
      setMenu(!open);
    });
    backdrop.addEventListener("click", () => setMenu(false));
    document.addEventListener("keydown", (e) => { if(e.key === "Escape") setMenu(false); });
    logoBtn.addEventListener("click", () => go("home"));

    function renderNav(currentId){
      navEl.innerHTML = "";
      NAV.forEach(group => {
        const wrap = document.createElement("div");
        wrap.className = "navSection";
        wrap.innerHTML = '<div class="navTitle">' + escapeHTML(group.section) + '</div>';

        group.items.forEach(id => {
          const p = getPage(id);
          const btn = document.createElement("button");
          btn.className = "navItem";
          btn.type = "button";
          btn.setAttribute("aria-current", id === currentId ? "page" : "false");
          btn.innerHTML =
            escapeHTML(p.title) +
            '<span class="navSmall">' + escapeHTML(p.subtitle || "") + '</span>';
          btn.addEventListener("click", () => { go(id); setMenu(false); });
          wrap.appendChild(btn);
        });

        navEl.appendChild(wrap);
      });
    }

    function renderHome(){
      mainEl.innerHTML =
        '<div class="card">' +
          '<div class="kicker">Structure</div>' +
          '<div class="lead">Socles • Blessures • Référentiels</div>' +
          '<p>Navigation par structure.</p>' +
        '</div>' +
        '<div class="mapGrid">' +
          '<div class="mapTile" data-go="socle_confort">' +
            '<h3>Point de départ</h3>' +
            '<p>Confort → Peur → Apprentissage → Expansion.</p>' +
          '</div>' +
        '</div>';

      const tile = mainEl.querySelector(".mapTile");
      if(tile) tile.addEventListener("click", () => go(tile.dataset.go));
    }

    function renderSocle(page){
      let html = "";
      (page.content || []).forEach(b => {
        html += '<div class="card">';
        html += '<div class="kicker">' + escapeHTML(b.kicker || "Socle") + '</div>';
        html += '<div class="lead">' + escapeHTML(b.lead || "") + '</div>';
        if(b.text) html += '<p>' + escapeHTML(b.text) + '</p>';
        if(b.bullets && b.bullets.length){
          html += '<ul>';
          b.bullets.forEach(x => { html += '<li>' + escapeHTML(x) + '</li>'; });
          html += '</ul>';
        }
        html += '</div>';
      });
      mainEl.innerHTML = html;
    }

    function render(){
      const id = getRoute();
      const page = getPage(id) || getPage("home");

      pageTitle.textContent = page.title || "La méthode FIDES";
      pageSubtitle.textContent = page.subtitle || "";

      renderNav(page.id);

      if(page.type === "HOME") renderHome();
      else if(page.type === "SOCLE") renderSocle(page);
      else renderHome();
    }

    window.addEventListener("hashchange", render);
    if(!location.hash) location.hash = "#home";
    render();
  </script>
</body>
</html>
