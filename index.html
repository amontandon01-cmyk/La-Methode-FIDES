<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support de formation – FIDES & mécanismes émotionnels</title>

  <style>
    :root{
      --bg0:#070913;
      --bg1:#0b1022;

      --glass: rgba(255,255,255,0.07);
      --stroke: rgba(255,255,255,0.14);

      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --muted2: rgba(255,255,255,0.55);

      --accent: #2de2e6;
      --accent2:#8a5cff;

      --shadow: 0 14px 40px rgba(0,0,0,0.45);
      --radius: 20px;
      --radius2: 26px;

      /* Focus unique : largeur max */
      --maxw: 1100px;

      /* Scrollbar “inset” (dans le panel) */
      --sbSize: 8px;
      --sbPad: 12px; /* espace interne pour éviter la scrollbar collée */
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 650px at 18% 12%, color-mix(in srgb, var(--accent2) 30%, transparent), transparent 60%),
        radial-gradient(760px 520px at 82% 30%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%),
        radial-gradient(680px 520px at 60% 86%, rgba(255,92,214,0.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);

      /* IMPORTANT : pas de scroll global => scroll “dans les panels” */
      overflow: hidden;
    }

    /* ============================================================
      LAYOUT : Focus unique (pas de bascule)
      ------------------------------------------------------------
      - Desktop : 2 colonnes mais centrées et respirantes
      - Mobile : 1 colonne
    ============================================================ */
    .app{
      height:100%;
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 14px;

      display:grid;
      grid-template-columns: 1fr 420px;
      gap: 14px;
      align-items: stretch;
    }

    @media (max-width: 1050px){
      body{ overflow:auto; } /* sur mobile on accepte le scroll global */
      .app{
        height:auto;
        min-height:100%;
        grid-template-columns: 1fr;
      }
    }

    .panel{
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);

      overflow:hidden;
      min-height:0; /* vital pour que les scroll internes marchent */
    }

    /* ============================================================
      SCROLL AREAS : scrollbars “inset” dans le panel
      ------------------------------------------------------------
      Idée : la zone scrollable a un padding interne à droite
      => la scrollbar n’est plus collée au bord de la fenêtre,
      elle est “dans” la vue.
    ============================================================ */
    .scrollArea{
      height: 100%;
      overflow: auto;

      /* “gouttière” interne */
      padding-right: var(--sbPad);
      scrollbar-gutter: stable both-edges;

      /* arrondis visuels */
      border-radius: inherit;
    }

    /* Scrollbars (appliquées aux scrollArea uniquement) */
    .scrollArea{
      scrollbar-width: thin;
      scrollbar-color:
        color-mix(in srgb, var(--accent) 32%, rgba(255,255,255,0.16))
        rgba(0,0,0,0.18);
    }
    .scrollArea::-webkit-scrollbar{ width: var(--sbSize); height: var(--sbSize); }
    .scrollArea::-webkit-scrollbar-track{
      background: rgba(0,0,0,0.14);
      border-radius: 999px;
      margin: 10px; /* “inset” visuel */
    }
    .scrollArea::-webkit-scrollbar-thumb{
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent2) 32%, rgba(255,255,255,0.10)),
        color-mix(in srgb, var(--accent) 32%, rgba(255,255,255,0.10))
      );
      border: 2px solid rgba(0,0,0,0.16);
      border-radius: 999px;
    }
    .scrollArea::-webkit-scrollbar-thumb:hover{
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.12)),
        color-mix(in srgb, var(--accent) 45%, rgba(255,255,255,0.12))
      );
    }

    /* ============================================================
      MAIN
    ============================================================ */
    .main{ display:flex; flex-direction:column; min-height:0; }
    .main__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex; justify-content:space-between; gap:14px;
    }
    .titleblock h2{ margin:0; font-size: 18px; font-weight: 900; letter-spacing:.2px; }
    .titleblock p{ margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .chiprow{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 10px; }
    .chip{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.82);
      user-select:none;
    }
    .chip strong{ color: var(--accent); font-weight: 900; }

    /* ============================================================
      TOPBAR (module) — select stylé + progression
    ============================================================ */
    .topbar{
      padding: 10px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    }
    .topbar__left, .topbar__right{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      min-width: 0;
    }

    .btn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 10px;
      cursor:pointer;
      transition: background .18s ease, transform .12s ease, border-color .18s ease;
      font-weight: 820;
      font-size: 12.5px;
      white-space: nowrap;
    }
    .btn:hover{
      background: rgba(255,255,255,0.07);
      border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .btn--accent{
      border-color: color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.14));
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--accent2) 18%, rgba(0,0,0,0.18)),
        color-mix(in srgb, var(--accent) 9%, rgba(0,0,0,0.18))
      );
    }

    .progressPill{
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
    }
    .progressPill strong{ color: var(--accent); font-weight: 900; }

    /* SELECT beau : suppression look natif + flèche intégrée */
    .selectWrap{
      position: relative;
      max-width: 360px;
      min-width: 220px;
    }
    .selectWrap::after{
      content:"";
      position:absolute;
      right: 12px;
      top: 50%;
      width: 10px; height: 10px;
      transform: translateY(-50%) rotate(45deg);
      border-right: 2px solid rgba(255,255,255,0.70);
      border-bottom: 2px solid rgba(255,255,255,0.70);
      pointer-events:none;
      opacity: .9;
    }
    select{
      width:100%;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;

      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.90);
      border-radius: 14px;
      padding: 9px 34px 9px 12px; /* espace pour la flèche */
      font-weight: 780;
      font-size: 12.5px;
      outline: none;
    }
    select:hover{
      border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.14));
    }
    select:focus{
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    /* ============================================================
      HOME — catégories + cartes
    ============================================================ */
    .homeTop{ display:flex; flex-direction:column; gap:10px; margin-bottom: 12px; }
    .categoryRow{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    .categoryBtn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 860;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .categoryBtn:hover{
      background: rgba(255,255,255,0.06);
      border-color: color-mix(in srgb, var(--accent) 25%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .categoryBtn[aria-pressed="true"]{
      background: color-mix(in srgb, var(--accent2) 16%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
    }
    .categoryDot{
      width:8px; height:8px; border-radius:99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 8%, transparent);
    }

    .homeGrid{
      display:grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    @media (max-width: 900px){
      .homeGrid{ grid-template-columns: 1fr; }
    }

    .themeCard{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: 18px;
      padding: 14px;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      position: relative;
      overflow:hidden;
      min-height: 92px;
    }
    .themeCard:hover{
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent2) 38%, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.05);
    }
    .themeCard h3{ margin:0; font-size: 14px; font-weight: 940; line-height: 1.25; }
    .themeCard p{ margin:6px 0 0; color: rgba(255,255,255,0.70); font-size: 12.5px; line-height:1.35; }
    .themeCard .mini{ margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; font-size: 12px; }
    .tag{ border:1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05); padding:5px 9px; border-radius:999px; }

    .themeCard.is-visited{
      border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.14));
    }
    .themeCard.is-visited::after{
      content: "✓ vu";
      position:absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      font-weight: 900;
      color: rgba(255,255,255,0.88);
      background: color-mix(in srgb, var(--accent) 14%, rgba(0,0,0,0.25));
      border: 1px solid rgba(255,255,255,0.12);
      padding: 5px 8px;
      border-radius: 999px;
    }

    /* ============================================================
      MODULE — mini repère + accordéon
    ============================================================ */
    .miniMap{
      padding: 10px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items:center;
    }
    .miniPill{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 860;
      cursor: pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      display:flex; align-items:center; gap:8px;
    }
    .miniPill:hover{
      background: rgba(255,255,255,0.06);
      border-color: color-mix(in srgb, var(--accent) 25%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .miniPill[aria-current="true"]{
      background: color-mix(in srgb, var(--accent2) 14%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.14));
    }
    .miniDot{
      width:8px; height:8px; border-radius: 99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 8%, transparent);
    }
    .miniCheck{ font-weight: 900; opacity: .9; margin-left: 2px; }
    .miniPill.is-visited{
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
      background: color-mix(in srgb, var(--accent) 8%, rgba(0,0,0,0.14));
    }

    .accordion{ display:flex; flex-direction:column; gap:10px; padding: 14px 0 0; }
    .accItem{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: var(--radius);
      overflow:hidden;
    }
    .accHead{
      width: 100%;
      text-align:left;
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background: transparent;
      border: none;
      color: var(--text);
      cursor:pointer;
    }
    .accHead:hover{ background: rgba(255,255,255,0.04); }
    .accTitle{ display:flex; align-items:center; gap:10px; font-weight: 920; font-size: 13px; }
    .accMeta{ display:flex; align-items:center; gap:10px; color: rgba(255,255,255,0.70); font-size: 12px; font-weight: 800; white-space: nowrap; }
    .caret{
      width: 10px; height: 10px;
      border-right: 2px solid rgba(255,255,255,0.62);
      border-bottom: 2px solid rgba(255,255,255,0.62);
      transform: rotate(-45deg);
      transition: transform .18s ease;
      opacity: .85;
    }
    .accItem[aria-expanded="true"] .caret{ transform: rotate(45deg); }

    .accBody{ padding: 0 14px 14px; display:none; }
    .accItem[aria-expanded="true"] .accBody{ display:block; }

    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 12px 0 6px;
    }
    .accBody p, .accBody li{ color: rgba(255,255,255,0.85); font-size: 13px; line-height: 1.55; margin: 0 0 8px; }
    .accBody ul{ margin: 6px 0 0 18px; }

    .accItem.is-visited{
      border-color: color-mix(in srgb, var(--accent) 30%, rgba(255,255,255,0.12));
    }
    .visitBadge{
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: color-mix(in srgb, var(--accent) 12%, rgba(0,0,0,0.18));
      color: rgba(255,255,255,0.82);
      font-size: 11px;
      font-weight: 900;
    }

    /* ============================================================
      ASIDE
    ============================================================ */
    .aside{ display:flex; flex-direction:column; min-height:0; }
    .aside__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .aside__header h3{ margin:0; font-size: 14px; font-weight: 900; }
    .aside__header p{ margin: 6px 0 0; color: var(--muted2); font-size: 12.5px; line-height: 1.4; }

    .aside__content{ padding: 14px 18px 18px; min-height:0; }

    .card{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h4{
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 900;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .card p, .card li{ color: rgba(255,255,255,0.85); font-size: 13px; line-height: 1.55; }
    .note{ font-size: 12px; color: rgba(255,255,255,0.62); line-height: 1.45; }
    .callout{
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      margin: 10px 0;
      color: rgba(255,255,255,0.86);
    }

    .hidden{ display:none !important; }
  </style>
</head>

<body>
  <div class="app">
    <!-- MAIN -->
    <main class="panel main" aria-label="Contenu">
      <div class="main__header">
        <div class="titleblock">
          <h2 id="mainTitle">Accueil</h2>
          <p id="mainSubtitle">Catégorie → thème. Ensuite : sections lisibles (pas de diagrammes lourds).</p>
          <div class="chiprow" id="mainChips"></div>
        </div>
        <div class="chip"><strong>Focus</strong> par défaut</div>
      </div>

      <!-- TOPBAR (module) -->
      <div class="topbar hidden" id="moduleTopbar">
        <div class="topbar__left">
          <button class="btn btn--accent" id="backBtn" type="button">← Retour</button>

          <div class="selectWrap" title="Changer de thème">
            <select id="moduleSelect" aria-label="Changer de thème"></select>
          </div>

          <span class="progressPill" id="progressPill"><strong>0</strong>/<span>0</span> sections vues</span>
        </div>

        <div class="topbar__right">
          <button class="btn" id="resetVisitedBtn" type="button" title="Réinitialiser les ✓ (localStorage)">Reset ✓</button>
        </div>
      </div>

      <!-- MINI MAP -->
      <div class="miniMap hidden" id="miniMap"></div>

      <!-- SCROLL AREA MAIN -->
      <div class="scrollArea" style="padding:14px;" id="mainScroll">
        <!-- HOME VIEW -->
        <section id="homeView">
          <div class="homeTop">
            <div class="categoryRow" id="categoryRow"></div>
          </div>
          <div class="homeGrid" id="homeGrid"></div>
        </section>

        <!-- MODULE VIEW -->
        <section id="moduleView" class="hidden">
          <div class="accordion" id="accordionHost"></div>
        </section>
      </div>
    </main>

    <!-- ASIDE -->
    <aside class="panel aside" aria-label="Explications">
      <div class="aside__header">
        <h3 id="detailTitle">Bienvenue</h3>
        <p id="detailHint">Choisis une catégorie puis un thème.</p>
      </div>

      <!-- SCROLL AREA ASIDE -->
      <div class="scrollArea aside__content" id="asideScroll">
        <div id="detailHost"></div>
      </div>
    </aside>
  </div>

  <script>
    /* =========================
      THEME COLORS
    ========================== */
    const THEME_COLORS = {
      comfort:    { accent:"#2de2e6", accent2:"#8a5cff" },
      emotions:   { accent:"#38f2a5", accent2:"#2de2e6" },
      empathy:    { accent:"#2de2e6", accent2:"#ff5cd6" },
      addictions: { accent:"#ffb020", accent2:"#ff5cd6" },
      values:     { accent:"#8a5cff", accent2:"#2de2e6" },
      dogmas:     { accent:"#c7a6ff", accent2:"#8a5cff" },
      betrayal:   { accent:"#ff5cd6", accent2:"#8a5cff" },
      abandonment:{ accent:"#2de2e6", accent2:"#38f2a5" },
      rejection:  { accent:"#ffb020", accent2:"#2de2e6" },
      humiliation:{ accent:"#ff5cd6", accent2:"#ffb020" },
      injustice:  { accent:"#8a5cff", accent2:"#ffb020" },
    };
    function setThemeAccent(moduleId){
      const c = THEME_COLORS[moduleId] || { accent:"#2de2e6", accent2:"#8a5cff" };
      document.documentElement.style.setProperty("--accent", c.accent);
      document.documentElement.style.setProperty("--accent2", c.accent2);
    }

    /* =========================
      VISITED (localStorage)
    ========================== */
    const LS_KEY = "fides_training_visited_v4";
    function loadVisited(){
      try{ return JSON.parse(localStorage.getItem(LS_KEY)) || { modules:{}, nodes:{} }; }
      catch{ return { modules:{}, nodes:{} }; }
    }
    function saveVisited(state){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
    let VISITED = loadVisited();

    function markModuleVisited(moduleId){
      VISITED.modules[moduleId] = true;
      saveVisited(VISITED);
      applyVisitedStyles();
    }
    function markNodeVisited(moduleId, nodeId){
      if(!VISITED.nodes[moduleId]) VISITED.nodes[moduleId] = {};
      VISITED.nodes[moduleId][nodeId] = true;
      saveVisited(VISITED);
      applyVisitedStyles();
      updateProgressPill(moduleId);
    }
    function isNodeVisited(moduleId, nodeId){
      return !!(VISITED.nodes[moduleId] && VISITED.nodes[moduleId][nodeId]);
    }
    function resetVisited(){
      VISITED = { modules:{}, nodes:{} };
      saveVisited(VISITED);
      applyVisitedStyles();
      if(viewMode === "home") renderHomeAside();
      if(viewMode === "module") updateProgressPill(currentModuleId);
    }

    /* =========================
      HISTORY API (Back/Forward)
    ========================== */
    function makeURLFromState(state){
      const p = new URLSearchParams();
      p.set("view", state.view || "home");
      if(state.cat) p.set("cat", state.cat);
      if(state.moduleId) p.set("m", state.moduleId);
      if(state.nodeId) p.set("n", state.nodeId);
      return `${location.pathname}?${p.toString()}`;
    }
    function pushAppState(state, replace=false){
      const url = makeURLFromState(state);
      if(replace) history.replaceState(state, "", url);
      else history.pushState(state, "", url);
    }
    function readStateFromURL(){
      const p = new URLSearchParams(location.search);
      return {
        view: p.get("view") || "home",
        cat: p.get("cat") || "bases",
        moduleId: p.get("m") || null,
        nodeId: p.get("n") || null
      };
    }
    window.addEventListener("popstate", (e) => {
      const state = e.state || readStateFromURL();
      restoreFromState(state);
    });

    function restoreFromState(state){
      if(state.view === "module" && state.moduleId){
        enterModule(state.moduleId, { silentHistory:true });
        if(state.nodeId){
          openSection(state.nodeId, { silentHistory:true, autoScroll:false }); // ✅ pas d’auto-scroll
        }
      } else {
        goHome({ silentHistory:true, cat: state.cat || "bases" });
      }
    }

    /* =========================
      FIDES (démo)
    ========================== */
    const FIDES_DEMO = {
      F: "Fait : qu’est-ce qui s’est réellement passé (observable, neutre) ?",
      I: "Interprétation : quelle histoire je me raconte (dogme, croyance, jugement) ?",
      D: "Déclencheur / émotion : qu’est-ce que je ressens et de quoi j’ai besoin ?",
      E: "Expression : comment je l’exprime de façon saine (cadre, limite, demande) ?",
      S: "Solution / sens : quelle action alignée (valeurs) je choisis maintenant ?"
    };
    function makeFidesForWound(label, {emotion, besoin, interpretation, action}){
      return {
        core: [
          `F : Quel fait concret active "${label}" ?`,
          `I : Interprétation : ${interpretation}`,
          `D : Émotion : ${emotion} → Besoin : ${besoin}`,
          `E : Dire : « Quand …, je ressens …, j’ai besoin de … »`,
          `S : Action : ${action}`
        ],
        emotion: ["Nommer l’émotion précisément.", "Respirer / se recentrer.", "Revenir au présent."],
        origine: ["Repérer l’écho passé/présent.", "Mettre des mots.", "Choisir une réponse adulte."],
        masque: ["Observer la protection automatique.", "Tester une alternative.", "Stabiliser."],
        apathie: ["Repérer le retrait.", "Micro-connexion.", "Retour au lien."],
        addictions: ["Identifier la compensation.", "Nommer l’émotion évitée.", "Remplacement progressif."],
        valeurs: ["Valeur touchée → émotion signal.", "Exprimer / poser limite.", "Action alignée."],
        dogmes: ["Identifier la phrase interne.", "Reformuler testable.", "Expérimenter."],
        limitantes: ["Écrire la croyance.", "Chercher preuve inverse.", "Petit acte cohérent."],
        expansives: ["Choisir la croyance aidante.", "L’incarner en action.", "Répéter."],
      };
    }

    /* =========================
      MODULES (contenu)
      -> identique à ta version accordéon, raccourci ici pour lisibilité
      -> tu peux réinjecter tes modules complets comme avant
    ========================== */
    const MODULES = {
      comfort: {
        title: "Zone de confort → peur → apprentissage → expansion",
        subtitle: "Progression : traverser la peur pour grandir.",
        tags: ["progression","zones","simple"],
        order: ["core","confort","peur","apprentissage","expansion"],
        content: {
          nodes: {
            core: { title:"Vue d’ensemble", blocks:[
              {h:"Message clé", p:"« Pour avancer, il faut traverser la peur. »"},
              {h:"Résumé", p:"Confort = sécurité illusoire → Peur = doutes/jugements → Apprentissage = compétences → Expansion = réalisation/alignement."}
            ]},
            confort:{ title:"Zone de confort", blocks:[{h:"Confort", p:"Confort = sécurité illusoire, habitudes, évitement"}] },
            peur:{ title:"Zone de peur", blocks:[{h:"Peur", p:"Peur = doutes, jugements, perte de repères"}] },
            apprentissage:{ title:"Zone d’apprentissage", blocks:[{h:"Apprentissage", p:"Apprentissage = nouvelles compétences, expansion du soi"}] },
            expansion:{ title:"Zone d’expansion", blocks:[{h:"Expansion", p:"Expansion = réalisation, alignement, contribution"}] }
          },
          fides: { core: [
            `F — ${FIDES_DEMO.F}`,
            `I — ${FIDES_DEMO.I}`,
            `D — ${FIDES_DEMO.D}`,
            `E — ${FIDES_DEMO.E}`,
            `S — ${FIDES_DEMO.S}`
          ]}
        }
      },

      betrayal: {
        title: "Blessure émotionnelle : trahison",
        subtitle: "Masque, apathie, addictions, valeurs, dogmes, croyances.",
        tags: ["blessures","mécanismes","relation"],
        order: ["core","emotion","origine","masque","apathie","addictions","valeurs","dogmes","limitantes","expansives"],
        content: {
          nodes: {
            core:{ title:"Vue d’ensemble", blocks:[
              {h:"Émotion", p:"Émotion : surprise"},
              {h:"Dogme", p:"« On ne peut faire confiance à personne »"}
            ]},
            emotion:{ title:"Émotion", blocks:[{h:"Émotion", p:"Émotion : surprise"}] },
            origine:{ title:"Origine", blocks:[{h:"Origine", p:"Origine : trahison vécue (absence, promesse brisée, infidélité)"}] },
            masque:{ title:"Masque", blocks:[{h:"Masque", p:"Masque : contrôlant, cassant, exigeant"}] },
            apathie:{ title:"Apathie", blocks:[{h:"Apathie", p:"Apathie : méfiance, test permanent"}] },
            addictions:{ title:"Addictions", blocks:[{h:"Addictions", p:"Addictions : pouvoir, contrôle, domination"}] },
            valeurs:{ title:"Valeurs", blocks:[{h:"Valeurs", p:"Valeurs : loyauté, vérité, paraître, argent"}] },
            dogmes:{ title:"Dogmes", blocks:[{h:"Dogmes", p:"Dogmes : « On ne peut faire confiance à personne »"}] },
            limitantes:{ title:"Croyances limitantes", blocks:[{h:"Limitantes", p:"« Les autres vont me trahir »"}] },
            expansives:{ title:"Croyances expansives", blocks:[{h:"Expansives", p:"« Je laisse le bénéfice du doute »"}] },
          },
          fides: makeFidesForWound("Trahison", {
            emotion:"surprise", besoin:"sécurité / fiabilité",
            interpretation:"« On ne peut faire confiance à personne »",
            action:"demande claire + cadre + lâcher un micro-contrôle"
          })
        }
      },

      /* Ajoute ici les autres modules (abandonment, rejection, etc.) comme dans ta version précédente */
    };

    const CATEGORIES = [
      { id:"bases", label:"Bases", items: ["comfort"] },
      { id:"wounds", label:"Blessures", items: ["betrayal"] },
      { id:"all", label:"Tous", items: Object.keys(MODULES) },
    ];

    /* =========================
      STATE
    ========================== */
    let viewMode = "home";
    let currentModuleId = "comfort";
    let activeCategoryId = "bases";
    let currentNodeId = null;

    /* =========================
      DOM
    ========================== */
    const homeView = document.getElementById("homeView");
    const moduleView = document.getElementById("moduleView");

    const mainTitle = document.getElementById("mainTitle");
    const mainSubtitle = document.getElementById("mainSubtitle");
    const mainChips = document.getElementById("mainChips");

    const categoryRow = document.getElementById("categoryRow");
    const homeGrid = document.getElementById("homeGrid");

    const moduleTopbar = document.getElementById("moduleTopbar");
    const moduleSelect = document.getElementById("moduleSelect");
    const backBtn = document.getElementById("backBtn");
    const progressPill = document.getElementById("progressPill");
    const resetVisitedBtn = document.getElementById("resetVisitedBtn");

    const miniMap = document.getElementById("miniMap");
    const accordionHost = document.getElementById("accordionHost");

    const detailTitle = document.getElementById("detailTitle");
    const detailHint = document.getElementById("detailHint");
    const detailHost = document.getElementById("detailHost");

    /* =========================
      EVENTS
    ========================== */
    backBtn.addEventListener("click", () => goHome());
    moduleSelect.addEventListener("change", () => enterModule(moduleSelect.value));
    resetVisitedBtn.addEventListener("click", resetVisited);

    /* =========================
      HOME
    ========================== */
    function goHome({ silentHistory=false, cat=null } = {}){
      viewMode = "home";
      currentNodeId = null;
      if(cat) activeCategoryId = cat;

      homeView.classList.remove("hidden");
      moduleView.classList.add("hidden");
      moduleTopbar.classList.add("hidden");
      miniMap.classList.add("hidden");

      mainTitle.textContent = "Accueil";
      mainSubtitle.textContent = "Catégorie → thème. Ensuite : sections lisibles (zéro scroll automatique).";
      mainChips.innerHTML = `
        <div class="chip"><strong>1</strong> Catégorie</div>
        <div class="chip"><strong>2</strong> Thème</div>
        <div class="chip"><strong>3</strong> Sections</div>
      `;

      setThemeAccent("comfort");
      renderCategoryButtons();
      renderHomeCards(activeCategoryId);
      renderHomeAside();
      applyVisitedStyles();

      if(!silentHistory){
        pushAppState({ view:"home", cat: activeCategoryId });
      }
    }

    function renderCategoryButtons(){
      categoryRow.innerHTML = "";
      CATEGORIES.forEach(cat=>{
        const btn = document.createElement("button");
        btn.className = "categoryBtn";
        btn.type = "button";
        btn.dataset.category = cat.id;
        btn.setAttribute("aria-pressed", cat.id === activeCategoryId ? "true" : "false");
        btn.innerHTML = `<span class="categoryDot"></span><span>${escapeHTML(cat.label)}</span>`;
        btn.addEventListener("click", () => {
          activeCategoryId = cat.id;
          setThemeAccent("comfort");
          renderCategoryButtons();
          renderHomeCards(activeCategoryId);
          renderHomeAside();
          applyVisitedStyles();
          pushAppState({ view:"home", cat: activeCategoryId });
        });
        categoryRow.appendChild(btn);
      });
    }

    function renderHomeCards(categoryId){
      const cat = CATEGORIES.find(c=>c.id===categoryId) || CATEGORIES[0];
      const ids = [...new Set(cat.items)].filter(id => MODULES[id]);

      homeGrid.innerHTML = "";
      ids.forEach(id => {
        const mod = MODULES[id];
        const card = document.createElement("div");
        card.className = "themeCard";
        card.dataset.module = id;

        card.addEventListener("mouseenter", () => setThemeAccent(id));
        card.addEventListener("mouseleave", () => setThemeAccent("comfort"));
        card.addEventListener("click", () => enterModule(id));

        card.innerHTML = `
          <h3>${escapeHTML(mod.title)}</h3>
          <p>${escapeHTML(mod.subtitle)}</p>
          <div class="mini">
            ${(mod.tags||[]).slice(0,3).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join("")}
          </div>
        `;
        homeGrid.appendChild(card);
      });
    }

    function renderHomeAside(){
      const totalModules = Object.keys(MODULES).length;
      const visitedModules = Object.keys(VISITED.modules || {}).length;

      detailTitle.textContent = "Bienvenue";
      detailHint.textContent = "Plus simple : pas de diagrammes lourds, pas de scroll forcé.";

      detailHost.innerHTML = `
        <div class="card">
          <h4><span>Comment utiliser</span><span class="kicker">simple</span></h4>
          <ul>
            <li>Choisir une catégorie puis un thème.</li>
            <li>Ouvrir les sections (accordéon).</li>
            <li>✓ indique ce qui est déjà vu.</li>
            <li>Retour navigateur = fonctionne (History API).</li>
          </ul>
        </div>

        <div class="card">
          <h4><span>Progression</span><span class="kicker">global</span></h4>
          <p class="note">
            Thèmes vus : <strong style="color:var(--accent)">${visitedModules}</strong> / ${totalModules}
          </p>
        </div>
      `;
    }

    /* =========================
      MODULE
    ========================== */
    function enterModule(moduleId, { silentHistory=false } = {}){
      viewMode = "module";
      currentModuleId = moduleId;

      const mod = MODULES[moduleId];
      setThemeAccent(moduleId);

      homeView.classList.add("hidden");
      moduleView.classList.remove("hidden");
      moduleTopbar.classList.remove("hidden");
      miniMap.classList.remove("hidden");

      mainTitle.textContent = mod.title;
      mainSubtitle.textContent = mod.subtitle;
      mainChips.innerHTML = (mod.tags||[]).map(t=>`<div class="chip">${escapeHTML(t)}</div>`).join("");

      buildModuleSelect();
      moduleSelect.value = moduleId;

      renderMiniMap(moduleId);
      renderAccordion(moduleId);

      // ouvrir vue d’ensemble sans auto-scroll
      openSection("core", { silentHistory:true, autoScroll:false });

      markModuleVisited(moduleId);
      updateProgressPill(moduleId);
      applyVisitedStyles();

      renderAsideForNode(moduleId, "core");

      if(!silentHistory){
        pushAppState({ view:"module", cat: activeCategoryId, moduleId, nodeId:"core" });
      }
    }

    function buildModuleSelect(){
      moduleSelect.innerHTML = "";
      Object.keys(MODULES).forEach(id => {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = MODULES[id].title;
        moduleSelect.appendChild(opt);
      });
    }

    function renderMiniMap(moduleId){
      const mod = MODULES[moduleId];
      const order = mod.order || Object.keys(mod.content.nodes);

      miniMap.innerHTML = "";
      order.forEach(nodeId => {
        const label = nodeId === "core" ? "Vue d’ensemble" : (mod.content.nodes[nodeId]?.title || nodeId);
        const pill = document.createElement("button");
        pill.className = "miniPill";
        pill.type = "button";
        pill.dataset.node = nodeId;
        pill.setAttribute("aria-current", nodeId === currentNodeId ? "true" : "false");
        pill.innerHTML = `<span class="miniDot"></span><span>${escapeHTML(label)}</span><span class="miniCheck"></span>`;
        pill.addEventListener("click", () => openSection(nodeId, { autoScroll:false })); // ✅ no scroll
        miniMap.appendChild(pill);
      });
    }

    function renderAccordion(moduleId){
      const mod = MODULES[moduleId];
      const order = mod.order || Object.keys(mod.content.nodes);

      accordionHost.innerHTML = "";
      order.forEach(nodeId => {
        const node = mod.content.nodes[nodeId];
        if(!node) return;

        const item = document.createElement("div");
        item.className = "accItem";
        item.dataset.node = nodeId;
        item.setAttribute("aria-expanded", "false");

        const title = nodeId === "core" ? "Vue d’ensemble" : (node.title || nodeId);

        item.innerHTML = `
          <button class="accHead" type="button">
            <div class="accTitle">
              <span class="miniDot"></span>
              <span>${escapeHTML(title)}</span>
            </div>
            <div class="accMeta">
              <span class="visitBadge" data-badge="${escapeHTML(nodeId)}"> </span>
              <span class="caret"></span>
            </div>
          </button>
          <div class="accBody">
            ${(node.blocks || []).map(b => `
              <div class="kicker">${escapeHTML(b.h || "")}</div>
              <p>${escapeHTML(b.p || "")}</p>
            `).join("")}
          </div>
        `;

        item.querySelector(".accHead").addEventListener("click", () => {
          openSection(nodeId, { autoScroll:false }); // ✅ no scroll
        });

        accordionHost.appendChild(item);
      });
    }

    function openSection(nodeId, { silentHistory=false, autoScroll=false } = {}){
      const mod = MODULES[currentModuleId];
      if(!mod || !mod.content.nodes[nodeId]) return;

      currentNodeId = nodeId;

      accordionHost.querySelectorAll(".accItem").forEach(it => {
        it.setAttribute("aria-expanded", it.dataset.node === nodeId ? "true" : "false");
      });

      markNodeVisited(currentModuleId, nodeId);

      miniMap.querySelectorAll(".miniPill").forEach(p => {
        p.setAttribute("aria-current", p.dataset.node === nodeId ? "true" : "false");
      });

      // ✅ IMPORTANT: pas de scroll forcé (autoScroll=false)
      // Si un jour tu veux l’activer seulement pour deep-link, mets autoScroll=true dans restoreFromState.
      if(autoScroll){
        const el = accordionHost.querySelector(`.accItem[data-node="${cssEscape(nodeId)}"]`);
        if(el) el.scrollIntoView({ behavior:"smooth", block:"center" });
      }

      renderAsideForNode(currentModuleId, nodeId);

      if(!silentHistory){
        pushAppState({ view:"module", cat: activeCategoryId, moduleId: currentModuleId, nodeId });
      }
    }

    function updateProgressPill(moduleId){
      const mod = MODULES[moduleId];
      const nodeIds = Object.keys(mod.content.nodes);
      const total = nodeIds.length;
      let seen = 0;
      nodeIds.forEach(n => { if(isNodeVisited(moduleId, n)) seen++; });

      progressPill.querySelector("strong").textContent = String(seen);
      progressPill.querySelector("span").textContent = String(total);
    }

    function renderAsideForNode(moduleId, nodeId){
      const mod = MODULES[moduleId];
      const node = mod.content.nodes[nodeId] || mod.content.nodes.core;
      const fidesPoints = (mod.content.fides && mod.content.fides[nodeId]) ? mod.content.fides[nodeId] :
                          (mod.content.fides && mod.content.fides.core) ? mod.content.fides.core : [];

      detailTitle.textContent = node.title || "Détail";
      detailHint.textContent = "Accordéon lisible + repère visuel. ✓ pour les sections déjà vues.";

      detailHost.innerHTML = "";

      const expl = document.createElement("div");
      expl.className = "card";
      expl.innerHTML = `<h4><span>Résumé</span><span class="kicker">${escapeHTML(moduleId)} • ${escapeHTML(nodeId)}</span></h4>`;
      (node.blocks || []).slice(0, 2).forEach(b => {
        const p = document.createElement("p");
        p.innerHTML = `<strong style="color:var(--accent)">${escapeHTML(b.h || "")}</strong><br>${escapeHTML(b.p || "")}`;
        expl.appendChild(p);
      });
      detailHost.appendChild(expl);

      const fides = document.createElement("div");
      fides.className = "card";
      fides.innerHTML = `<h4><span>FIDES</span><span class="kicker">démo</span></h4>`;
      if(!fidesPoints.length){
        fides.innerHTML += `<p class="note">Aucun point FIDES défini pour cette section.</p>`;
      }else{
        const ul = document.createElement("ul");
        fidesPoints.forEach(pt => {
          const li = document.createElement("li");
          li.textContent = pt;
          ul.appendChild(li);
        });
        fides.appendChild(ul);
      }
      detailHost.appendChild(fides);
    }

    function applyVisitedStyles(){
      document.querySelectorAll(".themeCard[data-module]").forEach(card=>{
        card.classList.toggle("is-visited", !!VISITED.modules[card.dataset.module]);
      });

      miniMap.querySelectorAll(".miniPill[data-node]").forEach(pill=>{
        const nodeId = pill.dataset.node;
        pill.classList.toggle("is-visited", isNodeVisited(currentModuleId, nodeId));
        const check = pill.querySelector(".miniCheck");
        if(check) check.textContent = isNodeVisited(currentModuleId, nodeId) ? "✓" : "";
      });

      accordionHost.querySelectorAll(".accItem[data-node]").forEach(item=>{
        const nodeId = item.dataset.node;
        const visited = isNodeVisited(currentModuleId, nodeId);
        item.classList.toggle("is-visited", visited);
        const badge = item.querySelector(`[data-badge="${cssEscape(nodeId)}"]`);
        if(badge) badge.textContent = visited ? "✓ vu" : " ";
      });
    }

    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function cssEscape(s){ return String(s).replace(/"/g, '\\"'); }

    /* =========================
      BOOT
    ========================== */
    const backBtnEl = document.getElementById("backBtn");
    const resetBtnEl = document.getElementById("resetVisitedBtn");

    function init(){
      // init history state
      if(!location.search){
        pushAppState({ view:"home", cat:"bases" }, true);
      } else {
        pushAppState(readStateFromURL(), true);
      }
      restoreFromState(readStateFromURL());

      resetBtnEl.addEventListener("click", resetVisited);
    }

    init();
  </script>
</body>
</html>
