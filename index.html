<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support de formation – FIDES & mécanismes émotionnels</title>

  <style>
    /* ============================================================
      DESIGN SYSTEM — Dark + Glass + Accent dynamique
      ------------------------------------------------------------
      ✅ Accents par thème via JS (setThemeAccent)
      ✅ Layout 2 colonnes par défaut + mode Focus 1 colonne (toggle)
    ============================================================ */
    :root{
      --bg0:#070913;
      --bg1:#0b1022;

      --glass: rgba(255,255,255,0.07);
      --glass2: rgba(255,255,255,0.10);
      --stroke: rgba(255,255,255,0.14);

      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --muted2: rgba(255,255,255,0.55);

      --accent: #2de2e6;
      --accent2:#8a5cff;

      --shadow: 0 14px 40px rgba(0,0,0,0.45);
      --radius: 20px;
      --radius2: 26px;

      --focusMaxWidth: 1040px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 650px at 18% 12%, color-mix(in srgb, var(--accent2) 30%, transparent), transparent 60%),
        radial-gradient(760px 520px at 82% 30%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%),
        radial-gradient(680px 520px at 60% 86%, rgba(255,92,214,0.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      overflow: hidden;
    }

    /* ============================================================
      SCROLLBARS — "glass" plus discret (moins contraste / plus fin)
      ------------------------------------------------------------
      Note: jamais 100% identique sur tous OS, mais plus intégré.
    ============================================================ */
    *{
      scrollbar-width: thin; /* Firefox */
      scrollbar-color:
        color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.18))
        rgba(0,0,0,0.22);
    }
    ::-webkit-scrollbar{ width: 8px; height: 8px; }
    ::-webkit-scrollbar-track{
      background: rgba(0,0,0,0.18);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb{
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent2) 35%, rgba(255,255,255,0.10)),
        color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.10))
      );
      border: 2px solid rgba(0,0,0,0.18);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover{
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.12)),
        color-mix(in srgb, var(--accent) 45%, rgba(255,255,255,0.12))
      );
    }

    /* ============================================================
      LAYOUT — 2 colonnes par défaut
      [contenu] | [aside]
      ------------------------------------------------------------
      Mode focus 1 colonne: body.focus-mode -> aside devient dessous
    ============================================================ */
    .app{
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 14px;
      padding: 14px;
      align-items: stretch;
    }

    .panel{
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
      min-height: 0; /* important pour scroll interne */
    }

    body.focus-mode .app{
      grid-template-columns: 1fr;
      max-width: var(--focusMaxWidth);
      margin: 0 auto;
    }
    body.focus-mode .aside{
      height: auto;
      max-height: none;
    }

    /* ============================================================
      MAIN
    ============================================================ */
    .main{ display:flex; flex-direction:column; overflow:hidden; min-height:0; }

    .main__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
    }
    .titleblock h2{ margin:0; font-size: 18px; font-weight: 900; letter-spacing:.2px; }
    .titleblock p{ margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .chiprow{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 10px; }
    .chip{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.82);
      user-select:none;
    }
    .chip strong{ color: var(--accent); font-weight: 900; }

    .canvas{
      padding: 14px;
      height: 100%;
      overflow:auto;
      min-height:0;
    }

    /* ============================================================
      TOPBAR (module) — retour + select + focus toggle + progression
    ============================================================ */
    .topbar{
      padding: 10px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    }
    .topbar__left, .topbar__right{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      min-width: 0;
    }

    .btn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 10px;
      cursor:pointer;
      transition: background .18s ease, transform .12s ease, border-color .18s ease;
      font-weight: 800;
      font-size: 12.5px;
      white-space: nowrap;
    }
    .btn:hover{
      background: rgba(255,255,255,0.07);
      border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .btn--accent{
      border-color: color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.14));
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--accent2) 18%, rgba(0,0,0,0.18)),
        color-mix(in srgb, var(--accent) 9%, rgba(0,0,0,0.18))
      );
    }
    .btn[aria-pressed="true"]{
      background: color-mix(in srgb, var(--accent2) 16%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
    }

    select{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.88);
      border-radius: 14px;
      padding: 9px 10px;
      font-weight: 760;
      font-size: 12.5px;
      outline: none;
      max-width: 360px;
    }

    .progressPill{
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
    }
    .progressPill strong{ color: var(--accent); font-weight: 900; }

    /* ============================================================
      HOME — catégories + cartes thèmes (léger)
    ============================================================ */
    .homeTop{
      display:flex;
      flex-direction:column;
      gap: 10px;
      margin-bottom: 12px;
    }
    .categoryRow{
      display:flex;
      gap: 8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .categoryBtn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 860;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .categoryBtn:hover{
      background: rgba(255,255,255,0.06);
      border-color: color-mix(in srgb, var(--accent) 25%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .categoryBtn[aria-pressed="true"]{
      background: color-mix(in srgb, var(--accent2) 16%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
    }
    .categoryDot{
      width:8px; height:8px; border-radius:99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 8%, transparent);
    }

    .homeGrid{
      display:grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .themeCard{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: 18px;
      padding: 14px;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      position: relative;
      overflow:hidden;
      min-height: 92px;
    }
    .themeCard:hover{
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent2) 38%, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.05);
    }
    .themeCard h3{
      margin:0;
      font-size: 14px;
      font-weight: 940;
      line-height: 1.25;
    }
    .themeCard p{
      margin:6px 0 0;
      color: rgba(255,255,255,0.70);
      font-size: 12.5px;
      line-height:1.35;
    }
    .themeCard .mini{
      margin-top:10px;
      display:flex; gap:8px; flex-wrap:wrap;
      color: rgba(255,255,255,0.70);
      font-size: 12px;
    }
    .tag{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      padding: 5px 9px;
      border-radius: 999px;
    }

    /* Thèmes visités */
    .themeCard.is-visited{
      border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.14));
    }
    .themeCard.is-visited::after{
      content: "✓ vu";
      position:absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      font-weight: 900;
      color: rgba(255,255,255,0.88);
      background: color-mix(in srgb, var(--accent) 14%, rgba(0,0,0,0.25));
      border: 1px solid rgba(255,255,255,0.12);
      padding: 5px 8px;
      border-radius: 999px;
    }

    /* ============================================================
      MODULE — mini repère visuel (pills) + accordéon (fonctionnel)
      ------------------------------------------------------------
      -> Remplace les diagrammes : plus clair, moins cognitif.
    ============================================================ */
    .miniMap{
      padding: 10px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items:center;
    }
    .miniPill{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 860;
      cursor: pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      display:flex; align-items:center; gap:8px;
    }
    .miniPill:hover{
      background: rgba(255,255,255,0.06);
      border-color: color-mix(in srgb, var(--accent) 25%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .miniPill[aria-current="true"]{
      background: color-mix(in srgb, var(--accent2) 14%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.14));
    }
    .miniDot{
      width:8px; height:8px; border-radius: 99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 8%, transparent);
    }
    .miniCheck{
      font-weight: 900;
      opacity: .9;
      margin-left: 2px;
    }
    .miniPill.is-visited{
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
      background: color-mix(in srgb, var(--accent) 8%, rgba(0,0,0,0.14));
    }

    /* Accordéon */
    .accordion{
      display:flex;
      flex-direction:column;
      gap: 10px;
      padding: 14px 0 0;
    }
    .accItem{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: var(--radius);
      overflow:hidden;
    }
    .accHead{
      width: 100%;
      text-align:left;
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background: transparent;
      border: none;
      color: var(--text);
      cursor:pointer;
    }
    .accHead:hover{
      background: rgba(255,255,255,0.04);
    }
    .accTitle{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight: 920;
      font-size: 13px;
    }
    .accMeta{
      display:flex;
      align-items:center;
      gap:10px;
      color: rgba(255,255,255,0.70);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .caret{
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(255,255,255,0.62);
      border-bottom: 2px solid rgba(255,255,255,0.62);
      transform: rotate(-45deg);
      transition: transform .18s ease;
      opacity: .85;
    }
    .accItem[aria-expanded="true"] .caret{
      transform: rotate(45deg);
    }

    .accBody{
      padding: 0 14px 14px;
      display:none;
    }
    .accItem[aria-expanded="true"] .accBody{ display:block; }

    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 12px 0 6px;
    }
    .accBody p, .accBody li{
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      line-height: 1.55;
      margin: 0 0 8px;
    }
    .accBody ul{ margin: 6px 0 0 18px; }

    /* Visited pour accordéon */
    .accItem.is-visited{
      border-color: color-mix(in srgb, var(--accent) 30%, rgba(255,255,255,0.12));
    }
    .visitBadge{
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: color-mix(in srgb, var(--accent) 12%, rgba(0,0,0,0.18));
      color: rgba(255,255,255,0.82);
      font-size: 11px;
      font-weight: 900;
    }

    /* ============================================================
      ASIDE — explications
    ============================================================ */
    .aside{ display:flex; flex-direction:column; overflow:hidden; min-height:0; }
    .aside__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .aside__header h3{ margin:0; font-size: 14px; font-weight: 900; }
    .aside__header p{ margin: 6px 0 0; color: var(--muted2); font-size: 12.5px; line-height: 1.4; }
    .aside__content{ padding: 14px 18px 18px; overflow:auto; min-height:0; }

    .card{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h4{
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 900;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .card p, .card li{
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      line-height: 1.55;
    }
    .note{ font-size: 12px; color: rgba(255,255,255,0.62); line-height: 1.45; }
    .callout{
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      margin: 10px 0;
      color: rgba(255,255,255,0.86);
    }

    /* ============================================================
      UTILITAIRES
    ============================================================ */
    .hidden{ display:none !important; }

    /* ============================================================
      RESPONSIVE — 1 colonne plus tôt (comme ton ressenti “110% top”)
    ============================================================ */
    @media (max-width: 1500px){
      body{ overflow:auto; }
      .app{
        height:auto;
        min-height:100%;
        grid-template-columns: 1fr;
      }
      .homeGrid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- ================================
      MAIN (Accueil + Module)
    ================================= -->
    <main class="panel main" aria-label="Contenu">
      <div class="main__header">
        <div class="titleblock">
          <h2 id="mainTitle">Accueil</h2>
          <p id="mainSubtitle">Choisis une catégorie, puis un thème. Navigation “app-like” (retour navigateur pris en charge).</p>
          <div class="chiprow" id="mainChips"></div>
        </div>
        <div class="chip"><strong>Lisible</strong> & progressif</div>
      </div>

      <!-- TOPBAR (uniquement en module) -->
      <div class="topbar hidden" id="moduleTopbar">
        <div class="topbar__left">
          <button class="btn btn--accent" id="backBtn" type="button">← Retour</button>
          <select id="moduleSelect" aria-label="Changer de thème"></select>
          <span class="progressPill" id="progressPill"><strong>0</strong>/<span>0</span> sections vues</span>
        </div>
        <div class="topbar__right">
          <button class="btn" id="focusBtn" type="button" aria-pressed="false">Mode focus</button>
          <button class="btn" id="resetVisitedBtn" type="button" title="Réinitialiser les ✓ (localStorage)">Reset ✓</button>
        </div>
      </div>

      <!-- MINI MAP (uniquement en module) -->
      <div class="miniMap hidden" id="miniMap"></div>

      <div class="canvas">
        <!-- HOME VIEW -->
        <section id="homeView">
          <div class="homeTop">
            <div class="categoryRow" id="categoryRow"></div>
          </div>
          <div class="homeGrid" id="homeGrid"></div>
        </section>

        <!-- MODULE VIEW -->
        <section id="moduleView" class="hidden">
          <div class="accordion" id="accordionHost"></div>
        </section>
      </div>
    </main>

    <!-- ================================
      ASIDE (Explications / FIDES)
    ================================= -->
    <aside class="panel aside" aria-label="Explications">
      <div class="aside__header">
        <h3 id="detailTitle">Bienvenue</h3>
        <p id="detailHint">Choisis une catégorie puis un thème.</p>
      </div>
      <div class="aside__content" id="detailHost"></div>
    </aside>
  </div>

  <script>
    /* ============================================================
      1) COULEURS PAR THÈME (accent dynamique)
    ============================================================ */
    const THEME_COLORS = {
      comfort:    { accent:"#2de2e6", accent2:"#8a5cff" },
      emotions:   { accent:"#38f2a5", accent2:"#2de2e6" },
      empathy:    { accent:"#2de2e6", accent2:"#ff5cd6" },
      addictions: { accent:"#ffb020", accent2:"#ff5cd6" },
      values:     { accent:"#8a5cff", accent2:"#2de2e6" },
      dogmas:     { accent:"#c7a6ff", accent2:"#8a5cff" },
      betrayal:   { accent:"#ff5cd6", accent2:"#8a5cff" },
      abandonment:{ accent:"#2de2e6", accent2:"#38f2a5" },
      rejection:  { accent:"#ffb020", accent2:"#2de2e6" },
      humiliation:{ accent:"#ff5cd6", accent2:"#ffb020" },
      injustice:  { accent:"#8a5cff", accent2:"#ffb020" },
    };

    function setThemeAccent(moduleId){
      const c = THEME_COLORS[moduleId] || { accent:"#2de2e6", accent2:"#8a5cff" };
      document.documentElement.style.setProperty("--accent", c.accent);
      document.documentElement.style.setProperty("--accent2", c.accent2);
    }

    /* ============================================================
      2) VISITED STATE (localStorage) — modules + sections (nodeId)
         -> Permet de voir où tu as déjà cliqué.
    ============================================================ */
    const LS_KEY = "fides_training_visited_v3";

    function loadVisited(){
      try{ return JSON.parse(localStorage.getItem(LS_KEY)) || { modules:{}, nodes:{} }; }
      catch{ return { modules:{}, nodes:{} }; }
    }
    function saveVisited(state){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

    let VISITED = loadVisited();

    function markModuleVisited(moduleId){
      VISITED.modules[moduleId] = true;
      saveVisited(VISITED);
      applyVisitedStyles();
    }
    function markNodeVisited(moduleId, nodeId){
      if(!VISITED.nodes[moduleId]) VISITED.nodes[moduleId] = {};
      VISITED.nodes[moduleId][nodeId] = true;
      saveVisited(VISITED);
      applyVisitedStyles();
      updateProgressPill(moduleId);
    }
    function isNodeVisited(moduleId, nodeId){
      return !!(VISITED.nodes[moduleId] && VISITED.nodes[moduleId][nodeId]);
    }

    function resetVisited(){
      VISITED = { modules:{}, nodes:{} };
      saveVisited(VISITED);
      applyVisitedStyles();
      if(viewMode === "home") renderHomeAside();
      if(viewMode === "module") updateProgressPill(currentModuleId);
    }

    /* ============================================================
      3) HISTORY API — Back/Forward navigateur (SPA)
      ------------------------------------------------------------
      - pushState à chaque navigation (home/module/section)
      - popstate restore la vue
    ============================================================ */
    function makeURLFromState(state){
      const p = new URLSearchParams();
      p.set("view", state.view || "home");
      if(state.cat) p.set("cat", state.cat);
      if(state.moduleId) p.set("m", state.moduleId);
      if(state.nodeId) p.set("n", state.nodeId);
      if(state.focus) p.set("focus", "1");
      return `${location.pathname}?${p.toString()}`;
    }

    function pushAppState(state, replace=false){
      const url = makeURLFromState(state);
      if(replace) history.replaceState(state, "", url);
      else history.pushState(state, "", url);
    }

    function readStateFromURL(){
      const p = new URLSearchParams(location.search);
      const view = p.get("view") || "home";
      return {
        view,
        cat: p.get("cat") || null,
        moduleId: p.get("m") || null,
        nodeId: p.get("n") || null,
        focus: p.get("focus") === "1"
      };
    }

    window.addEventListener("popstate", (e) => {
      const state = e.state || readStateFromURL();
      restoreFromState(state);
    });

    function restoreFromState(state){
      // Focus mode
      setFocusMode(!!state.focus, true);

      if(state.view === "module" && state.moduleId){
        enterModule(state.moduleId, { silentHistory:true });

    /* ============================================================

    ============================================================ */
    function setFocusMode(enabled, silentHistory=false){
      document.body.classList.toggle("focus-mode", !!enabled);
      focusBtn.setAttribute("aria-pressed", enabled ? "true" : "false");
      focusBtn.textContent = enabled ? "Focus: ON" : "Mode focus";

      if(!silentHistory){
        // Ajoute le flag focus à l'état courant
        const state = currentAppState();
        state.focus = !!enabled;
        pushAppState(state, true);
      }
    }

    function currentAppState(){
      if(viewMode === "module"){
        return {
          view: "module",
          cat: activeCategoryId,
          moduleId: currentModuleId,
          nodeId: currentNodeId,
          focus: document.body.classList.contains("focus-mode")
        };
      }
      return {

        cat: activeCategoryId,
        moduleId: null,
        nodeId: null,
        focus: document.body.classList.contains("focus-mode")
      };

        const card = document.createElement("div");
        card.className = "themeCard";
        card.dataset.module = id;

        card.addEventListener("mouseenter", () => setThemeAccent(id));
        card.addEventListener("mouseleave", () => setThemeAccent("comfort"));
        card.addEventListener("click", () => enterModule(id));

        card.innerHTML = `
          <h3>${escapeHTML(mod.title)}</h3>
          <p>${escapeHTML(mod.subtitle)}</p>
          <div class="mini">
            ${(mod.tags||[]).slice(0,3).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join("")}
          </div>
        `;
        homeGrid.appendChild(card);
      });
    }

    function renderHomeAside(){
      const totalModules = Object.keys(MODULES).length;
      const visitedModules = Object.keys(VISITED.modules || {}).length;

      detailTitle.textContent = "Bienvenue";
      detailHint.textContent = "Objectif : simple, lisible, et progression visible.";

      detailHost.innerHTML = `
        <div class="card">
          <h4><span>Comment utiliser</span><span class="kicker">simple</span></h4>
          <ul>
            <li>Choisir une <strong>catégorie</strong> puis un <strong>thème</strong>.</li>
            <li>Ouvrir les <strong>sections</strong> (accordéon).</li>
            <li>✓ indique ce qui est déjà exploré.</li>
            <li>Le bouton <strong>Retour navigateur</strong> fonctionne (SPA).</li>
          </ul>
        </div>

        <div class="card">
          <h4><span>Progression</span><span class="kicker">global</span></h4>
          <p class="note">
            Thèmes vus : <strong style="color:var(--accent)">${visitedModules}</strong> / ${totalModules}
          </p>
          <div class="callout note">
            Conseil test avec Mélanie : choisissez 1 blessure → ouvrez 3 sections → voyez si c’est fluide et “reposant”.
          </div>
        </div>

        <div class="card">
          <h4><span>FIDES (démo)</span><span class="kicker">méthode</span></h4>
          <ul>
            <li><strong>F</strong> — ${escapeHTML(FIDES_DEMO.F)}</li>
            <li><strong>I</strong> — ${escapeHTML(FIDES_DEMO.I)}</li>
            <li><strong>D</strong> — ${escapeHTML(FIDES_DEMO.D)}</li>
            <li><strong>E</strong> — ${escapeHTML(FIDES_DEMO.E)}</li>
            <li><strong>S</strong> — ${escapeHTML(FIDES_DEMO.S)}</li>
          </ul>
        </div>
      `;
    }

    /* ============================================================
      MODULE
    ============================================================ */
    function enterModule(moduleId, { silentHistory=false } = {}){
      viewMode = "module";
      currentModuleId = moduleId;

      const mod = MODULES[moduleId];
      setThemeAccent(moduleId);

      homeView.classList.add("hidden");
      moduleView.classList.remove("hidden");
      moduleTopbar.classList.remove("hidden");
      miniMap.classList.remove("hidden");

      mainTitle.textContent = mod.title;
      mainSubtitle.textContent = mod.subtitle;
      mainChips.innerHTML = (mod.tags||[]).map(t=>`<div class="chip">${escapeHTML(t)}</div>`).join("");

      buildModuleSelect();
      moduleSelect.value = moduleId;

      renderMiniMap(moduleId);
      renderAccordion(moduleId);

      // Par défaut : ouvrir la vue d’ensemble
      openSection("core", { silentHistory:true, scrollIntoView:false });

      markModuleVisited(moduleId);
      updateProgressPill(moduleId);
      applyVisitedStyles();

      renderAsideForNode(moduleId, "core");

      if(!silentHistory){
        pushAppState({
          view:"module",
          cat: activeCategoryId,
          moduleId,
          nodeId: "core",
          focus: document.body.classList.contains("focus-mode")
        });
      }
    }

    function buildModuleSelect(){
      moduleSelect.innerHTML = "";
      Object.keys(MODULES).forEach(id => {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = MODULES[id].title;
        moduleSelect.appendChild(opt);
      });
    }

    function renderMiniMap(moduleId){
      const mod = MODULES[moduleId];
      const order = mod.order || Object.keys(mod.content.nodes);

      miniMap.innerHTML = "";
      order.forEach(nodeId => {
        const label = nodeId === "core" ? "Vue d’ensemble" : (mod.content.nodes[nodeId]?.title || nodeId);

        const pill = document.createElement("button");
        pill.className = "miniPill";
        pill.type = "button";
        pill.dataset.node = nodeId;
        pill.setAttribute("aria-current", nodeId === currentNodeId ? "true" : "false");

        pill.innerHTML = `
          <span class="miniDot"></span>
          <span>${escapeHTML(label)}</span>
          <span class="miniCheck"></span>
        `;

        pill.addEventListener("click", () => {
          openSection(nodeId);
        });

        miniMap.appendChild(pill);
      });
    }

    function renderAccordion(moduleId){
      const mod = MODULES[moduleId];
      const order = mod.order || Object.keys(mod.content.nodes);

      accordionHost.innerHTML = "";
      order.forEach(nodeId => {
        const node = mod.content.nodes[nodeId];
        if(!node) return;

        const item = document.createElement("div");
        item.className = "accItem";
        item.dataset.node = nodeId;
        item.setAttribute("aria-expanded", "false");

        const title = nodeId === "core" ? "Vue d’ensemble" : (node.title || nodeId);

        item.innerHTML = `
          <button class="accHead" type="button" aria-label="Ouvrir ${escapeHTML(title)}">
            <div class="accTitle">
              <span class="miniDot"></span>
              <span>${escapeHTML(title)}</span>
            </div>
            <div class="accMeta">
              <span class="visitBadge" data-badge="${escapeHTML(nodeId)}"> </span>
              <span class="caret"></span>
            </div>
          </button>
          <div class="accBody">
            ${(node.blocks || []).map(b => `
              <div class="kicker">${escapeHTML(b.h || "")}</div>
              <p>${escapeHTML(b.p || "")}</p>
            `).join("")}
          </div>
        `;

        // Click header
        item.querySelector(".accHead").addEventListener("click", () => {
          openSection(nodeId);
        });

        accordionHost.appendChild(item);
      });
    }

    function openSection(nodeId, { silentHistory=false, scrollIntoView=true } = {}){
      const mod = MODULES[currentModuleId];
      if(!mod || !mod.content.nodes[nodeId]) return;

      currentNodeId = nodeId;

      // Collapse all, expand current
      accordionHost.querySelectorAll(".accItem").forEach(it => {
        it.setAttribute("aria-expanded", it.dataset.node === nodeId ? "true" : "false");
      });

      // Mark visited
      markNodeVisited(currentModuleId, nodeId);

      // Update miniMap current
      miniMap.querySelectorAll(".miniPill").forEach(p => {
        p.setAttribute("aria-current", p.dataset.node === nodeId ? "true" : "false");
      });

      // Scroll into view
      if(scrollIntoView){
        const el = accordionHost.querySelector(`.accItem[data-node="${cssEscape(nodeId)}"]`);
        if(el) el.scrollIntoView({ behavior:"smooth", block:"start" });
      }

      // Update aside
      renderAsideForNode(currentModuleId, nodeId);

      // History
      if(!silentHistory){
        pushAppState({
          view:"module",
          cat: activeCategoryId,
          moduleId: currentModuleId,
          nodeId,
          focus: document.body.classList.contains("focus-mode")
        });
      }
    }

    function updateProgressPill(moduleId){
      const mod = MODULES[moduleId];
      const nodeIds = Object.keys(mod.content.nodes);
      const total = nodeIds.length;
      let seen = 0;
      nodeIds.forEach(n => { if(isNodeVisited(moduleId, n)) seen++; });

      progressPill.querySelector("strong").textContent = String(seen);
      progressPill.querySelector("span").textContent = String(total);
    }

    function renderAsideForNode(moduleId, nodeId){
      const mod = MODULES[moduleId];
      const node = mod.content.nodes[nodeId] || mod.content.nodes.core;
      const fidesPoints = (mod.content.fides && mod.content.fides[nodeId]) ? mod.content.fides[nodeId] :
                          (mod.content.fides && mod.content.fides.core) ? mod.content.fides.core : [];

      detailTitle.textContent = node.title || "Détail";
      detailHint.textContent = "Sections claires (accordéon) + repère visuel + progression.";

      detailHost.innerHTML = "";

      const expl = document.createElement("div");
      expl.className = "card";
      expl.innerHTML = `<h4><span>Résumé de la section</span><span class="kicker">${escapeHTML(moduleId)} • ${escapeHTML(nodeId)}</span></h4>`;
      (node.blocks || []).slice(0, 2).forEach(b => {
        const p = document.createElement("p");
        p.innerHTML = `<strong style="color:var(--accent)">${escapeHTML(b.h || "")}</strong><br>${escapeHTML(b.p || "")}`;
        expl.appendChild(p);
      });
      detailHost.appendChild(expl);

      const fides = document.createElement("div");
      fides.className = "card";
      fides.innerHTML = `<h4><span>Points clés FIDES</span><span class="kicker">démo</span></h4>`;
      if(!fidesPoints.length){
        fides.innerHTML += `<p class="note">Aucun point FIDES défini pour cette section.</p>`;
      }else{
        const ul = document.createElement("ul");
        fidesPoints.forEach(pt => {
          const li = document.createElement("li");
          li.textContent = pt;
          ul.appendChild(li);
        });
        fides.appendChild(ul);
      }
      detailHost.appendChild(fides);

      const help = document.createElement("div");
      help.className = "card";
      help.innerHTML = `
        <h4><span>Navigation</span><span class="kicker">UX</span></h4>
        <p class="note">
          ✓ = déjà vu • Retour navigateur = fonctionne • Mode focus = 1 colonne.
        </p>
        <div class="callout note">
          Si vous trouvez que la lecture est meilleure en focus : activez-le et gardez-le.
        </div>
      `;
      detailHost.appendChild(help);
    }

    /* ============================================================
      VISITED STYLES application (home + miniMap + accordion)
    ============================================================ */
    function applyVisitedStyles(){
      // Home cards
      document.querySelectorAll(".themeCard[data-module]").forEach(card=>{
        card.classList.toggle("is-visited", !!VISITED.modules[card.dataset.module]);
      });

      // miniMap pills
      miniMap.querySelectorAll(".miniPill[data-node]").forEach(pill=>{
        const nodeId = pill.dataset.node;
        pill.classList.toggle("is-visited", isNodeVisited(currentModuleId, nodeId));
        const check = pill.querySelector(".miniCheck");
        if(check) check.textContent = isNodeVisited(currentModuleId, nodeId) ? "✓" : "";
      });

      // accordion items + badges
      accordionHost.querySelectorAll(".accItem[data-node]").forEach(item=>{
        const nodeId = item.dataset.node;
        const visited = isNodeVisited(currentModuleId, nodeId);
        item.classList.toggle("is-visited", visited);
        const badge = item.querySelector(`[data-badge="${cssEscape(nodeId)}"]`);
        if(badge) badge.textContent = visited ? "✓ vu" : " ";
      });
    }

    /* ============================================================
      HELPERS
    ============================================================ */
    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function cssEscape(s){ return String(s).replace(/"/g, '\\"'); }

    /* ============================================================
      INIT
      - On initialise l'historique -> back/forward OK
    ============================================================ */
    function boot(){
      // état initial par défaut (si URL vide)
      if(!location.search){
        pushAppState({ view:"home", cat:"bases", focus:false }, true);
      }
      initHistory();
    }

    boot();
  </script>
</body>
</html>
