<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>La méthode FIDES — Atlas</title>

  <style>
    :root{
      /* FOND UNI (plus de dégradés) */
      --bg0:#0b0e14;

      /* Surfaces sobres */
      --panel: rgba(255,255,255,0.04);
      --navbg: rgba(0,0,0,0.14);
      --card: rgba(0,0,0,0.16);
      --stroke: rgba(255,255,255,0.10);

      /* Texte */
      --text: rgba(255,255,255,0.90);
      --muted: rgba(255,255,255,0.60);

      /* Accent ultra sobre */
      --accent: rgba(185,200,220,0.35);

      --shadow: 0 10px 26px rgba(0,0,0,0.45);
      --radius2: 20px;
      --radius: 16px;
      --maxw: 1180px;

      /* Scrollbar inset (comme ton ancien esprit) */
      --sbSize: 8px;
      --sbPad: 12px;
      --sbTrack: rgba(0,0,0,0.18);
      --sbThumb1: rgba(205,215,235,0.22);
      --sbThumb2: rgba(205,215,235,0.14);
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg0);
      color: var(--text);
    }

    .app{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 16px;
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow:hidden;
      min-height: calc(100vh - 32px);
      display:flex;
      flex-direction:column;
    }

    /* ============ HEADER ============ */
    header{
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 12px;
      background: rgba(0,0,0,0.10);
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 14px;
      min-width: 0;
    }

    /* Logo GRAND, sans gadget */
    .logoWrap{
      display:flex;
      align-items:center;
      gap: 12px;
    }

    .logo{
      height: 62px; /* <-- plus grand */
      width: auto;
      display:block;
      object-fit: contain;
      background: rgba(255,255,255,0.96);
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(0,0,0,0.10);
    }

    .titleBox{
      min-width: 0;
    }
    header h1{
      margin:0;
      font-size: 15.5px;
      font-weight: 900;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    header p{
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12.6px;
      line-height: 1.35;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    /* Bouton menu : uniquement utile sur mobile */
    .btn{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 11px;
      cursor:pointer;
      font-weight: 820;
      font-size: 12.5px;
      white-space: nowrap;
    }
    .btn:hover{ border-color: rgba(255,255,255,0.18); }

    /* ============ LAYOUT ============ */
    .content{
      display:grid;
      grid-template-columns: 320px 1fr;
      min-height:0;
      flex:1;
    }

    /* Scroll areas */
    .scrollArea{
      overflow:auto;
      padding-right: var(--sbPad);
      scrollbar-gutter: stable both-edges;
    }

    /* Scrollbar intégrée (Firefox + Webkit) */
    .scrollArea{
      scrollbar-width: thin;
      scrollbar-color: rgba(205,215,235,0.28) var(--sbTrack);
    }
    .scrollArea::-webkit-scrollbar{ width: var(--sbSize); height: var(--sbSize); }
    .scrollArea::-webkit-scrollbar-track{
      background: var(--sbTrack);
      border-radius: 999px;
      margin: 10px;               /* inset */
    }
    .scrollArea::-webkit-scrollbar-thumb{
      background: linear-gradient(180deg, var(--sbThumb1), var(--sbThumb2));
      border: 2px solid var(--sbTrack);
      border-radius: 999px;
    }
    .scrollArea::-webkit-scrollbar-thumb:hover{
      background: linear-gradient(180deg,
        rgba(205,215,235,0.30),
        rgba(205,215,235,0.18)
      );
    }

    nav{
      border-right: 1px solid rgba(255,255,255,0.08);
      background: var(--navbg);
      padding: 14px;
      min-height:0;
    }

    main{
      padding: 16px;
      min-height:0;
    }

    /* ============ NAV ============ */
    .navSection{
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .navTitle{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 4px 0 10px;
    }
    .navItem{
      width:100%;
      text-align:left;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.12);
      color: rgba(255,255,255,0.90);
      border-radius: 14px;
      padding: 10px 10px;
      cursor:pointer;
      font-weight: 820;
      font-size: 12.8px;
      margin-bottom: 8px;
    }
    .navItem:hover{
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
    }
    .navItem[aria-current="page"]{
      border-color: rgba(205,215,235,0.25);
      background: rgba(205,215,235,0.08);
    }
    .navSmall{
      display:block;
      margin-top: 3px;
      color: rgba(255,255,255,0.60);
      font-size: 11.4px;
      font-weight: 650;
      line-height: 1.25;
    }

    /* ============ CONTENT ============ */
    .card{
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }
    .lead{
      font-size: 14px;
      font-weight: 900;
      margin: 0 0 8px;
      line-height: 1.35;
    }
    p, li{
      color: rgba(255,255,255,0.86);
      font-size: 13.2px;
      line-height: 1.6;
    }
    ul{ margin: 8px 0 0 18px; }

    .mapGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .mapTile{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.12);
      border-radius: 16px;
      padding: 14px;
      cursor:pointer;
    }
    .mapTile:hover{
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
    }
    .mapTile h3{
      margin:0;
      font-size: 14.5px;
      font-weight: 940;
      line-height: 1.25;
    }
    .mapTile p{
      margin: 7px 0 0;
      color: rgba(255,255,255,0.70);
      font-size: 12.6px;
      line-height: 1.45;
    }

    .woundGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .row{
      display:grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.10);
    }
    @media (max-width: 740px){
      .row{ grid-template-columns: 1fr; }
    }
    .label{
      font-weight: 950;
      font-size: 12.8px;
      color: rgba(255,255,255,0.88);
    }
    .value{
      color: rgba(255,255,255,0.84);
      font-size: 13.2px;
      line-height: 1.6;
    }

    /* ============ MOBILE ============ */
    .backdrop{
      display:none;
    }

    @media (max-width: 980px){
      .content{ grid-template-columns: 1fr; }

      /* nav en drawer */
      nav{
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: min(420px, calc(100% - 56px));
        transform: translateX(-110%);
        transition: transform .14s ease;
        z-index: 50;
        border-right: 1px solid rgba(255,255,255,0.10);
        box-shadow: 0 20px 70px rgba(0,0,0,0.60);
        border-top-right-radius: 18px;
        border-bottom-right-radius: 18px;
      }
      nav[data-open="true"]{ transform: translateX(0); }

      .backdrop{
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 40;
        display:none;
      }
      .backdrop[data-open="true"]{ display:block; }
    }

    /* Sur desktop, on cache le bouton menu car inutile */
    @media (min-width: 981px){
      #menuBtn{ display:none; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">

      <header>
        <div class="brand">
          <div class="logoWrap" id="logoBtn" title="Accueil" style="cursor:pointer;">
            <img class="logo" src="image.png" alt="LA MÉTHODE FIDES" />
          </div>

          <div class="titleBox">
            <h1 id="pageTitle">Carte du système</h1>
            <p id="pageSubtitle">Socles • Blessures • Référentiels</p>
          </div>
        </div>

        <button class="btn" id="menuBtn" type="button">Menu</button>
      </header>

      <div class="content">
        <div class="backdrop" id="backdrop" data-open="false"></div>
        <nav class="scrollArea" id="nav" data-open="false" aria-label="Menu"></nav>
        <main class="scrollArea" id="main"></main>
      </div>

    </div>
  </div>

  <script>
    const PAGES = [
      { id:"home", type:"HOME", title:"Carte du système", subtitle:"Socles • Blessures • Référentiels" },

      { id:"socle_confort", type:"SOCLE", title:"Le cercle de la zone de confort",
        subtitle:"Confort → Peur → Apprentissage → Expansion.",
        content: [
          { kicker:"But pédagogique", lead:"Montrer les différentes zones (confort, peur, apprentissage, expansion).", bullets:[
            "Zone de confort = sécurité illusoire, répétition des habitudes, évitement de l’inconfort.",
            "Zone de peur = doutes, jugements des autres, perte de repères.",
            "Zone d’apprentissage = nouvelles compétences, élargissement de soi, expérimentation.",
            "Zone d’expansion = réalisation de soi, alignement avec sa valeur, contribution au monde."
          ]},
          { kicker:"Message clé", lead:"Pour avancer, il faut oser franchir la peur et passer par l’apprentissage.", text:
            "Sans ce passage, on reste prisonnier de l’illusion de sécurité."
          }
        ]
      },

      { id:"socle_apathie_empathie", type:"SOCLE", title:"Blessures émotionnelles : apathie ↔ empathie",
        subtitle:"Apathie = fermeture émotionnelle protectrice ; empathie = réouverture.",
        content: [
          { kicker:"Point central", lead:"Quand une blessure s’active, l’apathie prend le dessus.", text:
            "Ici, l’apathie n’est pas une absence d’émotion au sens médical : c’est un état de fermeture émotionnelle qui se met en place quand une douleur ancienne se réveille."
          },
          { kicker:"Fonction", lead:"Réaction inconsciente de protection / mode de survie émotionnel.", text:
            "En reconnaissant cette fermeture et en la traversant avec bienveillance, on peut retrouver la connexion à soi, à l’autre et à la vie."
          },
          { kicker:"Finalité", lead:"Ouverture de conscience : acceptation de soi et de l’autre, sans jugement.", text:
            "Quels que soient les comportements observés."
          }
        ]
      },

      { id:"socle_empathie", type:"SOCLE", title:"L’empathie",
        subtitle:"Résonance sans fusion.",
        content: [
          { kicker:"Définition", lead:"Capacité à se mettre en résonance avec l’émotion de l’autre, sans se confondre avec elle." },
          { kicker:"Différences", lead:"Empathie vs compassion / sympathie.", bullets:[
            "Empathie vs compassion : l’une ressent, l’autre agit.",
            "Empathie vs sympathie : l’une écoute, l’autre se projette."
          ]},
          { kicker:"Freins à l’empathie", lead:"Les blessures émotionnelles voilent l’empathie.", bullets:[
            "Rejet : envie de s’isoler / se couper.",
            "Injustice : rigidité, contrôle de soi.",
            "Trahison : méfiance / suspicion.",
            "Humiliation : honte, fuite du contact.",
            "Abandon : besoin de combler le vide avant d’écouter."
          ]},
          { kicker:"Message clé", lead:"L’empathie est naturelle, mais elle est voilée par nos blessures." }
        ]
      },

      { id:"w_rejet", type:"BLESSURE", title:"Blessure : rejet", subtitle:"Émotion racine : tristesse.",
        grid: [
          ["Émotion", "Tristesse."],
          ["Origine", "Très tôt. Sentiment de ne pas avoir sa place, de déranger, d’être de trop."],
          ["Masque / comportement", "Masque du fuyant : se retirer, se couper, se rendre invisible. Difficulté à s’affirmer, peur de déranger."],
          ["Empathie (note)", "Difficulté à s’ouvrir par peur d’être ignoré ; peut se couper des autres pour éviter de revivre le rejet."],
          ["Addictions", "Isolement, écrans, alimentation compulsive discrète (addictions solitaires)."],
          ["Valeurs de vie", "Sécurité intérieure, acceptation de la différence de l’autre, autonomie, foi en la vie et en l’humain, amour."],
          ["Conditionnements / dogmes", "« Je dois rester invisible pour être accepté. » « Si je me montre, je dérange. »"],
          ["Croyances limitantes", "« Je n’ai pas ma place. » « Je ne suis pas digne d’être vu. »"],
          ["Croyances expansives", "« Ma présence suffit pour être aimé. » « J’ai une place unique et légitime. »"]
        ]
      },

      { id:"w_abandon", type:"BLESSURE", title:"Blessure : abandon", subtitle:"Émotion racine : peur.",
        grid: [
          ["Émotion", "Peur."],
          ["Origine", "Sentiment d’être laissé seul, manques affectifs dans l’enfance."],
          ["Masque / comportement", "Masque du dépendant : fusion, peur de la solitude, besoin excessif de soutien."],
          ["Empathie (note)", "Confond souvent empathie et fusion ; donne trop pour éviter d’être abandonné."],
          ["Addictions", "Dépendances affectives, relations, réseaux sociaux, alcool — tout ce qui comble le vide intérieur."],
          ["Valeurs de vie", "Amour, proximité, lien, chaleur humaine, partage."],
          ["Conditionnements / dogmes", "« Je dois toujours être avec quelqu’un pour exister. » « Si je suis seul, je ne vaux rien. »"],
          ["Croyances limitantes", "« Je finis toujours seul. » « Personne ne reste jamais avec moi. »"],
          ["Croyances expansives", "« Je suis complet même dans la solitude. » « Je peux créer des liens stables et nourrissants. »"]
        ]
      },

      { id:"w_humiliation", type:"BLESSURE", title:"Blessure : humiliation", subtitle:"Émotion racine : dégoût.",
        grid: [
          ["Émotion", "Dégoût."],
          ["Origine", "Honte, dévalorisation, humiliation dans l’enfance."],
          ["Masque / comportement", "Masque du masochiste : se rabaisser, se sacrifier, se punir."],
          ["Empathie (note)", "Freinée par la honte — peur de montrer sa vulnérabilité."],
          ["Addictions", "Nourriture, sexualité, auto-sabotage."],
          ["Valeurs de vie", "Respect, dignité, authenticité."],
          ["Conditionnements / dogmes", "« Je dois me sacrifier pour les autres. » « Je ne dois pas exister pleinement. »"],
          ["Croyances limitantes", "« Je ne mérite pas d’être heureux. » « Je dois porter la honte. »"],
          ["Croyances expansives", "« Je mérite le respect et la joie de vivre. » « Je peux exister avec dignité. »"]
        ]
      },

      { id:"w_trahison", type:"BLESSURE", title:"Blessure : trahison", subtitle:"Émotion racine : surprise.",
        grid: [
          ["Émotion", "Surprise."],
          ["Origine", "Expérience de trahison réelle ou vécue comme telle."],
          ["Masque / comportement", "Masque du contrôlant : cassant, exigeant. Besoin de vérifier, imposer."],
          ["Apathie", "Méfiance, contrôle ou test permanent de l’autre."],
          ["Addictions", "Pouvoir, contrôle, réussite, domination."],
          ["Valeurs de vie", "Loyauté, fidélité, vérité, apparence/paraître, argent."],
          ["Conditionnements / dogmes", "« On ne peut faire confiance à personne. » « Il faut tout contrôler. »"],
          ["Croyances limitantes", "« Les autres vont forcément me trahir. » « Je dois garder le contrôle. »"],
          ["Croyances expansives", "« Je me détache du résultat. » « Je laisse le bénéfice du doute. »"]
        ]
      },

      { id:"w_injustice", type:"BLESSURE", title:"Blessure : injustice", subtitle:"Émotion racine : colère intérieure.",
        grid: [
          ["Émotion", "Colère intérieure."],
          ["Origine", "Éducation stricte, froide ; amour dépendant de la performance."],
          ["Masque / comportement", "Masque du rigide : perfectionnisme, dureté, refus de l’imperfection."],
          ["Empathie (note)", "Rigidité : difficulté à se laisser toucher ou à montrer ses failles."],
          ["Addictions", "Travail excessif, perfectionnisme, hyper-contrôle."],
          ["Valeurs de vie", "Justice, équité, intégrité, vérité."],
          ["Conditionnements / dogmes", "« Il faut être parfait pour être aimé. » « Je ne dois rien laisser paraître. »"],
          ["Croyances limitantes", "« Je dois prouver ma valeur. » « Je ne peux pas me montrer imparfait. »"],
          ["Croyances expansives", "« Je peux être aimé tel que je suis. » « Ma valeur est innée. »"]
        ]
      },

      { id:"ref_emotions", type:"REF", title:"Référentiel : émotions & sentiments", subtitle:"Émotions racines + sentiments (nuances).",
        content: [
          { kicker:"Émotions racines", lead:"Peur • Colère • Tristesse • Joie • Dégoût." }
        ]
      }
    ];

    const NAV = [
      { section:"Carte", items:["home"] },
      { section:"Socles", items:["socle_confort","socle_apathie_empathie","socle_empathie"] },
      { section:"Blessures", items:["w_rejet","w_abandon","w_humiliation","w_trahison","w_injustice"] },
      { section:"Référentiels", items:["ref_emotions"] },
    ];

    const navEl = document.getElementById("nav");
    const mainEl = document.getElementById("main");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const menuBtn = document.getElementById("menuBtn");
    const backdrop = document.getElementById("backdrop");
    const logoBtn = document.getElementById("logoBtn");

    const getPage = (id) => PAGES.find(p => p.id === id);

    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getRoute(){
      return (location.hash || "#home").slice(1);
    }
    function go(id){
      location.hash = "#" + id;
    }

    function setMenu(open){
      navEl.setAttribute("data-open", open ? "true" : "false");
      backdrop.setAttribute("data-open", open ? "true" : "false");
    }

    menuBtn.addEventListener("click", () => {
      const open = navEl.getAttribute("data-open") === "true";
      setMenu(!open);
    });
    backdrop.addEventListener("click", () => setMenu(false));
    document.addEventListener("keydown", (e) => { if(e.key === "Escape") setMenu(false); });

    logoBtn.addEventListener("click", () => go("home"));

    function renderNav(currentId){
      navEl.innerHTML = "";
      NAV.forEach(group => {
        const wrap = document.createElement("div");
        wrap.className = "navSection";
        wrap.innerHTML = `<div class="navTitle">${escapeHTML(group.section)}</div>`;

        group.items.forEach(id => {
          const p = getPage(id);
          const btn = document.createElement("button");
          btn.className = "navItem";
          btn.type = "button";
          btn.setAttribute("aria-current", id === currentId ? "page" : "false");
          btn.innerHTML = `${escapeHTML(p.title)}<span class="navSmall">${escapeHTML(p.subtitle || "")}</span>`;
          btn.addEventListener("click", () => { go(id); setMenu(false); });
          wrap.appendChild(btn);
        });

        navEl.appendChild(wrap);
      });
    }

    function renderHome(){
      const tiles = [
        { title:"Socles", id:"socle_apathie_empathie", desc:"Pages fondatrices (lecture continue)." },
        { title:"Blessures émotionnelles", id:"w_rejet", desc:"Grille stable : émotion → origine → masque → apathie → addictions → valeurs → dogmes → croyances." },
        { title:"Référentiels", id:"ref_emotions", desc:"Ressources : émotions/sentiments, etc." },
        { title:"Point de départ", id:"socle_confort", desc:"Confort → Peur → Apprentissage → Expansion." },
      ];

      mainEl.innerHTML = `
        <div class="card">
          <div class="kicker">Structure</div>
          <div class="lead">Socles • Blessures • Référentiels</div>
          <p>Navigation par structure.</p>
        </div>

        <div class="mapGrid">
          ${tiles.map(t => `
            <div class="mapTile" data-go="${escapeHTML(t.id)}">
              <h3>${escapeHTML(t.title)}</h3>
              <p>${escapeHTML(t.desc)}</p>
            </div>
          `).join("")}
        </div>
      `;

      mainEl.querySelectorAll(".mapTile").forEach(el => {
        el.addEventListener("click", () => go(el.dataset.go));
      });
    }

    function renderSocle(page){
      const blocks = (page.content || []).map(b => {
        const bullets = b.bullets?.length ? `<ul>${b.bullets.map(x=>`<li>${escapeHTML(x)}</li>`).join("")}</ul>` : "";
        const text = b.text ? `<p>${escapeHTML(b.text)}</p>` : "";
        return `
          <div class="card">
            <div class="kicker">${escapeHTML(b.kicker || "Socle")}</div>
            <div class="lead">${escapeHTML(b.lead || "")}</div>
            ${text}
            ${bullets}
          </div>
        `;
      }).join("");
      mainEl.innerHTML = blocks;
    }

    function renderBlessure(page){
      mainEl.innerHTML = `
        <div class="card">
          <div class="kicker">Blessure</div>
          <div class="lead">${escapeHTML(page.title)}</div>
          <p>${escapeHTML(page.subtitle || "")}</p>
        </div>
        <div class="woundGrid">
          ${page.grid.map(([k,v]) => `
            <div class="row">
              <div class="label">${escapeHTML(k)}</div>
              <div class="value">${escapeHTML(v)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderRef(page){
      const blocks = (page.content || []).map(b => {
        const bullets = b.bullets?.length ? `<ul>${b.bullets.map(x=>`<li     const text = b.text ? `<p>${escapeHTML(b.text)}</p>` : "";
        return `
          <div class="card">
            <div class="kicker">${escapeHTML(b.kicker || "Référentiel")}</div>
            <div class="lead">${escapeHTML(b.lead || "")}</div>
            ${text}
            ${bullets}
          </div>
        `;
      }).join("");
      mainEl.innerHTML = blocks;
    }

    function render(){
      const id = getRoute();
      const page = getPage(id) || getPage("home");

      pageTitle.textContent = page.title || "La méthode FIDES";
      pageSubtitle.textContent = page.subtitle || "";

      renderNav(page.id);

      if(page.type === "HOME") renderHome();
      else if(page.type === "SOCLE") renderSocle(page);
      else if(page.type === "BLESSURE") renderBlessure(page);
      else if(page.type === "REF") renderRef(page);
      else renderHome();
    }

    window.addEventListener("hashchange", render);
    if(!location.hash) location.hash = "#home";
    render();
  </script>
</body>
</html>
