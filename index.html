<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support de formation – FIDES & mécanismes émotionnels</title>

  <style>
    /* ============================================================
      DESIGN SYSTEM — Dark + Glass + Accent dynamique
      ------------------------------------------------------------
      ✅ Change les couleurs globales ici
      ✅ Les accents par thème sont pilotés par JS (setThemeAccent)
    ============================================================ */
    :root{
      --bg0:#070913;
      --bg1:#0b1022;

      --glass: rgba(255,255,255,0.07);
      --stroke: rgba(255,255,255,0.14);

      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --muted2: rgba(255,255,255,0.55);

      /* Accent (remplacé par thème) */
      --accent: #2de2e6;
      --accent2:#8a5cff;

      --shadow: 0 14px 40px rgba(0,0,0,0.45);
      --radius: 20px;
      --radius2: 26px;

      /* Zoom diagramme (contrôlé en JS) */
      --diagramZoom: 1;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 650px at 18% 12%, color-mix(in srgb, var(--accent2) 30%, transparent), transparent 60%),
        radial-gradient(760px 520px at 82% 30%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%),
        radial-gradient(680px 520px at 60% 86%, rgba(255,92,214,0.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      overflow: hidden;
    }

    /* ============================================================
      LAYOUT — 2 MODES :
      - mode-home   : 3 colonnes (menu thèmes + contenu + panneau)
      - mode-module : focus (diagramme + panneau), menu caché
    ============================================================ */
    .app{
      height: 100%;
      display: grid;
      grid-template-columns: 320px 1fr 420px;
      gap: 14px;
      padding: 14px;
    }
    body.mode-module .app{
      grid-template-columns: 1fr 420px;
    }

    .panel{
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
    }

    /* ============================================================
      NAV (thèmes) — visible uniquement en HOME
    ============================================================ */
    .nav{ display:flex; flex-direction:column; }
    body.mode-module .nav{ display:none; }

    .nav__header{
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .brand{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .brand h1{ margin:0; font-size: 16px; font-weight: 860; }
    .badge{
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.12);
      color: var(--muted);
      white-space: nowrap;
    }
    .nav__sub{
      margin-top: 8px;
      font-size: 12.5px;
      color: var(--muted2);
      line-height: 1.35;
    }

    .nav__list{ padding: 12px; overflow:auto; }
    .nav__section{
      margin: 10px 0 6px;
      padding: 0 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: rgba(255,255,255,0.50);
    }

    .nav__item{
      width:100%;
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align:left;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
    }
    .nav__item:hover{
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }
    .nav__item[aria-current="true"]{
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--accent2) 24%, transparent),
        color-mix(in srgb, var(--accent) 10%, transparent)
      );
      border-color: color-mix(in srgb, var(--accent2) 52%, transparent);
    }
    .dot{
      width:10px; height:10px; border-radius:99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent2) 18%, transparent);
      flex:0 0 auto;
    }
    .nav__item small{
      display:block;
      color: var(--muted2);
      font-size: 12px;
      margin-top: 2px;
      line-height: 1.2;
    }

    /* ============================================================
      MAIN — contient 2 vues :
      - homeView   : grille de cartes thèmes
      - moduleView : diagramme + nœuds + zoom
    ============================================================ */
    .main{ display:flex; flex-direction:column; overflow:hidden; }

    .main__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
    }
    .titleblock h2{ margin:0; font-size: 18px; font-weight: 880; }
    .titleblock p{ margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .chiprow{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 10px; }
    .chip{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.82);
      user-select:none;
    }
    .chip strong{ color: var(--accent); font-weight: 900; }

    /* Topbar module : retour + select + zoom */
    .topbar{
      padding: 10px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    }
    .topbar__left{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .topbar__right{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

    .btn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 10px;
      cursor:pointer;
      transition: background .18s ease, transform .12s ease, border-color .18s ease;
      font-weight: 760;
      font-size: 12.5px;
    }
    .btn:hover{
      background: rgba(255,255,255,0.07);
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .btn--accent{
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--accent2) 20%, rgba(0,0,0,0.18)),
        color-mix(in srgb, var(--accent) 10%, rgba(0,0,0,0.18))
      );
    }

    select{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.88);
      border-radius: 14px;
      padding: 9px 10px;
      font-weight: 720;
      font-size: 12.5px;
      outline: none;
    }

    /* Barre nœuds (dans module) */
    .actions{
      padding: 10px 18px 12px;
      display:flex;
      gap:8px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .actionPill{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 760;
      cursor: pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      display:flex; align-items:center; gap:8px;
    }
    .actionPill:hover{
      background: rgba(255,255,255,0.06);
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .actionPill[aria-pressed="true"]{
      background: color-mix(in srgb, var(--accent2) 18%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
    }
    .actionDot{
      width:8px; height:8px; border-radius: 99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .canvas{ padding: 14px; height: 100%; overflow:auto; }

    /* ============================================================
      DIAGRAM WRAPPER — clé pour le responsive :
      - on évite l’écrasement : le SVG a une largeur min.
      - si écran petit : on SCROLL dans la zone (c’est voulu).
      - zoom : CSS variable --diagramZoom
    ============================================================ */
    .svg-wrap{
      border-radius: var(--radius2);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.12);
      overflow:auto; /* <-- IMPORTANT: pas d’écrasement, on scroll */
      position: relative;
    }
    .svg-stage{
      padding: 10px;
      width: max-content; /* <-- le contenu peut dépasser */
      transform: scale(var(--diagramZoom));
      transform-origin: top left;
    }

    /* Le SVG ne doit pas devenir minuscule */
    svg{
      width: 1100px;           /* base lisible */
      max-width: 1100px;
      height: auto;
      display:block;
    }

    .diagram-caption{
      padding: 10px 12px 12px;
      font-size: clamp(13px, 1.2vw, 15px);
      color: rgba(255,255,255,0.74);
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.10);
    }
    .diagram-caption strong{ color: var(--accent); font-weight: 900; }

    /* ============================================================
      SVG INTERACTIF — nœuds plus clairs + hover
    ============================================================ */
    .link{
      stroke: rgba(255,255,255,0.18);
      stroke-width: 2;
      fill: none;
      transition: stroke .2s ease, opacity .2s ease, stroke-width .2s ease;
      opacity: 0.9;
    }
    .node{
      cursor: pointer;
      outline: none;
    }
    .node circle{
      fill: rgba(255,255,255,0.06);
      stroke: rgba(255,255,255,0.22);
      stroke-width: 2;
      transition: transform .18s ease, stroke .18s ease, fill .18s ease, filter .18s ease;
      transform-origin: center;
    }
    .node text{
      fill: rgba(255,255,255,0.92);
      font-weight: 900;
      font-size: 14px;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.35);
      stroke-width: 3px;
      user-select: none;
    }
    .node .sub{
      font-size: 12px;
      fill: rgba(255,255,255,0.76);
      font-weight: 750;
      stroke-width: 0;
    }

    .node[data-role="core"] circle{
      fill: color-mix(in srgb, var(--accent2) 16%, rgba(255,255,255,0.06));
      stroke: color-mix(in srgb, var(--accent2) 60%, rgba(255,255,255,0.22));
      filter: drop-shadow(0px 8px 18px color-mix(in srgb, var(--accent2) 20%, transparent));
    }
    .node[data-role="leaf"] circle{
      fill: color-mix(in srgb, var(--accent) 11%, rgba(255,255,255,0.06));
      stroke: color-mix(in srgb, var(--accent) 52%, rgba(255,255,255,0.22));
      filter: drop-shadow(0px 6px 16px color-mix(in srgb, var(--accent) 16%, transparent));
    }

    .node:hover circle,
    .node:focus-visible circle{
      stroke: rgba(255,255,255,0.92);
      fill: rgba(255,255,255,0.10);
      transform: scale(1.06);
      filter: drop-shadow(0px 12px 24px color-mix(in srgb, var(--accent) 28%, transparent));
    }
    .node.is-active circle{
      stroke: rgba(255,255,255,0.96);
      fill: rgba(255,255,255,0.12);
      transform: scale(1.07);
      filter: drop-shadow(0px 14px 28px color-mix(in srgb, var(--accent) 32%, transparent));
    }
    .link.is-active{
      stroke: color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,0.18));
      stroke-width: 3;
      opacity: 1;
    }

    /* ============================================================
      ASIDE (panneau droite) — texte
    ============================================================ */
    .aside{ display:flex; flex-direction:column; overflow:hidden; }
    .aside__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .aside__header h3{
      margin:0;
      font-size: 14px;
      font-weight: 900;
    }
    .aside__header p{
      margin: 6px 0 0;
      color: var(--muted2);
      font-size: 12.5px;
      line-height: 1.4;
    }
    .aside__content{ padding: 14px 18px 18px; overflow:auto; }

    .card{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h4{
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 900;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .card p, .card li{
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      line-height: 1.55;
    }
    .card ul{ margin: 8px 0 0 18px; }
    .note{ font-size: 12px; color: rgba(255,255,255,0.62); line-height: 1.45; }

    /* ============================================================
      HOME VIEW — cartes de thèmes (moins chargé)
    ============================================================ */
    .homeGrid{
      padding: 16px;
      display:grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .themeCard{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: 18px;
      padding: 14px;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      position: relative;
      overflow:hidden;
    }
    .themeCard:hover{
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.05);
    }
    .themeCard h3{ margin:0; font-size: 14px; font-weight: 920; }
    .themeCard p{ margin:6px 0 0; color: rgba(255,255,255,0.70); font-size: 12.5px; line-height:1.35; }
    .themeCard .mini{
      margin-top:10px;
      display:flex; gap:8px; flex-wrap:wrap;
      color: rgba(255,255,255,0.70);
      font-size: 12px;
    }
    .tag{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      padding: 5px 9px;
      border-radius: 999px;
    }

    .hidden{ display:none !important; }

    /* ============================================================
      RESPONSIVE — sur petits écrans : tout en colonne
      + SVG width réduite mais toujours scrollable
    ============================================================ */
    @media (max-width: 1180px){
      body{ overflow:auto; }
      .app{
        height:auto;
        min-height:100%;
        grid-template-columns: 1fr;
      }
      body.mode-module .app{
        grid-template-columns: 1fr;
      }
      svg{ width: 980px; } /* encore lisible, scroll horizontal */
      .homeGrid{ grid-template-columns: 1fr; }
    }
    @media (max-width: 520px){
      svg{ width: 860px; }
    }
  </style>
</head>

<body class="mode-home">
  <div class="app">

    <!-- ==========================================================
      NAV: visible seulement en mode-home
      (liste compacte des thèmes)
    =========================================================== -->
    <aside class="panel nav" aria-label="Menu">
      <div class="nav__header">
        <div class="brand">
          <h1>Support de formation</h1>
          <span class="badge">Accueil → Module Focus</span>
        </div>
        <div class="nav__sub">
          Choisis un thème pour <strong style="color:var(--accent)">entrer</strong> dans le module.
        </div>
      </div>

      <div class="nav__list" id="navList"></div>
    </aside>

    <!-- ==========================================================
      MAIN
      - HOME VIEW : cartes thèmes
      - MODULE VIEW : diagramme focus
    =========================================================== -->
    <main class="panel main" aria-label="Contenu">
      <div class="main__header">
        <div class="titleblock">
          <h2 id="mainTitle">Accueil</h2>
          <p id="mainSubtitle">Sélectionne un thème : l’interface bascule en mode focus (moins chargé).</p>
          <div class="chiprow" id="mainChips"></div>
        </div>

        <div class="chip" title="Principe UX"><strong>Focus</strong> par module</div>
      </div>

      <!-- TOPBAR MODULE (cachée en home) -->
      <div class="topbar hidden" id="moduleTopbar">
        <div class="topbar__left">
          <button class="btn btn--accent" id="backBtn" type="button">← Retour aux thèmes</button>
          <select id="moduleSelect" aria-label="Changer de thème"></select>
        </div>
        <div class="topbar__right">
          <button class="btn" id="zoomOutBtn" type="button">−</button>
          <button class="btn" id="zoomResetBtn" type="button">Zoom 100%</button>
          <button class="btn" id="zoomInBtn" type="button">+</button>
        </div>
      </div>

      <!-- NŒUDS (caché en home) -->
      <div class="actions hidden" id="actionsBar"></div>

      <div class="canvas">
        <!-- HOME VIEW -->
        <section id="homeView">
          <div class="homeGrid" id="homeGrid"></div>
        </section>

        <!-- MODULE VIEW -->
        <section id="moduleView" class="hidden">
          <div class="svg-wrap">
            <div class="svg-stage" id="diagramHost"></div>
            <div class="diagram-caption" id="diagramCaption"></div>
          </div>
        </section>
      </div>
    </main>

    <!-- ==========================================================
      ASIDE: texte dynamique
    =========================================================== -->
    <aside class="panel aside" aria-label="Explications">
      <div class="aside__header">
        <h3 id="detailTitle">Bienvenue</h3>
        <p id="detailHint">Choisis un thème pour afficher le schéma et les explications.</p>
      </div>
      <div class="aside__content" id="detailHost"></div>
    </aside>

  </div>

  <script>
    /* ============================================================
      COMMENT AJOUTER / MODIFIER ?
      ------------------------------------------------------------
      1) Textes : MODULES[moduleId].content.nodes[nodeId]
      2) Points FIDES : MODULES[moduleId].content.fides[nodeId]
      3) Schémas : fonctions *DiagramSVG() en bas
      4) Ajouter un module :
         - ajouter entrée dans MODULES
         - ajouter id dans NAV_ORDER
         - (optionnel) définir couleurs dans THEME_COLORS
    ============================================================ */

    /* ============================================================
      COULEURS PAR THÈME (accent dynamique)
    ============================================================ */
    const THEME_COLORS = {
      comfort:    { accent:"#2de2e6", accent2:"#8a5cff" },
      emotions:   { accent:"#38f2a5", accent2:"#2de2e6" },
      empathy:    { accent:"#2de2e6", accent2:"#ff5cd6" },
      addictions: { accent:"#ffb020", accent2:"#ff5cd6" },
      values:     { accent:"#8a5cff", accent2:"#2de2e6" },
      dogmas:     { accent:"#c7a6ff", accent2:"#8a5cff" },
      betrayal:   { accent:"#ff5cd6", accent2:"#8a5cff" },
      abandonment:{ accent:"#2de2e6", accent2:"#38f2a5" },
      rejection:  { accent:"#ffb020", accent2:"#2de2e6" },
      humiliation:{ accent:"#ff5cd6", accent2:"#ffb020" },
      injustice:  { accent:"#8a5cff", accent2:"#ffb020" },
    };

    function setThemeAccent(moduleId){
      const c = THEME_COLORS[moduleId] || { accent:"#2de2e6", accent2:"#8a5cff" };
      document.documentElement.style.setProperty("--accent", c.accent);
      document.documentElement.style.setProperty("--accent2", c.accent2);
    }

    /* ============================================================
      FIDES — version démo (tu peux remplacer par ta définition)
    ============================================================ */
    const FIDES_DEMO = {
      F: "Fait : qu’est-ce qui s’est réellement passé (observable, neutre) ?",
      I: "Interprétation : quelle histoire je me raconte (dogme, croyance, jugement) ?",
      D: "Déclencheur / émotion : qu’est-ce que je ressens et de quoi j’ai besoin ?",
      E: "Expression : comment je l’exprime de façon saine (cadre, limite, demande) ?",
      S: "Solution / sens : quelle action alignée (valeurs) je choisis maintenant ?"
    };

    function makeFidesForWound(label, {emotion, besoin, interpretation, action}){
      const core = [
        `F : Quel fait concret active la blessure "${label}" ?`,
        `I : Quelle interprétation apparaît ? Ex. ${interpretation}`,
        `D : Émotion : ${emotion} → Besoin : ${besoin}`,
        `E : Exprimer : « Quand …, je ressens …, j’ai besoin de … »`,
        `S : Action : ${action}`
      ];
      return {
        core,
        emotion: [
          "F : Identifier le déclencheur.",
          "I : Séparer émotion et histoire.",
          `D : Nommer : ${emotion}.`,
          "E : Réguler (pause / respiration).",
          "S : Revenir au présent."
        ],
        origine: [
          "F : Repérer l’écho passé/présent.",
          "I : « Ça ressemble à… » (sans conclure).",
          "D : Accueillir la mémoire émotionnelle.",
          "E : Mettre des mots.",
          "S : Réponse adulte."
        ],
        masque: [
          "F : Observer le comportement automatique.",
          "I : À quoi il sert (protection).",
          "D : Besoin derrière.",
          "E : Tester une alternative.",
          "S : Stabiliser."
        ],
        apathie: [
          "F : Repérer retrait/engourdissement.",
          "I : Voir la stratégie de protection.",
          "D : Recontacter une émotion sûre.",
          "E : Micro-connexion.",
          "S : Retour au lien."
        ],
        addictions: [
          "F : Identifier la compensation.",
          "I : Repérer l’histoire qui justifie.",
          "D : Nommer l’émotion évitée.",
          "E : Alternative de régulation.",
          "S : Remplacement progressif."
        ],
        valeurs: [
          "F : Quelle valeur est touchée ?",
          "I : Quelle règle interne ?",
          "D : Émotion = signal de valeur.",
          "E : Exprimer valeur + demande.",
          "S : Action alignée."
        ],

      renderModule(moduleId);

      moduleSelect.value = moduleId;
      updateNavCurrent(moduleId);
    }

    function setZoom(v){
      zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, v));
      document.documentElement.style.setProperty("--diagramZoom", zoom);
      zoomResetBtn.textContent = `Zoom ${(zoom*100).toFixed(0)}%`;
    }

    /* ============================================================
      NAV + HOME CARDS
    ============================================================ */
    function buildNav(){
      navList.innerHTML = "";
      NAV_ORDER.forEach(group => {
        const section = document.createElement("div");
        section.className = "nav__section";
        section.textContent = group.label;
        navList.appendChild(section);

        group.items.forEach(id => {
          const mod = MODULES[id];
          const btn = document.createElement("button");
          btn.className = "nav__item";
          btn.type = "button";
          btn.dataset.module = id;
          btn.innerHTML = `
            <span class="dot"></span>
            <span>
              <div style="font-weight:900">${escapeHTML(mod.title)}</div>
              <small>${escapeHTML(mod.subtitle)}</small>
            </span>
          `;
          btn.addEventListener("click", () => enterModule(id));
          navList.appendChild(btn);
        });
      });
    }

    function buildHomeCards(){
      homeGrid.innerHTML = "";
      // On aplatit l’ordre
      const ids = NAV_ORDER.flatMap(g => g.items);
      ids.forEach(id => {
        const mod = MODULES[id];

        const card = document.createElement("div");
        card.className = "themeCard";
        card.addEventListener("mouseenter", () => setThemeAccent(id));
        card.addEventListener("mouseleave", () => setThemeAccent("comfort"));
        card.addEventListener("click", () => enterModule(id));

        card.innerHTML = `
          <h3>${escapeHTML(mod.title)}</h3>
          <p>${escapeHTML(mod.subtitle)}</p>
          <div class="mini">
            ${(mod.tags||[]).slice(0,3).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join("")}
          </div>
        `;
        homeGrid.appendChild(card);
      });
      // chips home
      mainChips.innerHTML = `<div class="chip"><strong>Accueil</strong> léger</div><div class="chip">cartes thèmes</div><div class="chip">focus ensuite</div>`;
    }

    function buildModuleSelect(){
      moduleSelect.innerHTML = "";
      const ids = NAV_ORDER.flatMap(g => g.items);
      ids.forEach(id => {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = MODULES[id].title;
        moduleSelect.appendChild(opt);
      });
    }

    function updateNavCurrent(moduleId){
      document.querySelectorAll(".nav__item").forEach(x => {
        x.setAttribute("aria-current", x.dataset.module === moduleId ? "true" : "false");
      });
    }

    /* ============================================================
      RENDER MODULE (focus)
    ============================================================ */
    function renderModule(moduleId){
      const mod = MODULES[moduleId];
      setThemeAccent(moduleId);

      mainTitle.textContent = mod.title;
      mainSubtitle.textContent = mod.subtitle;

      // tags
      mainChips.innerHTML = "";
      (mod.tags || []).forEach(t => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = t;
        mainChips.appendChild(chip);
      });

      // diagram
      diagramHost.innerHTML = mod.diagram();
      diagramCaption.innerHTML = `<strong>Module :</strong> ${escapeHTML(mod.caption || "")}`;

      // actions (nœuds)
      renderActionsBar(moduleId);

      // wire svg hover/click
      wireDiagramInteractions(moduleId);
    }

    function renderActionsBar(moduleId){
      const mod = MODULES[moduleId];
      const nodeIds = Object.keys(mod.content.nodes)
        .sort((a,b)=> (a==="core" ? -1 : b==="core" ? 1 : a.localeCompare(b)));

      actionsBar.innerHTML = "";
      nodeIds.forEach(nodeId => {
        const label = nodeId === "core" ? "Vue d’ensemble" : (mod.content.nodes[nodeId]?.title || nodeId);

        const btn = document.createElement("button");
        btn.className = "actionPill";
        btn.type = "button";
        btn.dataset.node = nodeId;
        btn.setAttribute("aria-pressed", nodeId==="core" ? "true" : "false");
        btn.innerHTML = `<span class="actionDot"></span><span>${escapeHTML(label)}</span>`;

        btn.addEventListener("click", () => {
          // clic = verrouille/déverrouille
          lockedNodeId = (lockedNodeId === nodeId) ? null : nodeId;
          const target = lockedNodeId || "core";
          setActiveNode(target);
          renderDetail(moduleId, target, !!lockedNodeId);
          setPressedAction(target);
        });

        actionsBar.appendChild(btn);
      });
    }

    function setPressedAction(nodeId){
      actionsBar.querySelectorAll(".actionPill").forEach(b=>{
        b.setAttribute("aria-pressed", b.dataset.node === nodeId ? "true" : "false");
      });
    }

    /* ============================================================
      SVG INTERACTIONS
    ============================================================ */
    function wireDiagramInteractions(moduleId){
      const svg = diagramHost.querySelector("svg");
      if(!svg) return;

      const nodes = Array.from(svg.querySelectorAll(".node[data-node]"));
      const links = Array.from(svg.querySelectorAll(".link[data-from][data-to]"));

      const activate = (nodeId, isLocked) => {
        setActiveNode(nodeId, svg);
        setActiveLinks(nodeId, links);
        renderDetail(moduleId, nodeId, isLocked);
        setPressedAction(nodeId);
      };

      nodes.forEach(n => {
        const nodeId = n.dataset.node;

        n.addEventListener("mouseenter", () => {
          if(lockedNodeId) return;
          activate(nodeId, false);
        });

        n.addEventListener("mouseleave", () => {
          if(lockedNodeId) return;
          activate("core", false);
        });

        n.addEventListener("click", () => {
          lockedNodeId = (lockedNodeId === nodeId) ? null : nodeId;
          activate(lockedNodeId || "core", !!lockedNodeId);
        });

        n.setAttribute("tabindex","0");
        n.setAttribute("role","button");
        n.addEventListener("keydown", (e) => {
          if(e.key === "Enter" || e.key === " "){
            e.preventDefault();
            lockedNodeId = (lockedNodeId === nodeId) ? null : nodeId;
            activate(lockedNodeId || "core", !!lockedNodeId);
          }
        });
      });

      setActiveNode("core", svg);
      setActiveLinks("core", links);
    }

    function setActiveNode(nodeId, svgRoot = diagramHost){
      const svg = svgRoot.querySelector ? svgRoot : diagramHost.querySelector("svg");
      if(!svg) return;
      svg.querySelectorAll(".node").forEach(n => n.classList.remove("is-active"));
      const target = svg.querySelector(`.node[data-node="${cssEscape(nodeId)}"]`);
      if(target) target.classList.add("is-active");
    }

    function setActiveLinks(nodeId, links){
      links.forEach(l => l.classList.remove("is-active"));
      links.forEach(l => {
        if(l.dataset.from === nodeId || l.dataset.to === nodeId){
          l.classList.add("is-active");
        }
      });
    }

      `;
    }

    function renderDetail(moduleId, nodeId, isLocked){
      const mod = MODULES[moduleId];
      const node = mod.content.nodes[nodeId] || mod.content.nodes.core;
      const fidesPoints = (mod.content.fides && mod.content.fides[nodeId]) ? mod.content.fides[nodeId] : [];

      detailTitle.textContent = node.title || "Détail";
      detailHint.textContent = isLocked
        ? "Nœud verrouillé (clic pour déverrouiller)."
        : "Survole pour prévisualiser, clique pour verrouiller.";

      detailHost.innerHTML = "";

      // Explication
      const expl = document.createElement("div");
      expl.className = "card";
      expl.innerHTML = `<h4><span>Explication</span><span class="kicker">${escapeHTML(moduleId)} • ${escapeHTML(nodeId)}</span></h4>`;
      (node.blocks || []).forEach(b => {
        const wrap = document.createElement("div");
        wrap.style.marginBottom = "10px";
        wrap.innerHTML = `<div class="kicker" style="margin-bottom:6px">${escapeHTML(b.h || "")}</div><p>${escapeHTML(b.p || "")}</p>`;
        expl.appendChild(wrap);
      });
      detailHost.appendChild(expl);

      // FIDES
      const fides = document.createElement("div");
      fides.className = "card";
      fides.innerHTML = `<h4><span>Points clés FIDES</span><span class="kicker">démo</span></h4>`;
      if(!fidesPoints.length){
        fides.innerHTML += `<p class="note">Aucun point FIDES défini pour ce nœud.</p>`;
      }else{
        const ul = document.createElement("ul");
        fidesPoints.forEach(pt => {
          const li = document.createElement("li");
          li.textContent = pt;
          ul.appendChild(li);
        });
        fides.appendChild(ul);
      }
      detailHost.appendChild(fides);

      // Aide interaction
      const help = document.createElement("div");
      help.className = "card";
      help.innerHTML = `
        <h4><span>Interaction</span><span class="kicker">UX</span></h4>
        <p class="note">
          <strong>Survol</strong> = aperçu • <strong>Clic</strong> = verrouillage •
          <strong>Zoom</strong> = lisibilité (mobile).
        </p>
      `;
      detailHost.appendChild(help);
    }

    /* ============================================================

    ============================================================ */
    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function cssEscape(s){ return String(s).replace(/"/g, '\\"'); }
