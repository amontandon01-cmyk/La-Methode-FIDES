<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Atlas – Apathie / Empathie & blessures émotionnelles</title>

  <style>
    :root{
      --bg0:#070913;
      --bg1:#0b1022;
      --glass: rgba(255,255,255,0.07);
      --stroke: rgba(255,255,255,0.14);

      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);

      --accent: #2de2e6;
      --accent2:#8a5cff;

      --shadow: 0 14px 40px rgba(0,0,0,0.45);
      --radius2: 26px;
      --radius: 18px;

      --maxw: 1100px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 650px at 18% 12%, rgba(138,92,255,0.22), transparent 60%),
        radial-gradient(760px 520px at 82% 30%, rgba(45,226,230,0.16), transparent 62%),
        radial-gradient(680px 520px at 60% 86%, rgba(255,92,214,0.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
    }

    .app{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 16px;
    }

    .panel{
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow:hidden;
      min-height: calc(100vh - 32px);
      display:flex;
      flex-direction:column;
    }

    header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex;
      justify-content:space-between;
      gap: 14px;
      align-items:flex-start;
    }
    header h1{
      margin:0;
      font-size: 18px;
      font-weight: 920;
      letter-spacing: .2px;
    }
    header p{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      max-width: 70ch;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 10px;
      cursor:pointer;
      transition: background .18s ease, transform .12s ease, border-color .18s ease;
      font-weight: 820;
      font-size: 12.5px;
      white-space: nowrap;
    }
    .btn:hover{
      background: rgba(255,255,255,0.07);
      border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .btn--accent{
      border-color: color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.14));
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--accent2) 18%, rgba(0,0,0,0.18)),
        color-mix(in srgb, var(--accent) 9%, rgba(0,0,0,0.18))
      );
    }

    .content{
      display:grid;
      grid-template-columns: 300px 1fr;
      min-height:0;
      flex:1;
    }
    @media (max-width: 980px){
      .content{ grid-template-columns: 1fr; }
    }

    nav{
      border-right: 1px solid rgba(255,255,255,0.10);
      padding: 14px;
      min-height:0;
    }
    @media (max-width: 980px){
      nav{ border-right:none; border-bottom: 1px solid rgba(255,255,255,0.10); }
    }

    .navSection{
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .navTitle{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 4px 0 10px;
    }
    .navItem{
      width:100%;
      text-align:left;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.12);
      color: rgba(255,255,255,0.90);
      border-radius: 14px;
      padding: 10px 10px;
      cursor:pointer;
      font-weight: 820;
      font-size: 12.8px;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      margin-bottom: 8px;
    }
    .navItem:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,0.05);
      border-color: color-mix(in srgb, var(--accent) 26%, rgba(255,255,255,0.12));
    }
    .navItem[aria-current="page"]{
      background: color-mix(in srgb, var(--accent2) 16%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 55%, rgba(255,255,255,0.12));
    }
    .navSmall{
      display:block;
      margin-top: 3px;
      color: rgba(255,255,255,0.62);
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.2;
    }

    main{
      min-height:0;
      padding: 16px;
      overflow:auto;
    }

    .card{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }

    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }
    .lead{
      font-size: 14px;
      font-weight: 900;
      margin: 0 0 8px;
      line-height: 1.35;
    }
    p, li{
      color: rgba(255,255,255,0.86);
      font-size: 13.2px;
      line-height: 1.6;
    }
    ul{ margin: 8px 0 0 18px; }

    /* “Carte du système” */
    .mapGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 980px){
      .mapGrid{ grid-template-columns: 1fr; }
    }
    .mapTile{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: 18px;
      padding: 14px;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      position: relative;
      overflow:hidden;
    }
    .mapTile:hover{
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent2) 38%, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.05);
    }
    .mapTile h3{
      margin:0;
      font-size: 14.5px;
      font-weight: 940;
      line-height: 1.25;
    }
    .mapTile p{
      margin: 7px 0 0;
      color: rgba(255,255,255,0.70);
      font-size: 12.6px;
      line-height: 1.45;
    }

    /* Blessures : grille stable */
    .woundGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .row{
      display:grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.10);
    }
    @media (max-width: 740px){
      .row{ grid-template-columns: 1fr; }
    }
    .label{
      font-weight: 950;
      font-size: 12.8px;
      color: rgba(255,255,255,0.90);
    }
    .value{
      color: rgba(255,255,255,0.84);
      font-size: 13.2px;
      line-height: 1.6;
    }

    .note{
      color: rgba(255,255,255,0.62);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">

      <header>
        <div>
          <h1 id="pageTitle">Carte du système</h1>
          <p id="pageSubtitle">
            Atlas structuré : socles → blessures → référentiels. (Prototype pour tester la clarté.)
          </p>
        </div>
        <div class="toolbar">
          <button class="btn btn--accent" id="homeBtn" type="button">⟵ Carte</button>
          <button class="btn" id="copyLinkBtn" type="button" title="Copier un lien vers la page">Copier lien</button>
        </div>
      </header>

      <div class="content">
        <nav id="nav"></nav>
        <main id="main"></main>
      </div>

    </div>
  </div>

  <script>
    /* ============================================================
      Prototype “Atlas”
      - Accueil = Carte du système
      - 3 types : SOCLES / BLESSURES / RÉFÉRENTIELS
      - But : rendre la structure visible, sans “jeu” ni FIDES interactif.
      - Contenu: repris de ton support (octobre 2025).
    ============================================================ */

    const PAGES = [
      // HOME (carte)
      { id:"home", type:"HOME", title:"Carte du système", subtitle:"Voir la structure globale (socles → blessures → référentiels).", accent:"#2de2e6", accent2:"#8a5cff" },

      // SOCLES
      { id:"socle_confort", type:"SOCLE", title:"Le cercle de la zone de confort",
        subtitle:"Confort → Peur → Apprentissage → Expansion.",
        accent:"#2de2e6", accent2:"#8a5cff",
        content: [
          { kicker:"But pédagogique", lead:"Montrer les différentes zones (confort, peur, apprentissage, expansion).", bullets:[
            "Zone de confort = sécurité illusoire, répétition des habitudes, évitement de l’inconfort.",
            "Zone de peur = doutes, jugements des autres, perte de repères.",
            "Zone d’apprentissage = nouvelles compétences, élargissement de soi, expérimentation.",
            "Zone d’expansion = réalisation de soi, alignement avec sa valeur, contribution au monde.",
          ]},
          { kicker:"Message clé", lead:"Pour avancer, il faut oser franchir la peur et passer par l’apprentissage.", text:
            "Sans ce passage, on reste prisonnier de l’illusion de sécurité."
          }
        ]
      },

      { id:"socle_apathie_empathie", type:"SOCLE", title:"Blessures émotionnelles : apathie ↔ empathie",

        accent:"#38f2a5", accent2:"#2de2e6",
        content: [
          { kicker:"Point central", lead:"Quand une blessure s’active, l’apathie prend le dessus.", text:
            "Ici, l’apathie n’est pas une absence d’émotion au sens médical : c’est un état de fermeture émotionnelle qui se met en place quand une douleur ancienne se réveille."
          },
          { kicker:"Fonction", lead:"Réaction inconsciente de protection / mode de survie émotionnel.", text:
            "En reconnaissant cette fermeture et en la traversant avec bienveillance, on peut retrouver la connexion à soi, à l’autre et à la vie."

          { kicker:"Finalité", lead:"Ouverture de conscience : acceptation de soi et de l’autre, sans jugement.", text:
            "Quels que soient les comportements observés."

      { id:"socle_empathie", type:"SOCLE", title:"L’empathie",

          { kicker:"Différences", lead:"Empathie vs compassion / sympathie.", bullets:[
            "Empathie vs compassion : l’une ressent, l’autre agit.",
            "Empathie vs sympathie : l’une écoute, l’autre se projette."
          ]},
          { kicker:"Freins à l’empathie", lead:"Les blessures émotionnelles voilent l’empathie.", bullets:[
            "Rejet : envie de s’isoler / se couper.",
            "Injustice : rigidité, contrôle de soi.",
            "Trahison : méfiance / suspicion.",
            "Humiliation : honte, fuite du contact.",
            "Abandon : besoin de combler le vide avant d’écouter."
          ]},
          { kicker:"Message clé", lead:"L’empathie est naturelle, mais elle est voilée par nos blessures." }
        ]
      },

      // BLESSURES (structure stable)
      { id:"w_trahison", type:"BLESSURE", title:"Blessure : trahison", subtitle:"Émotion racine : surprise.", accent:"#ff5cd6", accent2:"#8a5cff",
        grid: [
          ["Émotion", "Surprise."],
          ["Âge d’ancrage (indiqué)", "6–7 ans (première activation)."],
          ["Origine", "Expérience de trahison réelle ou vécue comme telle (parent absent, infidélité, promesse non tenue). Perte de confiance dans l’autre et dans l’humanité."],
          ["Masque / comportement", "Masque du contrôlant : cassant, exigeant. Besoin de tout vérifier, d’imposer sa volonté. Difficulté à lâcher prise."],
          ["Apathie", "Méfiance, contrôle ou test permanent de l’autre."],
          ["Addictions", "Pouvoir, contrôle, réussite, domination. Travail ou sport comme moyen de ne pas perdre la main."],
          ["Valeurs de vie", "Loyauté, fidélité, vérité, apparence/paraître, argent (statut social, entourage, savoir)."],
          ["Conditionnements / dogmes", "« On ne peut faire confiance à personne. » « Il faut tout contrôler. » « N’aime pas avoir tort. » « N’aime pas perdre. » (et autres formulations du support)."],
          ["Croyances limitantes", "« Les autres vont forcément me trahir. » « Je dois garder le contrôle. » « Où est la performance concrète ? » « Il faut le voir pour y croire. »"],
          ["Croyances expansives", "« Je me détache du résultat, car le chemin compte. » « Laisser à l’autre le bénéfice du doute. » « J’accepte l’autre tel qu’il est. »"],
        ],
        note:"Texte repris et condensé sans ajout, pour prototype de lisibilité."
      },

      { id:"w_abandon", type:"BLESSURE", title:"Blessure : abandon", subtitle:"Émotion racine : peur.", accent:"#2de2e6", accent2:"#38f2a5",
        grid: [
          ["Émotion", "Peur."],
          ["Origine", "Sentiment d’être laissé seul, manques affectifs dans l’enfance. Difficultés à exister sans la présence rassurante d’autrui."],
          ["Masque / comportement", "Masque du dépendant : fusion, peur de la solitude, besoin excessif de soutien. Peut dire qu’il se sent bien seul et n’a besoin de personne."],
          ["Empathie (note du support)", "Confond souvent empathie et fusion ; donne trop pour éviter d’être abandonné."],
          ["Addictions", "Dépendances affectives, relations, réseaux sociaux, alcool — tout ce qui comble le vide intérieur."],
          ["Valeurs de vie", "Amour, proximité, lien, chaleur humaine, partage."],
          ["Conditionnements / dogmes", "« Je dois toujours être avec quelqu’un pour exister. » « Si je suis seul, je ne vaux rien. »"],
          ["Croyances limitantes", "« Je finis toujours seul. » « Personne ne reste jamais avec moi. »"],
          ["Croyances expansives", "« Je suis complet même dans la solitude. » « Je peux créer des liens stables et nourrissants. »"],
        ],
        note:"Texte repris du support, réordonné dans une grille stable."
      },

      { id:"w_rejet", type:"BLESSURE", title:"Blessure : rejet", subtitle:"Émotion racine : tristesse.", accent:"#ffb020", accent2:"#2de2e6",
        grid: [
          ["Émotion", "Tristesse."],
          ["Origine", "Très tôt (parfois indiqué : dans le ventre de la mère). Sentiment de ne pas avoir sa place, de déranger, d’être de trop."],
          ["Masque / comportement", "Masque du fuyant : se retirer, se couper, se rendre invisible. Difficulté à s’affirmer, peur de déranger."],
          ["Empathie (note du support)", "Difficulté à s’ouvrir par peur d’être ignoré ; peut se couper des autres pour éviter de revivre le rejet."],

          ["Valeurs de vie", "Sécurité intérieure, acceptation de la différence de l’autre, autonomie, foi en la vie et en l’humain, amour."],
          ["Conditionnements / dogmes", "« Je dois rester invisible pour être accepté. » « Si je me montre, je dérange. »"],
          ["Croyances limitantes", "« Je n’ai pas ma place. » « Je ne suis pas digne d’être vu. » (et formulations type « ce n’est pas grave », etc.)."],
          ["Croyances expansives", "« Ma présence suffit pour être aimé. » « J’ai une place unique et légitime. »"],
        ],
        note:"Prototype : garder la structure, sans interprétation."
      },

      { id:"w_humiliation", type:"BLESSURE", title:"Blessure : humiliation", subtitle:"Émotion racine : dégoût.", accent:"#ff5cd6", accent2:"#ffb020",
        grid: [
          ["Émotion", "Dégoût."],
          ["Origine", "Expérience de honte, dévalorisation, humiliation dans l’enfance ; souvent liée à l’éducation stricte / regard social ou familial."],
          ["Masque / comportement", "Masque du masochiste : se rabaisser, se sacrifier, se punir ; culpabilité ; rend service au-delà de ses limites ; anticipe les besoins des autres sans accord."],
          ["Empathie (note du support)", "Freinée par la honte — peur de montrer sa vulnérabilité."],
          ["Addictions", "Nourriture, sexualité, auto-sabotage ; excès pour compenser la honte."],
          ["Valeurs de vie", "Respect, dignité, authenticité."],
          ["Conditionnements / dogmes", "« Je dois me sacrifier pour les autres. » « Je ne dois pas exister pleinement. »"],
          ["Croyances limitantes", "« Je ne mérite pas d’être heureux. » « Je dois porter la honte. »"],
          ["Croyances expansives", "« Je mérite le respect et la joie de vivre. » « Je peux exister avec dignité. »"],
        ]
      },

      { id:"w_injustice", type:"BLESSURE", title:"Blessure : injustice", subtitle:"Émotion racine : colère intérieure.", accent:"#8a5cff", accent2:"#ffb020",
        grid: [
          ["Émotion", "Colère intérieure (maintenue par peur de blesser/détruire l’autre)."],
          ["Origine", "Éducation stricte, froide ; amour dépendant de la performance ; jugement/comparaison."],
          ["Masque / comportement", "Masque du rigide : perfectionnisme, dureté avec soi/les autres ; besoin de justice ; refus de l’imperfection."],
          ["Empathie (note du support)", "Rigidité : difficulté à se laisser toucher ou à montrer ses failles."],
          ["Addictions", "Travail excessif, perfectionnisme, hyper-contrôle sur soi."],
          ["Valeurs de vie", "Justice, équité, intégrité, vérité."],
          ["Conditionnements / dogmes", "« Il faut être parfait pour être aimé. » « Je ne dois rien laisser paraître. »"],
          ["Croyances limitantes", "« Je dois toujours prouver ma valeur. » « Je ne peux pas me montrer imparfait. »"],
          ["Croyances expansives", "« Je peux être aimé tel que je suis. » « Ma valeur est innée et indépendante de mes performances. »"],

      },

      // RÉFÉRENTIELS

          { kicker:"Ouverture & connexion", bullets:[

          { kicker:"Clé pédagogique", lead:"Les émotions de base sont les racines. Les sentiments sont les nuances prolongées.", text:

      { id:"ref_addictions", type:"REF", title:"Référentiel : addictions",
        subtitle:"Visibles, comportementales, invisibles.",
        accent:"#ffb020", accent2:"#ff5cd6",
        content: [
          { kicker:"Définition", lead:"Comportements répétitifs visant à éviter une émotion (substance, relation, travail, écrans, etc.)." },
          { kicker:"Addictions aux substances", bullets:[
            "Alcool, Tabac, Cannabis, Cocaïne, Héroïne, Amphétamines, Ecstasy, Médicaments psychotropes, Antidouleurs, Caféine, Sucre."

          { kicker:"Addictions comportementales", bullets:[

          ]},
          { kicker:"Addictions plus invisibles", bullets:[

          { kicker:"Message clé", lead:"L’addiction n’est pas une faute morale, mais un signe d’une émotion à reconnaître." }
        ]
      },

      { id:"ref_valeurs", type:"REF", title:"Référentiel : valeurs de vie",
        subtitle:"Piliers universels + exemples structurés.",
        accent:"#8a5cff", accent2:"#2de2e6",
        content: [
          { kicker:"Piliers universels (support)", lead:"Santé • Famille/Proches • Argent/Sécurité financière • Amour/Relations." },
          { kicker:"Exemples (support)", bullets:[

            "Créativité, compétence, excellence, service, contribution, coopération, justice, égalité.",

          ]},
          { kicker:"Utilité dans le modèle", lead:"Les valeurs prioritaires sont celles qui, lorsqu’elles sont bafouées, réveillent la blessure." }
        ]
      },

      { id:"ref_dogmes", type:"REF", title:"Référentiel : conditionnements & dogmes",
        subtitle:"Familiaux, sociaux, religieux, genre, éducatifs, psychologiques, intérieurs.",
        accent:"#c7a6ff", accent2:"#8a5cff",
        content: [
          { kicker:"Définition", lead:"Croyances héritées (familiales, sociétales, religieuses, culturelles) qui dictent nos comportements." },
          { kicker:"Exemples", bullets:[
            "Familiaux : « Sois sage et tais-toi. » « On ne parle pas de nos problèmes à l’extérieur. » …",
            "Sociaux/culturels : « Il faut travailler dur pour réussir. » « Il faut toujours être occupé pour avoir de la valeur. » …",
            "Religieux/spirituels : « Tu dois souffrir pour mériter. » « Le plaisir est un péché. » …",
            "Genre/rôle : « Un homme ne pleure pas. » « Une femme doit être parfaite. » …",
            "Éducatifs : « Si tu échoues, tu es nul. » « L’erreur est interdite. » …",
            "Psychologiques : « Si tu dis non, on ne t’aimera plus. » « Les conflits détruisent les relations. » …",
            "Intérieurs : « Je dois être parfait. » « Je ne suis pas assez bien. » …"
          ]},
          { kicker:"Message clé", lead:"Ce ne sont que des croyances héritées : les mettre en lumière rend la liberté intérieure possible." }
        ]
      },
    ];

    const NAV = [
      { section:"Carte", items:["home"] },
      { section:"Socles", items:["socle_confort","socle_apathie_empathie","socle_empathie"] },
      { section:"Blessures", items:["w_rejet","w_abandon","w_humiliation","w_trahison","w_injustice"] },
      { section:"Référentiels", items:["ref_emotions","ref_addictions","ref_valeurs","ref_dogmes"] },
    ];

    // DOM
    const navEl = document.getElementById("nav");
    const mainEl = document.getElementById("main");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const homeBtn = document.getElementById("homeBtn");
    const copyLinkBtn = document.getElementById("copyLinkBtn");

    // Helpers
    const getPage = (id) => PAGES.find(p => p.id === id);

    function setAccent(p){
      document.documentElement.style.setProperty("--accent", p.accent || "#2de2e6");
      document.documentElement.style.setProperty("--accent2", p.accent2 || "#8a5cff");
    }

    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // Router (hash)
    function getRoute(){
      return (location.hash || "#home").slice(1);
    }
    function go(id){
      location.hash = "#" + id;
    }

    // UI
    function renderNav(currentId){
      navEl.innerHTML = "";
      NAV.forEach(group => {
        const wrap = document.createElement("div");
        wrap.className = "navSection";
        wrap.innerHTML = `<div class="navTitle">${escapeHTML(group.section)}</div>`;

        group.items.forEach(id => {
          const p = getPage(id);
          const btn = document.createElement("button");
          btn.className = "navItem";
          btn.type = "button";
          btn.setAttribute("aria-current", id === currentId ? "page" : "false");
          btn.innerHTML = `
            ${escapeHTML(p.title)}
            <span class="navSmall">${escapeHTML(p.subtitle || "")}</span>
          `;
          btn.addEventListener("click", () => go(id));
          wrap.appendChild(btn);
        });

        navEl.appendChild(wrap);
      });
    }

    function renderHome(){
      const tiles = [
        { title:"Socles", id:"socle_apathie_empathie", desc:"Les pages fondatrices (lecture continue, pas de fragmentation)." },
        { title:"Blessures émotionnelles", id:"w_rejet", desc:"Grille stable : émotion → origine → masque → apathie → addictions → valeurs → dogmes → croyances." },
        { title:"Référentiels", id:"ref_emotions", desc:"Ressources : émotions/sentiments, addictions, valeurs, dogmes." },
        { title:"Point de départ recommandé", id:"socle_confort", desc:"Le mouvement Confort → Peur → Apprentissage → Expansion (toile de fond)." },
      ];

      mainEl.innerHTML = `
        <div class="card">
          <div class="kicker">Carte du système</div>
          <div class="lead">Tu navigues par structure, pas par “thèmes”.</div>
          <p>
            Objectif du prototype : vérifier si cette architecture rend le sujet plus clair, sans “jeu” ni simplification.
          </p>
        </div>

        <div class="mapGrid">
          ${tiles.map(t => `
            <div class="mapTile" data-go="${escapeHTML(t.id)}">
              <h3>${escapeHTML(t.title)}</h3>
              <p>${escapeHTML(t.desc)}</p>
            </div>
          `).join("")}
        </div>

        <div class="card" style="margin-top:12px;">
          <div class="kicker">Règle d’or</div>
          <div class="lead">Tout n’a pas le même statut.</div>
          <ul>
            <li><strong>Socles</strong> = ce qui organise la compréhension.</li>
            <li><strong>Blessures</strong> = grille répétable, stable.</li>
            <li><strong>Référentiels</strong> = ressources à consulter.</li>
          </ul>
        </div>
      `;

      mainEl.querySelectorAll(".mapTile").forEach(el => {
        el.addEventListener("click", () => go(el.dataset.go));
      });
    }

    function renderSocle(page){
      const blocks = (page.content || []).map(b => {
        const bullets = b.bullets?.length ? `<ul>${b.bullets.map(x=>`<li>${escapeHTML(x)}</li>`).join("")}</ul>` : "";
        const text = b.text ? `<p>${escapeHTML(b.text)}</p>` : "";
        return `
          <div class="card">
            <div class="kicker">${escapeHTML(b.kicker || "Socle")}</div>
            <div class="lead">${escapeHTML(b.lead || "")}</div>
            ${text}
            ${bullets}
          </div>
        `;
      }).join("");

      mainEl.innerHTML = blocks;
    }

    function renderBlessure(page){
      mainEl.innerHTML = `
        <div class="card">
          <div class="kicker">Structure stable</div>
          <div class="lead">${escapeHTML(page.title)}</div>
          <p>${escapeHTML(page.subtitle || "")}</p>
          ${page.note ? `<p class="note">${escapeHTML(page.note)}</p>` : ""}
        </div>

        <div class="woundGrid">
          ${page.grid.map(([k,v]) => `
            <div class="row">
              <div class="label">${escapeHTML(k)}</div>
              <div class="value">${escapeHTML(v)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderRef(page){
      const blocks = (page.content || []).map(b => {
        const bullets = b.bullets?.length ? `<ul>${b.bullets.map(x=>`<li>${escapeHTML(x)}</li>`).join("")}</ul>` : "";
        const text = b.text ? `<p>${escapeHTML(b.text)}</p>` : "";
        return `
          <div class="card">
            <div class="kicker">${escapeHTML(b.kicker || "Référentiel")}</div>
            <div class="lead">${escapeHTML(b.lead || "")}</div>
            ${text}
            ${bullets}
          </div>
        `;
      }).join("");
      mainEl.innerHTML = blocks;
    }

    function render(){
      const id = getRoute();
      const page = getPage(id) || getPage("home");
      setAccent(page);

      pageTitle.textContent = page.title || "Atlas";
      pageSubtitle.textContent = page.subtitle || "";

      renderNav(page.id);

      if(page.type === "HOME") renderHome();
      else if(page.type === "SOCLE") renderSocle(page);
      else if(page.type === "BLESSURE") renderBlessure(page);
      else if(page.type === "REF") renderRef(page);
      else renderHome();
    }

    // Toolbar
    homeBtn.addEventListener("click", () => go("home"));
    copyLinkBtn.addEventListener("click", async () => {
      const url = location.href;
      try{
        await navigator.clipboard.writeText(url);
        copyLinkBtn.textContent = "Lien copié ✓";
        setTimeout(() => copyLinkBtn.textContent = "Copier lien", 1200);
      } catch {
        // fallback
        prompt("Copie ce lien :", url);
      }
    });

    // Init
    window.addEventListener("hashchange", render);
    if(!location.hash) location.hash = "#home";
    render();
  </script>
</body>
</html>
