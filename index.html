<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>La méthode FIDES — Atlas</title>

  <style>
    /* ============================================================
      STYLE — SOBRE / PERF
      - Couleurs plus neutres
      - Peu d’animations
      - Pas de blur (backdrop-filter) => gros gain perf
      - Scrollbar intégrée au design
    ============================================================ */
    :root{
      /* Base */
      --bg0:#0b0e14;
      --bg1:#0f141c;

      /* Surfaces */
      --panel: rgba(255,255,255,0.04);
      --panel2: rgba(255,255,255,0.03);
      --stroke: rgba(255,255,255,0.10);

      /* Texte */
      --text: rgba(255,255,255,0.90);
      --muted: rgba(255,255,255,0.62);

      /* Accent sobre */
      --accent: #9aa7b7;     /* gris bleuté doux */
      --accent2:#7f8a98;     /* secondaire */

      --shadow: 0 10px 28px rgba(0,0,0,0.45);
      --radius2: 22px;
      --radius: 16px;

      --maxw: 1180px;

      /* Scrollbar inset */
      --sbSize: 8px;
      --sbPad: 12px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 700px at 18% 10%, rgba(140,160,190,0.10), transparent 60%),
        radial-gradient(800px 600px at 85% 30%, rgba(130,150,170,0.08), transparent 62%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
    }

    .app{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 16px;
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow:hidden;
      min-height: calc(100vh - 32px);
      display:flex;
      flex-direction:column;
    }

    /* ============================================================
      HEADER — logo + titre + menu
    ============================================================ */
    header{
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display:flex;
      justify-content:space-between;
      gap: 14px;
      align-items:center;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    }

    .brand{
      display:flex;
      gap: 12px;
      align-items:center;
      min-width: 0;
    }

    .logoBtn{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      border-radius: 14px;
      padding: 8px 10px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logoBtn:hover{ border-color: rgba(255,255,255,0.14); }

    .logo{
      height: 34px;
      width: auto;
      display:block;
      object-fit: contain;
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      padding: 6px 8px;
    }

    .titleBox{
      min-width: 0;
    }

    header h1{
      margin:0;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    header p{
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12.6px;
      line-height: 1.35;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 10px;
      cursor:pointer;
      font-weight: 820;
      font-size: 12.5px;
      white-space: nowrap;
    }
    .btn:hover{ border-color: rgba(255,255,255,0.18); }

    .btn--quiet{
      background: rgba(0,0,0,0.10);
      color: rgba(255,255,255,0.78);
    }

    /* ============================================================
      LAYOUT — nav + main
    ============================================================ */
    .content{
      display:grid;
      grid-template-columns: 310px 1fr;
      min-height:0;
      flex:1;
    }
    @media (max-width: 980px){
      .content{ grid-template-columns: 1fr; }
    }

    /* Scrollbar intégrée (comme ton ancien style, mais sobre) */
    .scrollArea{
      overflow:auto;
      padding-right: var(--sbPad);
      scrollbar-gutter: stable both-edges;
    }
    .scrollArea{
      scrollbar-width: thin;
      scrollbar-color: rgba(170,185,205,0.30) rgba(0,0,0,0.18);
    }
    .scrollArea::-webkit-scrollbar{ width: var(--sbSize); height: var(--sbSize); }
    .scrollArea::-webkit-scrollbar-track{
      background: rgba(0,0,0,0.16);
      border-radius: 999px;
      margin: 10px;
    }
    .scrollArea::-webkit-scrollbar-thumb{
      background: linear-gradient(180deg, rgba(170,185,205,0.30), rgba(170,185,205,0.18));
      border: 2px solid rgba(0,0,0,0.16);
      border-radius: 999px;
    }
    .scrollArea::-webkit-scrollbar-thumb:hover{
      background: linear-gradient(180deg, rgba(170,185,205,0.36), rgba(170,185,205,0.22));
    }

    nav{
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
      min-height:0;
      background: rgba(0,0,0,0.10);
    }
    @media (max-width: 980px){
      nav{
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        max-width: 420px;
        width: calc(100% - 56px);
        transform: translateX(-110%);
        transition: transform .14s ease;
        border-right: 1px solid rgba(255,255,255,0.10);
        z-index: 50;
        box-shadow: 0 20px 70px rgba(0,0,0,0.60);
        border-top-right-radius: 18px;
        border-bottom-right-radius: 18px;
      }
      nav[data-open="true"]{ transform: translateX(0); }
    }

    .backdrop{
      display:none;
    }
    @media (max-width: 980px){
      .backdrop{
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 40;
        display:none;
      }
      .backdrop[data-open="true"]{ display:block; }
    }

    .navSection{
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .navTitle{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 4px 0 10px;
    }
    .navItem{
      width:100%;
      text-align:left;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.10);
      color: rgba(255,255,255,0.90);
      border-radius: 14px;
      padding: 10px 10px;
      cursor:pointer;
      font-weight: 820;
      font-size: 12.8px;
      margin-bottom: 8px;
    }
    .navItem:hover{
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
    }
    .navItem[aria-current="page"]{
      border-color: rgba(190,205,225,0.28);
      background: rgba(190,205,225,0.08);
    }
    .navSmall{
      display:block;
      margin-top: 3px;
      color: rgba(255,255,255,0.60);
      font-size: 11.4px;
      font-weight: 650;
      line-height: 1.25;
    }

    main{
      min-height:0;
      padding: 16px;
    }

    .card{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.12);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }

    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin: 0 0 8px;
    }
    .lead{
      font-size: 14px;
      font-weight: 900;
      margin: 0 0 8px;
      line-height: 1.35;
    }
    p, li{
      color: rgba(255,255,255,0.86);
      font-size: 13.2px;
      line-height: 1.6;
    }
    ul{ margin: 8px 0 0 18px; }

    /* Home tiles (sobre, quasi sans animation) */
    .mapGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 980px){
      .mapGrid{ grid-template-columns: 1fr; }
    }
    .mapTile{
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.12);
      border-radius: 16px;
      padding: 14px;
      cursor:pointer;
    }
    .mapTile:hover{
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.03);
    }
    .mapTile h3{
      margin:0;
      font-size: 14.5px;
      font-weight: 940;
      line-height: 1.25;
    }
    .mapTile p{
      margin: 7px 0 0;
      color: rgba(255,255,255,0.70);
      font-size: 12.6px;
      line-height: 1.45;
    }

    /* Blessures : grille stable */
    .woundGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .row{
      display:grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.10);
    }
    @media (max-width: 740px){
      .row{ grid-template-columns: 1fr; }
    }
    .label{
      font-weight: 950;
      font-size: 12.8px;
      color: rgba(255,255,255,0.88);
    }
    .value{
      color: rgba(255,255,255,0.84);
      font-size: 13.2px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">

      <header>
        <div class="brand">
          <!-- Logo cliquable = retour à l’accueil (sans bouton “retour”) -->
          <button class="logoBtn" id="logoBtn" type="button" title="Accueil">
            <img class="logo" src="image.png" alt="LA MÉTHODE FIDES">
          </button>

          <div class="titleBox">
            <h1 id="pageTitle">Carte du système</h1>
            <p id="pageSubtitle">Socles • Blessures • Référentiels</p>
          </div>
        </div>

        <div class="toolbar">
          <button class="btn btn--quiet" id="menuBtn" type="button">Menu</button>
        </div>
      </header>

      <div class="content">
        <div class="backdrop" id="backdrop" data-open="false"></div>
        <nav class="scrollArea" id="nav" data-open="false" aria-label="Menu"></nav>
        <main class="scrollArea" id="main"></main>
      </div>

    </div>
  </div>

  <script>
    /* ============================================================
      ROUTING simple (hash) — pas de mentions “prototype”
    ============================================================ */

    const PAGES = [
      // Accueil
      { id:"home", type:"HOME", title:"Carte du système", subtitle:"Socles • Blessures • Référentiels" },

      // SOCLES
      { id:"socle_confort", type:"SOCLE", title:"Le cercle de la zone de confort",
        subtitle:"Confort → Peur → Apprentissage → Expansion.",
        content: [
          { kicker:"But pédagogique", lead:"Montrer les différentes zones (confort, peur, apprentissage, expansion).", bullets:[
            "Zone de confort = sécurité illusoire, répétition des habitudes, évitement de l’inconfort.",
            "Zone de peur = doutes, jugements des autres, perte de repères.",
            "Zone d’apprentissage = nouvelles compétences, élargissement de soi, expérimentation.",
            "Zone d’expansion = réalisation de soi, alignement avec sa valeur, contribution au monde.",
          ]},
          { kicker:"Message clé", lead:"Pour avancer, il faut oser franchir la peur et passer par l’apprentissage.", text:
            "Sans ce passage, on reste prisonnier de l’illusion de sécurité."
          }
        ]
      },

      { id:"socle_apathie_empathie", type:"SOCLE", title:"Blessures émotionnelles : apathie ↔ empathie",
        subtitle:"Apathie = fermeture émotionnelle protectrice ; empathie = réouverture.",
        content: [
          { kicker:"Point central", lead:"Quand une blessure s’active, l’apathie prend le dessus.", text:
            "Ici, l’apathie n’est pas une absence d’émotion au sens médical : c’est un état de fermeture émotionnelle qui se met en place quand une douleur ancienne se réveille."
          },
          { kicker:"Fonction", lead:"Réaction inconsciente de protection / mode de survie émotionnel.", text:
            "En reconnaissant cette fermeture et en la traversant avec bienveillance, on peut retrouver la connexion à soi, à l’autre et à la vie."
          },
          { kicker:"Finalité", lead:"Ouverture de conscience : acceptation de soi et de l’autre, sans jugement.", text:
            "Quels que soient les comportements observés."
          }
        ]
      },

      { id:"socle_empathie", type:"SOCLE", title:"L’empathie",
        subtitle:"Résonance sans fusion.",
        content: [
          { kicker:"Définition", lead:"Capacité à se mettre en résonance avec l’émotion de l’autre, sans se confondre avec elle." },
          { kicker:"Différences", lead:"Empathie vs compassion / sympathie.", bullets:[
            "Empathie vs compassion : l’une ressent, l’autre agit.",
            "Empathie vs sympathie : l’une écoute, l’autre se projette."
          ]},
          { kicker:"Freins à l’empathie", lead:"Les blessures émotionnelles voilent l’empathie.", bullets:[
            "Rejet : envie de s’isoler / se couper.",
            "Injustice : rigidité, contrôle de soi.",
            "Trahison : méfiance / suspicion.",
            "Humiliation : honte, fuite du contact.",
            "Abandon : besoin de combler le vide avant d’écouter."
          ]},
          { kicker:"Message clé", lead:"L’empathie est naturelle, mais elle est voilée par nos blessures." }
        ]
      },

      // BLESSURES (structure stable)
      { id:"w_trahison", type:"BLESSURE", title:"Blessure : trahison", subtitle:"Émotion racine : surprise.",
        grid: [
          ["Émotion", "Surprise."],
          ["Âge d’ancrage (indiqué)", "6–7 ans (première activation)."],
          ["Origine", "Expérience de trahison réelle ou vécue comme telle (parent absent, infidélité, promesse non tenue). Perte de confiance dans l’autre et dans l’humanité."],
          ["Masque / comportement", "Masque du contrôlant : cassant, exigeant. Besoin de tout vérifier, d’imposer sa volonté. Difficulté à lâcher prise."],
          ["Apathie", "Méfiance, contrôle ou test permanent de l’autre."],
          ["Addictions", "Pouvoir, contrôle, réussite, domination. Travail ou sport comme moyen de ne pas perdre la main."],
          ["Valeurs de vie", "Loyauté, fidélité, vérité, apparence/paraître, argent (statut social, entourage, savoir)."],
          ["Conditionnements / dogmes", "« On ne peut faire confiance à personne. » « Il faut tout contrôler. » « N’aime pas avoir tort. » « N’aime pas perdre. »"],
          ["Croyances limitantes", "« Les autres vont forcément me trahir. » « Je dois garder le contrôle. » « Où est la performance concrète ? » « Il faut le voir pour y croire. »"],
          ["Croyances expansives", "« Je me détache du résultat, car le chemin compte. » « Laisser à l’autre le bénéfice du doute. » « J’accepte l’autre tel qu’il est. »"],
        ]
      },

      { id:"w_abandon", type:"BLESSURE", title:"Blessure : abandon", subtitle:"Émotion racine : peur.",
        grid: [
          ["Émotion", "Peur."],
          ["Origine", "Sentiment d’être laissé seul, manques affectifs dans l’enfance. Difficultés à exister sans la présence rassurante d’autrui."],
          ["Masque / comportement", "Masque du dépendant : fusion, peur de la solitude, besoin excessif de soutien. Peut dire qu’il se sent bien seul et n’a besoin de personne."],
          ["Empathie (note)", "Confond souvent empathie et fusion ; donne trop pour éviter d’être abandonné."],
          ["Addictions", "Dépendances affectives, relations, réseaux sociaux, alcool — tout ce qui comble le vide intérieur."],
          ["Valeurs de vie", "Amour, proximité, lien, chaleur humaine, partage."],
          ["Conditionnements / dogmes", "« Je dois toujours être avec quelqu’un pour exister. » « Si je suis seul, je ne vaux rien. »"],
          ["Croyances limitantes", "« Je finis toujours seul. » « Personne ne reste jamais avec moi. »"],
          ["Croyances expansives", "« Je suis complet même dans la solitude. » « Je peux créer des liens stables et nourrissants. »"],
        ]
      },

      { id:"w_rejet", type:"BLESSURE", title:"Blessure : rejet", subtitle:"Émotion racine : tristesse.",
        grid: [
          ["Émotion", "Tristesse."],
          ["Origine", "Très tôt (parfois indiqué : dans le ventre de la mère). Sentiment de ne pas avoir sa place, de déranger, d’être de trop."],
          ["Masque / comportement", "Masque du fuyant : se retirer, se couper, se rendre invisible. Difficulté à s’affirmer, peur de déranger."],
          ["Empathie (note)", "Difficulté à s’ouvrir par peur d’être ignoré ; peut se couper des autres pour éviter de revivre le rejet."],
          ["Addictions", "Isolement, écrans, alimentation compulsive discrète (addictions solitaires)."],
          ["Valeurs de vie", "Sécurité intérieure, acceptation de la différence de l’autre, autonomie, foi en la vie et en l’humain, amour."],
          ["Conditionnements / dogmes", "« Je dois rester invisible pour être accepté. » « Si je me montre, je dérange. »"],
          ["Croyances limitantes", "« Je n’ai pas ma place. » « Je ne suis pas digne d’être vu. »"],
          ["Croyances expansives", "« Ma présence suffit pour être aimé. » « J’ai une place unique et légitime. »"],
        ]
      },

      { id:"w_humiliation", type:"BLESSURE", title:"Blessure : humiliation", subtitle:"Émotion racine : dégoût.",
        grid: [
          ["Émotion", "Dégoût."],
          ["Origine", "Expérience de honte, dévalorisation, humiliation dans l’enfance ; souvent liée à l’éducation stricte / regard social ou familial."],
          ["Masque / comportement", "Masque du masochiste : se rabaisser, se sacrifier, se punir ; culpabilité ; rend service au-delà de ses limites ; anticipe les besoins des autres sans accord."],
          ["Empathie (note)", "Freinée par la honte — peur de montrer sa vulnérabilité."],
          ["Addictions", "Nourriture, sexualité, auto-sabotage ; excès pour compenser la honte."],
          ["Valeurs de vie", "Respect, dignité, authenticité."],
          ["Conditionnements / dogmes", "« Je dois me sacrifier pour les autres. » « Je ne dois pas exister pleinement. »"],
          ["Croyances limitantes", "« Je ne mérite pas d’être heureux. » « Je dois porter la honte. »"],
          ["Croyances expansives", "« Je mérite le respect et la joie de vivre. » « Je peux exister avec dignité. »"],
        ]
      },

      { id:"w_injustice", type:"BLESSURE", title:"Blessure : injustice", subtitle:"Émotion racine : colère intérieure.",
        grid: [
          ["Émotion", "Colère intérieure (maintenue par peur de blesser/détruire l’autre)."],
          ["Origine", "Éducation stricte, froide ; amour dépendant de la performance ; jugement/comparaison."],
          ["Masque / comportement", "Masque du rigide : perfectionnisme, dureté avec soi/les autres ; besoin de justice ; refus de l’imperfection."],
          ["Empathie (note)", "Rigidité : difficulté à se laisser toucher ou à montrer ses failles."],
          ["Addictions", "Travail excessif, perfectionnisme, hyper-contrôle sur soi."],
          ["Valeurs de vie", "Justice, équité, intégrité, vérité."],
          ["Conditionnements / dogmes", "« Il faut être parfait pour être aimé. » « Je ne dois rien laisser paraître. »"],
          ["Croyances limitantes", "« Je dois toujours prouver ma valeur. » « Je ne peux pas me montrer imparfait. »"],
          ["Croyances expansives", "« Je peux être aimé tel que je suis. » « Ma valeur est innée et indépendante de mes performances. »"],
        ]
      },

      // RÉFÉRENTIELS
      { id:"ref_emotions", type:"REF", title:"Référentiel : émotions & sentiments", subtitle:"Émotions racines + sentiments (nuances).",
        content: [
          { kicker:"Émotions racines", lead:"Peur • Colère • Tristesse • Joie • Dégoût." },
          { kicker:"Sentiments agréables / expansifs", bullets:[
            "Joie, Amour, Sérénité, Gratitude, Confiance, Inspiration, Espoir, Enthousiasme, Curiosité, Fierté, Admiration, Tendresse, Satisfaction, Soulagement, Amusement."
          ]},
          { kicker:"Peur & insécurité", bullets:[
            "Anxiété, Inquiétude, Stress, Méfiance, Doute, Crainte, Panique, Impuissance, Inconfort, Tension, Sentiment d’insécurité."
          ]},
          { kicker:"Colère & frustration", bullets:[
            "Agacement, Irritation, Frustration, Colère, Rancune, Haine, Exaspération, Hostilité, Jalousie, Ressentiment, Envie, Dégoût."
          ]},
          { kicker:"Tristesse & perte", bullets:[
            "Mélancolie, Nostalgie, Chagrin, Solitude, Découragement, Déception, Vide intérieur, Abattement, Désespoir, Impuissance, Larmes intérieures."
          ]},
          { kicker:"Injustice & humiliation", bullets:[
            "Honte, Culpabilité, Sentiment d’échec, Infériorité, Dévalorisation, Indignité, Injustice, Rigidité intérieure."
          ]},
          { kicker:"Ouverture & connexion", bullets:[
            "Compassion, Empathie, Ouverture, Intimité, Communion, Alignement, Paix intérieure, Liberté, Expansion, Sens du sacré."
          ]},
        ]
      },

      { id:"ref_addictions", type:"REF", title:"Référentiel : addictions", subtitle:"Substances • comportementales • invisibles.",
        content: [
          { kicker:"Définition", lead:"Comportements répétitifs visant à éviter une émotion (substance, relation, travail, écrans, etc.)." },
          { kicker:"Addictions aux substances", bullets:[
            "Alcool, Tabac, Cannabis, Cocaïne, Héroïne, Amphétamines, Ecstasy, Médicaments psychotropes, Antidouleurs, Caféine, Sucre."
          ]},
          { kicker:"Addictions comportementales", bullets:[
            "Jeux d’argent, Jeux vidéo, Internet, Réseaux sociaux, Téléphone, Télévision, Achats compulsifs, Travail, Sport, Sexe, Amour, Relations toxiques, Nourriture, Régimes, Automutilation."
          ]},
          { kicker:"Addictions plus invisibles", bullets:[
            "Perfectionnisme, Contrôle, Besoin de reconnaissance, Hyperactivité, Dépendance à l’adrénaline, Dépendance spirituelle, Dépendance émotionnelle."
          ]},
        ]
      },

      { id:"ref_valeurs", type:"REF", title:"Référentiel : valeurs de vie", subtitle:"Piliers universels + exemples.",
        content: [
          { kicker:"Piliers universels", lead:"Santé • Famille/Proches • Argent/Sécurité financière • Amour/Relations." },
          { kicker:"Exemples", bullets:[
            "Authenticité, liberté, indépendance, responsabilité, courage, simplicité, persévérance, discipline, dépassement de soi, savoir, croissance personnelle, équilibre.",
            "Famille, amour, couple, amitié, bienveillance, fidélité, loyauté, solidarité, transmission, respect, tolérance, partage.",
            "Argent, sécurité matérielle, confort, abondance, stabilité économique, réussite sociale, efficacité, ambition, reconnaissance, succès.",
            "Santé, vitalité, bien-être, énergie, longévité, nature, beauté, plaisir de vivre.",
            "Créativité, compétence, excellence, service, contribution, coopération, justice, égalité.",
            "Foi, sagesse, espoir, paix intérieure, gratitude, transcendance, émerveillement, sens de la vie."
          ]},
        ]
      },

      { id:"ref_dogmes", type:"REF", title:"Référentiel : conditionnements & dogmes", subtitle:"Familiaux • sociaux • religieux • genre • éducatifs • psychologiques • intérieurs.",
        content: [
          { kicker:"Définition", lead:"Croyances héritées qui dictent nos comportements." },
          { kicker:"Exemples (extraits)", bullets:[
            "Familiaux : « Sois sage et tais-toi. » « On ne parle pas de nos problèmes à l’extérieur. »",
            "Sociaux : « Il faut travailler dur pour réussir. » « Il faut toujours être occupé pour avoir de la valeur. »",
            "Religieux : « Tu dois souffrir pour mériter. » « Le plaisir est un péché. »",
            "Genre : « Un homme ne pleure pas. » « Une femme doit être parfaite. »",
            "Éducatifs : « Si tu échoues, tu es nul. » « L’erreur est interdite. »",
            "Psychologiques : « Si tu dis non, on ne t’aimera plus. » « Les conflits détruisent les relations. »",
            "Intérieurs : « Je dois être parfait. » « Je ne suis pas assez bien. »"
          ]},
        ]
      },
    ];

    const NAV = [
      { section:"Carte", items:["home"] },
      { section:"Socles", items:["socle_confort","socle_apathie_empathie","socle_empathie"] },
      { section:"Blessures", items:["w_rejet","w_abandon","w_humiliation","w_trahison","w_injustice"] },
      { section:"Référentiels", items:["ref_emotions","ref_addictions","ref_valeurs","ref_dogmes"] },
    ];

    // DOM
    const navEl = document.getElementById("nav");
    const mainEl = document.getElementById("main");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const menuBtn = document.getElementById("menuBtn");
    const backdrop = document.getElementById("backdrop");
    const logoBtn = document.getElementById("logoBtn");

    // Helpers
    const getPage = (id) => PAGES.find(p => p.id === id);

    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // Router
    function getRoute(){
      return (location.hash || "#home").slice(1);
    }
    function go(id){
      location.hash = "#" + id;
    }

    // Mobile menu toggle
    function setMenu(open){
      navEl.setAttribute("data-open", open ? "true" : "false");
      backdrop.setAttribute("data-open", open ? "true" : "false");
    }

    menuBtn.addEventListener("click", () => {
      const open = navEl.getAttribute("data-open") === "true";
      setMenu(!open);
    });
    backdrop.addEventListener("click", () => setMenu(false));
    document.addEventListener("keydown", (e) => { if(e.key === "Escape") setMenu(false); });

    // Logo click => home (sans bouton “retour”)
    logoBtn.addEventListener("click", () => go("home"));

    // UI
    function renderNav(currentId){
      navEl.innerHTML = "";
      NAV.forEach(group => {
        const wrap = document.createElement("div");
        wrap.className = "navSection";
        wrap.innerHTML = `<div class="navTitle">${escapeHTML(group.section)}</div>`;

        group.items.forEach(id => {
          const p = getPage(id);
          const btn = document.createElement("button");
          btn.className = "navItem";
          btn.type = "button";
          btn.setAttribute("aria-current", id === currentId ? "page" : "false");
          btn.innerHTML = `
            ${escapeHTML(p.title)}
            <span class="navSmall">${escapeHTML(p.subtitle || "")}</span>
          `;
          btn.addEventListener("click", () => {
            go(id);
            setMenu(false); // ferme menu sur mobile
          });
          wrap.appendChild(btn);
        });

        navEl.appendChild(wrap);
      });
    }

    function renderHome(){
      const tiles = [
        { title:"Socles", id:"socle_apathie_empathie", desc:"Pages fondatrices (lecture continue)." },
        { title:"Blessures émotionnelles", id:"w_rejet", desc:"Grille stable : émotion → origine → masque → apathie → addictions → valeurs → dogmes → croyances." },
        { title:"Référentiels", id:"ref_emotions", desc:"Ressources : émotions/sentiments, addictions, valeurs, dogmes." },
        { title:"Point de départ", id:"socle_confort", desc:"Confort → Peur → Apprentissage → Expansion." },
      ];

      mainEl.innerHTML = `
        <div class="card">
          <div class="kicker">Structure</div>
          <div class="lead">Socles • Blessures • Référentiels</div>
          <p>Navigation par structure (et non par “catalogue”).</p>
        </div>

        <div class="mapGrid">
          ${tiles.map(t => `
            <div class="mapTile" data-go="${escapeHTML(t.id)}">
              <h3>${escapeHTML(t.title)}</h3>
              <p>${escapeHTML(t.desc)}</p>
            </div>
          `).join("")}
        </div>
      `;

      mainEl.querySelectorAll(".mapTile").forEach(el => {
        el.addEventListener("click", () => go(el.dataset.go));
      });
    }

    function renderSocle(page){
      const blocks = (page.content || []).map(b => {
        const bullets = b.bullets?.length ? `<ul>${b.bullets.map(x=>`<li>${escapeHTML(x)}</li>`).join("")}</ul>` : "";
        const text = b.text ? `<p>${escapeHTML(b.text)}</p>` : "";
        return `
          <div class="card">
            <div class="kicker">${escapeHTML(b.kicker || "Socle")}</div>
            <div class="lead">${escapeHTML(b.lead || "")}</div>
            ${text}
            ${bullets}
          </div>
        `;
      }).join("");

      mainEl.innerHTML = blocks;
    }

    function renderBlessure(page){
      mainEl.innerHTML = `
        <div class="card">
          <div class="kicker">Blessure</div>
          <div class="lead">${escapeHTML(page.title)}</div>
          <p>${escapeHTML(page.subtitle || "")}</p>
        </div>

        <div class="woundGrid">
          ${page.grid.map(([k,v]) => `
            <div class="row">
              <div class="label">${escapeHTML(k)}</div>
              <div class="value">${escapeHTML(v)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderRef(page){
      const blocks = (page.content || []).map(b => {
        const bullets = b.bullets?.length ? `<ul>${b.bullets.map(x=>`<li>${escapeHTML(x)}</li>`).join("")}</ul>` : "";
        const text = b.text ? `<p>${escapeHTML(b.text)}</p>` : "";
        return `
          <div class="card">
            <div class="kicker">${escapeHTML(b.kicker || "Référentiel")}</div>
            <div class="lead">${escapeHTML(b.lead || "")}</div>
            ${text}
            ${bullets}
          </div>
        `;
      }).join("");
      mainEl.innerHTML = blocks;
    }

    function render(){
      const id = getRoute();
      const page = getPage(id) || getPage("home");

      pageTitle.textContent = page.title || "La méthode FIDES";
      pageSubtitle.textContent = page.subtitle || "";

      renderNav(page.id);

      if(page.type === "HOME") renderHome();
      else if(page.type === "SOCLE") renderSocle(page);
      else if(page.type === "BLESSURE") renderBlessure(page);
      else if(page.type === "REF") renderRef(page);
      else renderHome();
    }

    // Init
    window.addEventListener("hashchange", render);
    if(!location.hash) location.hash = "#home";
    render();
  </script>
</body>
</html>
