<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support de formation – FIDES & mécanismes émotionnels</title>

  <style>
    /* ============================================================
      DESIGN SYSTEM — Dark + Glass + Accent dynamique
      ------------------------------------------------------------
      ✅ Les accents par thème sont pilotés par JS (setThemeAccent)
      ✅ Zoom diagramme = variable CSS --diagramZoom (contrôlé en JS)
    ============================================================ */
    :root{
      --bg0:#070913;
      --bg1:#0b1022;

      --glass: rgba(255,255,255,0.07);
      --stroke: rgba(255,255,255,0.14);

      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --muted2: rgba(255,255,255,0.55);

      --accent: #2de2e6;
      --accent2:#8a5cff;

      --shadow: 0 14px 40px rgba(0,0,0,0.45);
      --radius: 20px;
      --radius2: 26px;

      --diagramZoom: 1;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 650px at 18% 12%, color-mix(in srgb, var(--accent2) 30%, transparent), transparent 60%),
        radial-gradient(760px 520px at 82% 30%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 62%),
        radial-gradient(680px 520px at 60% 86%, rgba(255,92,214,0.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      overflow: hidden;
    }

    /* ============================================================
      SCROLLBARS — intégrées au design (Chrome/Edge/Safari + Firefox)
    ============================================================ */
    *{
      scrollbar-width: thin; /* Firefox */
      scrollbar-color: color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,0.25))
                      rgba(0,0,0,0.25);
    }
    ::-webkit-scrollbar{ width: 10px; height: 10px; }
    ::-webkit-scrollbar-track{
      background: rgba(0,0,0,0.22);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb{
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent2) 55%, rgba(255,255,255,0.15)),
        color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,0.15))
      );
      border: 2px solid rgba(0,0,0,0.25);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover{
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent2) 70%, rgba(255,255,255,0.18)),
        color-mix(in srgb, var(--accent) 70%, rgba(255,255,255,0.18))
      );
    }

    /* ============================================================
      LAYOUT — 2 modes
      - mode-home   : accueil catégories + cartes thèmes (léger)
      - mode-module : focus module (diagramme + aside)
    ============================================================ */
    .app{
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 14px;
      padding: 14px;
    }
    .panel{
      background: var(--glass);
      border: 1px solid var(--stroke);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
    }

    /* ============================================================
      MAIN
    ============================================================ */
    .main{ display:flex; flex-direction:column; overflow:hidden; }
    .main__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
    }
    .titleblock h2{ margin:0; font-size: 18px; font-weight: 900; letter-spacing:.2px; }
    .titleblock p{ margin: 6px 0 0; color: var(--muted); font-size: 13px; line-height: 1.4; }

    .chiprow{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 10px; }
    .chip{
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.82);
      user-select:none;
    }
    .chip strong{ color: var(--accent); font-weight: 900; }

    .canvas{ padding: 14px; height: 100%; overflow:auto; }

    /* ============================================================
      TOPBAR (module) — retour + select + zoom + progression
    ============================================================ */
    .topbar{
      padding: 10px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
    }
    .topbar__left, .topbar__right{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }

    .btn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: var(--text);
      border-radius: 14px;
      padding: 9px 10px;
      cursor:pointer;
      transition: background .18s ease, transform .12s ease, border-color .18s ease;
      font-weight: 780;
      font-size: 12.5px;
    }
    .btn:hover{
      background: rgba(255,255,255,0.07);
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .btn--accent{
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--accent2) 20%, rgba(0,0,0,0.18)),
        color-mix(in srgb, var(--accent) 10%, rgba(0,0,0,0.18))
      );
    }
    .progressPill{
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
    }
    .progressPill strong{ color: var(--accent); font-weight: 900; }

    select{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.18);
      color: rgba(255,255,255,0.88);
      border-radius: 14px;
      padding: 9px 10px;
      font-weight: 740;
      font-size: 12.5px;
      outline: none;
    }

    /* ============================================================
      HOME — catégories + cartes thèmes (moins chargé)
    ============================================================ */
    .homeTop{
      display:flex;
      flex-direction:column;
      gap: 10px;
      margin-bottom: 12px;
    }
    .categoryRow{
      display:flex;
      gap: 8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .categoryBtn{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 820;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      display:flex;
      align-items:center;
      gap: 8px;
    }
    .categoryBtn:hover{
      background: rgba(255,255,255,0.06);
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .categoryBtn[aria-pressed="true"]{
      background: color-mix(in srgb, var(--accent2) 18%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
    }
    .categoryDot{
      width:8px; height:8px; border-radius:99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .homeGrid{
      display:grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .themeCard{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: 18px;
      padding: 14px;
      cursor:pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      position: relative;
      overflow:hidden;
      min-height: 92px;
    }
    .themeCard:hover{
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent2) 45%, rgba(255,255,255,0.12));
      background: rgba(255,255,255,0.05);
    }
    .themeCard h3{
      margin:0;
      font-size: 14px;
      font-weight: 920;
      line-height: 1.25;
    }
    .themeCard p{
      margin:6px 0 0;
      color: rgba(255,255,255,0.70);
      font-size: 12.5px;
      line-height:1.35;
    }
    .themeCard .mini{
      margin-top:10px;
      display:flex; gap:8px; flex-wrap:wrap;
      color: rgba(255,255,255,0.70);
      font-size: 12px;
    }
    .tag{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      padding: 5px 9px;
      border-radius: 999px;
    }

    /* Thèmes visités */
    .themeCard.is-visited{
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
    }
    .themeCard.is-visited::after{
      content: "✓ vu";
      position:absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      font-weight: 900;
      color: rgba(255,255,255,0.88);
      background: color-mix(in srgb, var(--accent) 20%, rgba(0,0,0,0.25));
      border: 1px solid rgba(255,255,255,0.14);
      padding: 5px 8px;
      border-radius: 999px;
    }

    /* ============================================================
      MODULE — nœuds cliquables (pills)
    ============================================================ */
    .actions{
      padding: 10px 18px 12px;
      display:flex;
      gap:8px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .actionPill{
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.14);
      color: rgba(255,255,255,0.88);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 820;
      cursor: pointer;
      transition: transform .12s ease, background .18s ease, border-color .18s ease;
      display:flex; align-items:center; gap:8px;
    }
    .actionPill:hover{
      background: rgba(255,255,255,0.06);
      border-color: color-mix(in srgb, var(--accent) 35%, rgba(255,255,255,0.14));
      transform: translateY(-1px);
    }
    .actionPill[aria-pressed="true"]{
      background: color-mix(in srgb, var(--accent2) 18%, rgba(0,0,0,0.14));
      border-color: color-mix(in srgb, var(--accent2) 50%, rgba(255,255,255,0.14));
    }
    .actionDot{
      width:8px; height:8px; border-radius: 99px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .actionCheck{
      margin-left: 4px;
      font-size: 12px;
      opacity: 0.92;
      color: rgba(255,255,255,0.85);
    }
    .actionPill.is-visited{
      border-color: color-mix(in srgb, var(--accent) 45%, rgba(255,255,255,0.14));
      background: color-mix(in srgb, var(--accent) 10%, rgba(0,0,0,0.14));
    }

    /* ============================================================
      DIAGRAM — anti-écrasement + zoom + scroll
    ============================================================ */
    .svg-wrap{
      border-radius: var(--radius2);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.12);
      overflow:auto; /* ✅ scroll si besoin plutôt que compresser */
      position: relative;
    }
    .svg-stage{
      padding: 10px;
      width: max-content;
      transform: scale(var(--diagramZoom));
      transform-origin: top left;
    }
    svg{
      width: 1100px;      /* taille native lisible */
      max-width: 1100px;
      height: auto;
      display:block;
    }
    .diagram-caption{
      padding: 10px 12px 12px;
      font-size: clamp(13px, 1.2vw, 15px);
      color: rgba(255,255,255,0.74);
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.10);
    }
    .diagram-caption strong{ color: var(--accent); font-weight: 900; }

    /* SVG nodes */
    .link{
      stroke: rgba(255,255,255,0.18);
      stroke-width: 2;
      fill: none;
      transition: stroke .2s ease, opacity .2s ease, stroke-width .2s ease;
      opacity: 0.9;
    }
    .node{
      cursor: pointer;
      outline: none;
    }
    .node circle{
      fill: rgba(255,255,255,0.06);
      stroke: rgba(255,255,255,0.22);
      stroke-width: 2;
      transition: transform .18s ease, stroke .18s ease, fill .18s ease, filter .18s ease;
      transform-origin: center;
    }
    .node text{
      fill: rgba(255,255,255,0.92);
      font-weight: 900;
      font-size: 14px;
      paint-order: stroke;
      stroke: rgba(0,0,0,0.35);
      stroke-width: 3px;
      user-select: none;
    }
    .node .sub{
      font-size: 12px;
      fill: rgba(255,255,255,0.76);
      font-weight: 760;
      stroke-width: 0;
    }
    .node[data-role="core"] circle{
      fill: color-mix(in srgb, var(--accent2) 16%, rgba(255,255,255,0.06));
      stroke: color-mix(in srgb, var(--accent2) 60%, rgba(255,255,255,0.22));
      filter: drop-shadow(0px 8px 18px color-mix(in srgb, var(--accent2) 20%, transparent));
    }
    .node[data-role="leaf"] circle{
      fill: color-mix(in srgb, var(--accent) 11%, rgba(255,255,255,0.06));
      stroke: color-mix(in srgb, var(--accent) 52%, rgba(255,255,255,0.22));
      filter: drop-shadow(0px 6px 16px color-mix(in srgb, var(--accent) 16%, transparent));
    }
    .node:hover circle,
    .node:focus-visible circle{
      stroke: rgba(255,255,255,0.96);
      fill: rgba(255,255,255,0.10);
      transform: scale(1.06);
      filter: drop-shadow(0px 12px 24px color-mix(in srgb, var(--accent) 28%, transparent));
    }
    .node.is-active circle{
      stroke: rgba(255,255,255,0.98);
      fill: rgba(255,255,255,0.12);
      transform: scale(1.07);
      filter: drop-shadow(0px 14px 28px color-mix(in srgb, var(--accent) 32%, transparent));
    }
    .link.is-active{
      stroke: color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,0.18));
      stroke-width: 3;
      opacity: 1;
    }

    /* Nœuds visités (SVG) */
    .node.is-visited circle{
      stroke: color-mix(in srgb, var(--accent) 75%, rgba(255,255,255,0.22));
      fill: color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,0.06));
      opacity: 0.96;
    }

    /* ============================================================
      ASIDE — texte
    ============================================================ */
    .aside{ display:flex; flex-direction:column; overflow:hidden; }
    .aside__header{
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .aside__header h3{
      margin:0;
      font-size: 14px;
      font-weight: 900;
    }
    .aside__header p{
      margin: 6px 0 0;
      color: var(--muted2);
      font-size: 12.5px;
      line-height: 1.4;
    }
    .aside__content{ padding: 14px 18px 18px; overflow:auto; }

    .card{
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.14);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h4{
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 900;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .kicker{
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    .card p, .card li{
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      line-height: 1.55;
    }
    .card ul{ margin: 8px 0 0 18px; }
    .note{ font-size: 12px; color: rgba(255,255,255,0.62); line-height: 1.45; }
    .callout{
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      margin: 10px 0;
      color: rgba(255,255,255,0.86);
    }

    /* ============================================================
      UTILITAIRES
    ============================================================ */
    .hidden{ display:none !important; }

    /* ============================================================
      RESPONSIVE — on force “1 colonne” plus tôt (moins chargé)
      ------------------------------------------------------------
      Tu avais dit : "en 110% de zoom je n'ai plus qu'une colonne c'est top"
      -> on déclenche cette UX naturellement sur plus de tailles.
    ============================================================ */
    @media (max-width: 1500px){
      body{ overflow:auto; }
      .app{
        height:auto;
        min-height:100%;
        grid-template-columns: 1fr;
      }
      svg{ width: 980px; }
      .homeGrid{ grid-template-columns: 1fr; }
    }
    @media (max-width: 520px){
      svg{ width: 860px; }
    }
  </style>
</head>

<body class="mode-home">
  <div class="app">

    <!-- ================================
      MAIN (Accueil + Module)
    ================================= -->
    <main class="panel main" aria-label="Contenu">
      <div class="main__header">
        <div class="titleblock">
          <h2 id="mainTitle">Accueil</h2>
          <p id="mainSubtitle">Choisis une catégorie, puis un thème. Ensuite tu es en mode focus (moins chargé).</p>
          <div class="chiprow" id="mainChips"></div>
        </div>
        <div class="chip"><strong>Focus</strong> par module</div>
      </div>

      <!-- TOPBAR (uniquement en module) -->
      <div class="topbar hidden" id="moduleTopbar">
        <div class="topbar__left">
          <button class="btn btn--accent" id="backBtn" type="button">← Retour</button>
          <select id="moduleSelect" aria-label="Changer de thème"></select>
          <span class="progressPill" id="progressPill"><strong>0</strong>/<span>0</span> nœuds vus</span>
        </div>
        <div class="topbar__right">
          <button class="btn" id="zoomOutBtn" type="button">−</button>
          <button class="btn" id="zoomResetBtn" type="button">Zoom 100%</button>
          <button class="btn" id="zoomInBtn" type="button">+</button>
        </div>
      </div>

      <!-- Nœuds (uniquement en module) -->
      <div class="actions hidden" id="actionsBar"></div>

      <div class="canvas">
        <!-- HOME VIEW -->
        <section id="homeView">
          <div class="homeTop">
            <div class="categoryRow" id="categoryRow"></div>
          </div>
          <div class="homeGrid" id="homeGrid"></div>
        </section>

        <!-- MODULE VIEW -->
        <section id="moduleView" class="hidden">
          <div class="svg-wrap">
            <div class="svg-stage" id="diagramHost"></div>
            <div class="diagram-caption" id="diagramCaption"></div>
          </div>
        </section>
      </div>
    </main>

    <!-- ================================
      ASIDE (Explications)
    ================================= -->
    <aside class="panel aside" aria-label="Explications">
      <div class="aside__header">
        <h3 id="detailTitle">Bienvenue</h3>
        <p id="detailHint">Choisis une catégorie puis un thème.</p>
      </div>
      <div class="aside__content" id="detailHost"></div>
    </aside>

  </div>

  <script>
    /* ============================================================
      CONFIG / THEME COLORS
      ------------------------------------------------------------
      ✅ Ajouter un module :
      1) Ajouter entrée dans MODULES
      2) Ajouter son id dans CATEGORIES (ou NAV_ORDER)
      3) (Optionnel) définir couleurs dans THEME_COLORS
    ============================================================ */
    const THEME_COLORS = {
      comfort:    { accent:"#2de2e6", accent2:"#8a5cff" },
      emotions:   { accent:"#38f2a5", accent2:"#2de2e6" },
      empathy:    { accent:"#2de2e6", accent2:"#ff5cd6" },
      addictions: { accent:"#ffb020", accent2:"#ff5cd6" },
      values:     { accent:"#8a5cff", accent2:"#2de2e6" },
      dogmas:     { accent:"#c7a6ff", accent2:"#8a5cff" },
      betrayal:   { accent:"#ff5cd6", accent2:"#8a5cff" },
      abandonment:{ accent:"#2de2e6", accent2:"#38f2a5" },
      rejection:  { accent:"#ffb020", accent2:"#2de2e6" },
      humiliation:{ accent:"#ff5cd6", accent2:"#ffb020" },
      injustice:  { accent:"#8a5cff", accent2:"#ffb020" },
    };

    function setThemeAccent(moduleId){
      const c = THEME_COLORS[moduleId] || { accent:"#2de2e6", accent2:"#8a5cff" };
      document.documentElement.style.setProperty("--accent", c.accent);
      document.documentElement.style.setProperty("--accent2", c.accent2);
    }

    /* ============================================================
      VISITED STATE (localStorage) — pour savoir où tu as déjà cliqué
      - modules : thèmes déjà ouverts
      - nodes   : nœuds déjà consultés (par module)
    ============================================================ */
    const LS_KEY = "fides_training_visited_v2";

    function loadVisited(){
      try{ return JSON.parse(localStorage.getItem(LS_KEY)) || { modules:{}, nodes:{} }; }
      catch{ return { modules:{}, nodes:{} }; }
    }
    function saveVisited(state){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

    let VISITED = loadVisited();

    function markModuleVisited(moduleId){
      VISITED.modules[moduleId] = true;
      saveVisited(VISITED);
      applyVisitedStyles();
    }
    function markNodeVisited(moduleId, nodeId){
      if(!VISITED.nodes[moduleId]) VISITED.nodes[moduleId] = {};
      VISITED.nodes[moduleId][nodeId] = true;
      saveVisited(VISITED);
      applyVisitedStyles();
      updateProgressPill(moduleId);
    }
    function isNodeVisited(moduleId, nodeId){
      return !!(VISITED.nodes[moduleId] && VISITED.nodes[moduleId][nodeId]);
    }

    function applyVisitedStyles(){
      // Home cards (thèmes)
      document.querySelectorAll(".themeCard[data-module]").forEach(card=>{
        card.classList.toggle("is-visited", !!VISITED.modules[card.dataset.module]);
      });

      // Pills nœuds
      document.querySelectorAll(".actionPill[data-node]").forEach(pill=>{
        const nodeId = pill.dataset.node;
        pill.classList.toggle("is-visited", isNodeVisited(currentModuleId, nodeId));
        // petit check visuel
        const check = pill.querySelector(".actionCheck");
        if(check){

      moduleTopbar.classList.remove("hidden");
      actionsBar.classList.remove("hidden");

      // Accent + contenu module
      setThemeAccent(moduleId);

      // Zoom initial "light" (évite l'effet "trop dense")
      setZoom(0.95);

      // select
      moduleSelect.value = moduleId;

      // header
      const mod = MODULES[moduleId];
      mainTitle.textContent = mod.title;
      mainSubtitle.textContent = mod.subtitle;
      mainChips.innerHTML = (mod.tags||[]).map(t=>`<div class="chip">${escapeHTML(t)}</div>`).join("");

      // diagram
      diagramHost.innerHTML = mod.diagram();
      diagramCaption.innerHTML = `<strong>Module :</strong> ${escapeHTML(mod.caption || "")}`;

      // nodes pills
      renderActionsBar(moduleId);

      // wire svg interactions
      wireDiagramInteractions(moduleId);

      // aside detail
      renderDetail(moduleId, "core", false);

      // visited
      markModuleVisited(moduleId);
      applyVisitedStyles();
      updateProgressPill(moduleId);
    }

    function setZoom(v){
      zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, v));
      document.documentElement.style.setProperty("--diagramZoom", zoom);
      zoomResetBtn.textContent = `Zoom ${(zoom*100).toFixed(0)}%`;
    }

    /* ============================================================
      HOME UI
    ============================================================ */
    function renderCategoryButtons(){
      categoryRow.innerHTML = "";

        btn.type = "button";
        btn.dataset.category = cat.id;
        btn.setAttribute("aria-pressed", cat.id === activeCategoryId ? "true" : "false");
        btn.innerHTML = `<span class="categoryDot"></span><span>${escapeHTML(cat.label)}</span>`;

        btn.addEventListener("click", () => {
          activeCategoryId = cat.id;
          // léger feedback couleur au survol catégorie
          // (on garde accent comfort en home)
          setThemeAccent("comfort");
          renderCategoryButtons();
          renderHomeCards(activeCategoryId);
          renderHomeAside();
          applyVisitedStyles();

        categoryRow.appendChild(btn);

    function renderHomeCards(categoryId){

        const mod = MODULES[id];

        const card = document.createElement("div");
        card.className = "themeCard";
        card.dataset.module = id;

        card.addEventListener("mouseenter", () => setThemeAccent(id));
        card.addEventListener("mouseleave", () => setThemeAccent("comfort"));
        card.addEventListener("click", () => enterModule(id));

        card.innerHTML = `
          <h3>${escapeHTML(mod.title)}</h3>
          <p>${escapeHTML(mod.subtitle)}</p>
          <div class="mini">
            ${(mod.tags||[]).slice(0,3).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join("")}

    /* ============================================================
      MODULE UI — pills nodes
    ============================================================ */
    function renderActionsBar(moduleId){
      const mod = MODULES[moduleId];
      const nodeIds = Object.keys(mod.content.nodes)
        .sort((a,b)=> (a==="core" ? -1 : b==="core" ? 1 : a.localeCompare(b)));

      actionsBar.innerHTML = "";
      nodeIds.forEach(nodeId => {
        const label = nodeId === "core" ? "Vue d’ensemble" : (mod.content.nodes[nodeId]?.title || nodeId);

        const btn = document.createElement("button");
        btn.className = "actionPill";
        btn.type = "button";
        btn.dataset.node = nodeId;
        btn.setAttribute("aria-pressed", nodeId==="core" ? "true" : "false");

        btn.innerHTML = `
          <span class="actionDot"></span>
          <span>${escapeHTML(label)}</span>
          <span class="actionCheck"></span>
        `;

        btn.addEventListener("click", () => {
          markNodeVisited(moduleId, nodeId);

          lockedNodeId = (lockedNodeId === nodeId) ? null : nodeId;
          const target = lockedNodeId || "core";

          setActiveNode(target);
          renderDetail(moduleId, target, !!lockedNodeId);
          setPressedAction(target);
        });

        actionsBar.appendChild(btn);
      });
    }

    function setPressedAction(nodeId){
      actionsBar.querySelectorAll(".actionPill").forEach(b=>{
        b.setAttribute("aria-pressed", b.dataset.node === nodeId ? "true" : "false");
      });
    }

    function updateProgressPill(moduleId){
      const mod = MODULES[moduleId];
      const nodeIds = Object.keys(mod.content.nodes);
      const total = nodeIds.length;
      let seen = 0;
      nodeIds.forEach(n => { if(isNodeVisited(moduleId, n)) seen++; });

      // Structure de progressPill : "<strong>0</strong>/<span>0</span> nœuds vus"
      progressPill.querySelector("strong").textContent = String(seen);
      progressPill.querySelector("span").textContent = String(total);
    }

    /* ============================================================
      SVG interactions — hover preview + click lock
    ============================================================ */
    function wireDiagramInteractions(moduleId){
      const svg = diagramHost.querySelector("svg");
      if(!svg) return;

      const nodes = Array.from(svg.querySelectorAll(".node[data-node]"));
      const links = Array.from(svg.querySelectorAll(".link[data-from][data-to]"));

      const activate = (nodeId, isLocked) => {
        setActiveNode(nodeId, svg);
        setActiveLinks(nodeId, links);
        renderDetail(moduleId, nodeId, isLocked);
        setPressedAction(nodeId);
      };

      nodes.forEach(n => {
        const nodeId = n.dataset.node;

        n.addEventListener("mouseenter", () => {
          if(lockedNodeId) return;
          activate(nodeId, false);
        });

        n.addEventListener("mouseleave", () => {
          if(lockedNodeId) return;
          activate("core", false);
        });

        n.addEventListener("click", () => {
          markNodeVisited(moduleId, nodeId);

          lockedNodeId = (lockedNodeId === nodeId) ? null : nodeId;
          activate(lockedNodeId || "core", !!lockedNodeId);
        });

        n.setAttribute("tabindex","0");
        n.setAttribute("role","button");
        n.addEventListener("keydown", (e) => {
          if(e.key === "Enter" || e.key === " "){
            e.preventDefault();
            markNodeVisited(moduleId, nodeId);

            lockedNodeId = (lockedNodeId === nodeId) ? null : nodeId;
            activate(lockedNodeId || "core", !!lockedNodeId);
          }
        });
      });

      setActiveNode("core", svg);
      setActiveLinks("core", links);
    }

    function setActiveNode(nodeId, svgRoot = diagramHost){
      const svg = svgRoot.querySelector ? svgRoot : diagramHost.querySelector("svg");
      if(!svg) return;
      svg.querySelectorAll(".node").forEach(n => n.classList.remove("is-active"));
      const target = svg.querySelector(`.node[data-node="${cssEscape(nodeId)}"]`);
      if(target) target.classList.add("is-active");
      applyVisitedStyles();
    }

    function setActiveLinks(nodeId, links){
      links.forEach(l => l.classList.remove("is-active"));
      links.forEach(l => {
        if(l.dataset.from === nodeId || l.dataset.to === nodeId){
          l.classList.add("is-active");
        }
      });
    }

    /* ============================================================
      ASIDE — texte dynamique
    ============================================================ */
    function renderDetail(moduleId, nodeId, isLocked){
      const mod = MODULES[moduleId];
      const node = mod.content.nodes[nodeId] || mod.content.nodes.core;
      const fidesPoints = (mod.content.fides && mod.content.fides[nodeId]) ? mod.content.fides[nodeId] : [];

      detailTitle.textContent = node.title || "Détail";
      detailHint.textContent = isLocked
        ? "Nœud verrouillé (clic pour déverrouiller)."
        : "Survole pour prévisualiser, clique pour verrouiller.";

      detailHost.innerHTML = "";

      const expl = document.createElement("div");
      expl.className = "card";
      expl.innerHTML = `<h4><span>Explication</span><span class="kicker">${escapeHTML(moduleId)} • ${escapeHTML(nodeId)}</span></h4>`;
      (node.blocks || []).forEach(b => {
        const wrap = document.createElement("div");
        wrap.style.marginBottom = "10px";
        wrap.innerHTML = `<div class="kicker" style="margin-bottom:6px">${escapeHTML(b.h || "")}</div><p>${escapeHTML(b.p || "")}</p>`;
        expl.appendChild(wrap);
      });
      detailHost.appendChild(expl);

      const fides = document.createElement("div");
      fides.className = "card";
      fides.innerHTML = `<h4><span>Points clés FIDES</span><span class="kicker">démo</span></h4>`;
      if(!fidesPoints.length){
        fides.innerHTML += `<p class="note">Aucun point FIDES défini pour ce nœud.</p>`;
      }else{
        const ul = document.createElement("ul");
        fidesPoints.forEach(pt => {
          const li = document.createElement("li");
          li.textContent = pt;
          ul.appendChild(li);
        });
        fides.appendChild(ul);
      }
      detailHost.appendChild(fides);

      const help = document.createElement("div");
      help.className = "card";
      help.innerHTML = `
        <h4><span>Repères</span><span class="kicker">UX</span></h4>
        <p class="note">
          ✓ = déjà exploré • Survol = aperçu • Clic = verrouille • Zoom = lisibilité.
        </p>
      `;
      detailHost.appendChild(help);
    }

    /* ============================================================
      HELPERS
    ============================================================ */
    function escapeHTML(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function cssEscape(s){ return String(s).replace(/"/g, '\\"'); }
