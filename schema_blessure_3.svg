<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1400" width="1600" height="1400" role="img" aria-labelledby="title desc" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title id="title">Comportements observables — ouverture de conscience — reconnexion</title>
  <desc id="desc">
    Mandala pédagogique simple présentant le passage des comportements visibles à l’ouverture de conscience puis à la reconnexion.
  </desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <style>
      .bg { fill: rgb(235, 229, 216); }
    .panel { fill: rgba(255,255,255,0.95); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
    .card { fill: rgba(255,255,255,0.98); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
    .soft { fill: rgba(190,43,86,0.10); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
    .ring { fill: none; stroke: rgba(190,43,86,0.10); stroke-width: 2; }
    .connector { stroke: rgba(190,43,86,0.24); stroke-width: 4; fill: none; stroke-linecap: round; }
    .title { font-family: Georgia, &quot;Times New Roman&quot;, serif; font-size: 50px; font-weight: 700; fill: rgb(190,43,86); }
    .subtitle { font-family: ui-sans-serif, system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif; font-size: 20px; fill: rgba(0,0,0,0.62); }
    .centerTitle { font-family: Georgia, &quot;Times New Roman&quot;, serif; font-size: 40px; font-weight: 700; fill: rgb(190,43,86); }
    .centerText { font-family: ui-sans-serif, system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif; font-size: 21px; fill: rgba(0,0,0,0.86); }
    .cardTitle { font-family: Georgia, &quot;Times New Roman&quot;, serif; font-size: 28px; font-weight: 700; fill: rgb(190,43,86); }
    .pill { font-family: ui-sans-serif, system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: rgba(190,43,86,0.88); }
    .body { font-family: ui-sans-serif, system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif; font-size: 20px; fill: rgba(0,0,0,0.86); }
    .small { font-family: ui-sans-serif, system-ui, -apple-system, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif; font-size: 18px; fill: rgba(0,0,0,0.72); }
    .dot { fill: rgb(190,43,86); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="1310"/>
  <rect class="panel" x="70" y="55" width="1460" height="1200" rx="34" filter="url(#shadow)"/>
  <text x="800" y="132" text-anchor="middle" class="title">Chemin de transformation</text>
  <text x="800" y="167" text-anchor="middle" class="subtitle">Du comportement visible à la reconnexion</text>
  <circle class="ring" cx="800" cy="695" r="398"/>
  <circle class="soft" cx="800" cy="695" r="218" filter="url(#shadow)"/>
  <circle class="card" cx="800" cy="695" r="156"/>
  <text x="800" y="647" text-anchor="middle" class="centerTitle">
  <tspan x="800" y="647">Voir ce qui</tspan>
  <tspan x="800" y="692">s’active</tspan>
</text>
  <text x="800" y="748" text-anchor="middle" class="centerText">
  <tspan x="800" y="748">La conscience remplace</tspan>
  <tspan x="800" y="779">peu à peu l’automatisme</tspan>
</text>
<!--Haut-->
  <rect class="card" x="530" y="176" width="540" height="334" rx="34" filter="url(#shadow)"/>
  <text x="800" y="238" text-anchor="middle" class="cardTitle">
  <tspan x="800" y="218">Comportements</tspan>
  <tspan x="800" y="252">observables</tspan>
</text>
  <rect class="soft" x="657" y="274" width="286" height="42" rx="21"/>
  <text x="800" y="301" text-anchor="middle" class="pill">Ce que l’on voit au quotidien</text>
  <circle class="dot" cx="588" cy="348" r="5"/>
  <text x="610" y="356" class="body">Contrôle, retrait, sacrifice</text>
  <circle class="dot" cx="588" cy="393" r="5"/>
  <text x="610" y="401" class="body">
  <tspan x="610" y="401">Le comportement protège</tspan>
  <tspan x="610" y="428">d’une émotion ou d’une peur</tspan>
</text>
  <circle class="dot" cx="588" cy="447" r="5"/>
  <text x="610" y="445" class="body">
  <tspan x="610" y="465">Une croyance lui donne</tspan>
  <tspan x="610" y="492">sa logique intérieure</tspan>
</text>
  <!--Bas gauche-->
  <rect class="card" x="155" y="750" width="505" height="352" rx="34" filter="url(#shadow)"/>
  <text x="408" y="812" text-anchor="middle" class="cardTitle">
    <tspan x="408" y="792">Ouverture</tspan>
    <tspan x="408" y="826">de conscience</tspan>
  </text>
  <rect class="soft" x="272" y="848" width="272" height="42" rx="21"/>
  <text x="408" y="875" text-anchor="middle" class="pill">Voir ce que l’on nourrit</text>
  <circle class="dot" cx="214" cy="940" r="5"/>
  <text x="236" y="948" class="body">Reconnaître la blessure active</text>
  <circle class="dot" cx="214" cy="1000" r="5"/>
  <text x="236" y="1008" class="body">
    <tspan x="236" y="1008">Comprendre croyances</tspan>
    <tspan x="236" y="1035">et mécanismes anciens</tspan>
  </text>
  <circle class="dot" cx="214" cy="1070" r="5"/>
  <text x="236" y="1078" class="body">Passer de la fermeture à la clarté</text>

  <!--Bas droite-->
  <rect class="card" x="940" y="750" width="505" height="352" rx="34" filter="url(#shadow)"/>
  <text x="1192" y="812" text-anchor="middle" class="cardTitle">
    <tspan x="1192" y="792">Chemin</tspan>
    <tspan x="1192" y="826">de reconnexion</tspan>
  </text>
  <rect class="soft" x="1051" y="848" width="282" height="42" rx="21"/>
  <text x="1192" y="875" text-anchor="middle" class="pill">Revenir à soi et à la vie</text>
  <circle class="dot" cx="998" cy="940" r="5"/>
  <text x="1020" y="948" class="body">Présence, discernement, stabilité</text>
  <circle class="dot" cx="998" cy="1000" r="5"/>
  <text x="1020" y="1008" class="body">
    <tspan x="1020" y="1008">Relation plus consciente</tspan>
    <tspan x="1020" y="1035">à soi, à l’autre et au vécu</tspan>
  </text>
  <circle class="dot" cx="998" cy="1070" r="5"/>
  <text x="1020" y="1078" class="body">Porte d’entrée vers l’expansion</text>
  <rect class="soft" x="245" y="1122" width="1110" height="96" rx="28"/>
  <text x="800" y="1170" text-anchor="middle" class="centerText">Voir • Comprendre • Se reconnecter</text>
  <text x="800" y="1203" text-anchor="middle" class="small">Le comportement visible devient une porte d’accès à la transformation</text>
</svg>
