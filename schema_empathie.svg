<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Schéma de l’empathie</title>
  <desc id="desc">Schéma pédagogique de l’empathie avec une voie juste et une voie blessée.</desc>

  <defs>
    <marker id="arrow" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 z" fill="#BE2B56"></path>
    </marker>
    <style>
      .title{font:700 40px Georgia, 'Times New Roman', serif; fill:#BE2B56}
      .subtitle{font:500 21px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#5B4A4F}
      .h{font:700 28px Georgia, 'Times New Roman', serif; fill:#BE2B56}
      .h2{font:700 24px Georgia, 'Times New Roman', serif; fill:#BE2B56}
      .t{font:500 22px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#231F20}
      .m{font:600 19px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#5C5053}
      .footer{font:600 18px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#6B5B60}
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#EBE5D8"></rect>

  <text x="800" y="72" text-anchor="middle" class="title">L’empathie</text>
  <text x="800" y="104" text-anchor="middle" class="subtitle">Ressentir, comprendre, accueillir — sans se confondre avec l’autre</text>

  <!-- Cards -->
  <rect x="80" y="185" width="290" height="270" rx="28" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>
  <rect x="1220" y="185" width="310" height="270" rx="28" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>

  <rect x="610" y="215" width="380" height="210" rx="34" fill="#F8E3EA" stroke="#C97B94" stroke-width="3"></rect>
  <rect x="680" y="145" width="240" height="58" rx="18" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>
  <rect x="450" y="210" width="220" height="58" rx="18" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>
  <rect x="930" y="210" width="220" height="58" rx="18" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>
  <rect x="650" y="437" width="300" height="58" rx="18" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>

  <rect x="560" y="585" width="480" height="105" rx="26" fill="#F3CCD8" stroke="#C97B94" stroke-width="3"></rect>

  <rect x="120" y="770" width="340" height="145" rx="22" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>
  <rect x="470" y="770" width="300" height="145" rx="22" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>
  <rect x="830" y="770" width="300" height="145" rx="22" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>
  <rect x="1140" y="770" width="340" height="145" rx="22" fill="#FFFFFF" stroke="#D8B5C0" stroke-width="2"></rect>

  <!-- Connectors -->
  <line x1="370" y1="360" x2="610" y2="360" stroke="#BE2B56" stroke-width="5" marker-end="url(#arrow)"></line>
  <line x1="990" y1="360" x2="1220" y2="360" stroke="#BE2B56" stroke-width="5" marker-end="url(#arrow)"></line>

  <line x1="800" y1="203" x2="800" y2="215" stroke="#BE2B56" stroke-width="3"></line>
  <line x1="670" y1="232" x2="708" y2="258" stroke="#BE2B56" stroke-width="3"></line>
  <line x1="930" y1="232" x2="892" y2="258" stroke="#BE2B56" stroke-width="3"></line>
  <line x1="800" y1="425" x2="800" y2="437" stroke="#BE2B56" stroke-width="3"></line>

  <line x1="800" y1="495" x2="800" y2="581" stroke="#BE2B56" stroke-width="5" marker-end="url(#arrow)"></line>

  <line x1="800" y1="690" x2="290" y2="770" stroke="#BE2B56" stroke-width="4" marker-end="url(#arrow)"></line>
  <line x1="800" y1="690" x2="620" y2="770" stroke="#BE2B56" stroke-width="4" marker-end="url(#arrow)"></line>
  <line x1="800" y1="690" x2="980" y2="770" stroke="#BE2B56" stroke-width="4" marker-end="url(#arrow)"></line>
  <line x1="800" y1="690" x2="1310" y2="770" stroke="#BE2B56" stroke-width="4" marker-end="url(#arrow)"></line>

  <!-- Left card -->
  <text x="225" y="240" text-anchor="middle" class="h">Vécu de l’autre</text>
  <text x="225" y="290" text-anchor="middle" class="t">Émotion</text>
  <text x="225" y="330" text-anchor="middle" class="t">Parole</text>
  <text x="225" y="370" text-anchor="middle" class="t">Silence</text>
  <text x="225" y="410" text-anchor="middle" class="t">Besoin</text>

  <!-- Center -->
  <text x="800" y="292" text-anchor="middle" class="title" style="font-size:30px">Présence empathique</text>
  <text x="800" y="324" text-anchor="middle" class="m">Résonance sans fusion</text>
  <text x="800" y="356" text-anchor="middle" class="m">Présence ancrée</text>

  <text x="800" y="182" text-anchor="middle" class="h2">Ressentir</text>
  <text x="560" y="247" text-anchor="middle" class="h2">Comprendre</text>
  <text x="1040" y="247" text-anchor="middle" class="h2">Accueillir</text>
  <text x="800" y="474" text-anchor="middle" class="h2">Rester à sa place</text>

  <!-- Right card -->
  <text x="1375" y="240" text-anchor="middle" class="h">Ce que l’autre reçoit</text>
  <text x="1375" y="290" text-anchor="middle" class="t">Écoute vraie</text>
  <text x="1375" y="330" text-anchor="middle" class="t">Reconnaissance</text>
  <text x="1375" y="370" text-anchor="middle" class="t">Espace</text>
  <text x="1375" y="410" text-anchor="middle" class="t">Liberté d’être</text>

  <!-- Filter -->
  <text x="680" y="534" text-anchor="middle" class="m">Si une blessure s’active…</text>
  <text x="800" y="628" text-anchor="middle" class="h">Filtre blessé</text>
  <text x="800" y="664" text-anchor="middle" class="m">La souffrance colore l’écoute et déplace la relation</text>

  <!-- Bottom cards -->
  <text x="290" y="812" text-anchor="middle" class="h2">Sauver trop vite</text>
  <text x="290" y="846" text-anchor="middle" class="t" style="font-size:18px">Porter, réparer,</text>
  <text x="290" y="874" text-anchor="middle" class="t" style="font-size:18px">Choisir à la place</text>

  <text x="620" y="800" text-anchor="middle" class="h2">Contrôler</text>
  <text x="620" y="834" text-anchor="middle" class="t" style="font-size:18px">Orienter, insister,</text>
  <text x="620" y="860" text-anchor="middle" class="t" style="font-size:18px">Croire savoir</text>
  <text x="620" y="886" text-anchor="middle" class="t" style="font-size:18px">Pour l’autre</text>

  <text x="980" y="800" text-anchor="middle" class="h2">Absorber</text>
  <text x="980" y="834" text-anchor="middle" class="t" style="font-size:18px">Être envahi,</text>
  <text x="980" y="860" text-anchor="middle" class="t" style="font-size:18px">Basculer dans</text>
  <text x="980" y="886" text-anchor="middle" class="t" style="font-size:18px">Son propre vécu</text>

  <text x="1310" y="812" text-anchor="middle" class="h2">Ramener à soi</text>
  <text x="1310" y="846" text-anchor="middle" class="t" style="font-size:18px">Décentrer l’écoute,</text>
  <text x="1310" y="874" text-anchor="middle" class="t" style="font-size:18px">Revenir à son histoire</text>

  <text x="800" y="948" text-anchor="middle" class="footer">Quand l’empathie se trouble, la relation glisse plus facilement vers le sauvetage, le contrôle ou la victimisation.</text>
</svg>