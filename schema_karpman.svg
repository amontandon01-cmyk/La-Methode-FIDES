<svg viewBox="0 0 1200 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Triangle de Karpman et blessures émotionnelles</title>
  <desc id="desc">Schéma pédagogique liant Victime, Sauveur et Persécuteur aux blessures émotionnelles.</desc>

  <defs>
    <style>
      .bg { fill: rgb(235, 229, 216); }
      .card { fill: rgba(255,255,255,0.98); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
      .soft { fill: rgba(190,43,86,0.10); stroke: rgba(190,43,86,0.14); stroke-width: 2; }
      .line { stroke: rgb(190,43,86); stroke-width: 3; fill: none; opacity: 0.85; }
      .accent { fill: rgb(190,43,86); }
      .title { font: 700 34px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: rgb(190,43,86); }
      .subtitle { font: 500 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: rgba(0,0,0,0.62); }
      .role { font: 700 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: rgb(190,43,86); }
      .body { font: 400 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: rgb(0,0,0); }
      .small { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: rgba(0,0,0,0.62); }
      .center { text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="980" rx="32"></rect>

  <!-- Titre -->
  <text x="600" y="60" class="title center">Le triangle de Karpman</text>
  <text x="600" y="98" class="subtitle center">Repérer les dynamiques relationnelles de survie</text>

  <!-- Bloc haut -->
  <rect class="card" x="360" y="130" width="480" height="90" rx="24"></rect>
  <text x="600" y="165" class="role center" style="font-size:24px;">Blessure activée dans le lien</text>
  <text x="600" y="195" class="small center">Une douleur émotionnelle influence la posture relationnelle</text>

  <!-- Triangle -->
  <path class="line" d="M 300 340 Q 600 250 900 340"></path>
  <path class="line" d="M 300 340 Q 450 620 600 730"></path>
  <path class="line" d="M 900 340 Q 750 620 600 730"></path>

  <!-- Rôle Victime -->
  <rect class="card" x="150" y="225" width="300" height="180" rx="28"></rect>
  <text x="300" y="265" class="role center">Victime</text>
  <text x="300" y="297" class="body center">Rejet → victime silencieuse</text>
  <text x="300" y="325" class="small center">retrait • fermeture • repli</text>
  <text x="300" y="353" class="body center">Abandon → victime exprimée</text>
  <text x="300" y="381" class="small center">manque de lien • insécurité</text>

  <!-- Rôle Persécuteur -->
  <rect class="card" x="750" y="225" width="300" height="180" rx="28"></rect>
  <text x="900" y="265" class="role center">Persécuteur</text>
  <text x="900" y="297" class="body center">Trahison → contrôlant</text>
  <text x="900" y="325" class="small center">juge communicant • reprise de pouvoir</text>
  <text x="900" y="353" class="body center">Injustice → rigide</text>
  <text x="900" y="381" class="small center">juge silencieux • froideur</text>

  <!-- Centre -->
  <rect class="soft" x="360" y="410" width="480" height="110" rx="28"></rect>
  <text x="600" y="448" class="role center" style="font-size:22px;">Le rôle visible protège</text>
  <text x="600" y="478" class="role center" style="font-size:22px;">souvent une douleur plus profonde</text>

  <!-- Sauveur -->
  <rect class="card" x="330" y="620" width="540" height="180" rx="30"></rect>
  <text x="600" y="660" class="role center">Sauveur</text>
  <text x="600" y="695" class="body center">Humiliation → sauveur sacrificiel</text>
  <text x="600" y="722" class="small center">oubli de soi • sacrifice • suradaptation • portage</text>
  <text x="600" y="755" class="body center">Trahison → sauveur stratégique possible</text>
  <text x="600" y="782" class="small center">réparation apparente • reprise de contrôle déguisée</text>

  <!-- Sortie -->
  <rect class="card" x="150" y="850" width="900" height="85" rx="24"></rect>
  <text x="600" y="878" class="role center" style="font-size:22px;">Sortie du triangle relationnel</text>
  <text x="600" y="907" class="small center">Repérer la posture → reconnaître la blessure → accueillir l’émotion → revenir à une posture consciente</text>
</svg>