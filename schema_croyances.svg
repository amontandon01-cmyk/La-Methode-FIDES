<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
<title id="title">Schéma des pensées et croyances limitantes</title>
<desc id="desc">Schéma pédagogique montrant le passage de la fermeture à l’ouverture : construction de la croyance limitante, prise de conscience, puis croyance expansive et choix ajusté.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.08)"></feDropShadow>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="rgb(190, 43, 86)"></path>
  </marker>
  <style>
    .title { font-family: Georgia, 'Times New Roman', serif; font-size: 34px; font-weight: 700; fill: rgb(190, 43, 86); }
    .subtitle { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; fill: rgba(0,0,0,0.62); }
    .section { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.18em; fill: rgb(190, 43, 86); text-transform: uppercase; }
    .boxTitle { font-family: Georgia, 'Times New Roman', serif; font-size: 19px; font-weight: 700; fill: rgb(190, 43, 86); }
    .boxText { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: rgba(0,0,0,0.82); }
    .small { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12.6px; fill: rgba(0,0,0,0.62); }
    .pill { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.12em; fill: rgb(190, 43, 86); }
  </style>
</defs>
<rect x="18" y="18" width="1364" height="944" rx="28" fill="rgb(235, 229, 216)" stroke="rgba(190, 43, 86, 0.14)"></rect>
<text x="700.0" y="78" text-anchor="middle" class="title">Du filtre intérieur à l’ouverture consciente</text>
<text x="700.0" y="108" text-anchor="middle" class="subtitle">Une pensée traverse l’esprit, une croyance s’installe dans l’être, puis oriente ce que la personne voit, s’autorise et répète.</text>

<rect x="150" y="136" width="1100" height="82" rx="22" fill="rgba(255,255,255,0.98)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="700" y="166" text-anchor="middle" class="section">Point de départ</text>
<text x="700" y="194" text-anchor="middle" class="boxTitle" style="font-size: 22px;">Expérience marquante • émotion forte • blessure active</text>
<text x="80" y="258" class="section">Fermeture</text>
<text x="900" y="258" class="section">Ouverture</text>
<rect x="80" y="278" width="420" height="90" rx="20" fill="rgba(190, 43, 86, 0.10)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="104" y="308" class="boxTitle">Pensée limitante</text>
<text x="104" y="332" class="boxText"><tspan x="104" dy="0">Elle surgit dans l’instant, influence le ressenti</tspan><tspan x="104" dy="18">immédiat et oriente la réaction.</tspan></text>
<rect x="80" y="384" width="420" height="90" rx="20" fill="rgba(190, 43, 86, 0.10)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="104" y="414" class="boxTitle">Croyance limitante</text>
<text x="104" y="438" class="boxText"><tspan x="104" dy="0">Elle s’ancre plus profondément et devient une vérité</tspan><tspan x="104" dy="18">intérieure durable.</tspan></text>
<rect x="80" y="490" width="420" height="90" rx="20" fill="rgba(190, 43, 86, 0.10)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="104" y="520" class="boxTitle">Filtre intérieur</text>
<text x="104" y="544" class="boxText"><tspan x="104" dy="0">La carte du monde sélectionne, interprète et confirme</tspan><tspan x="104" dy="18">ce qui semble déjà vrai.</tspan></text>
<rect x="80" y="590" width="420" height="100" rx="20" fill="rgba(190, 43, 86, 0.10)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="104" y="622" class="boxTitle">Autorisation intérieure et protection</text>
<text x="104" y="646" class="boxText"><tspan x="104" dy="0">La croyance rend cohérents la fuite, le contrôle, la</tspan><tspan x="104" dy="18">suradaptation, l’effacement, l’hypervigilance,</tspan><tspan x="104" dy="18">l’exigence ou le sacrifice.</tspan></text>
<rect x="80" y="702" width="420" height="90" rx="20" fill="rgba(255,255,255,0.98)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="104" y="732" class="boxTitle">Renforcement du schéma</text>
<text x="104" y="756" class="boxText"><tspan x="104" dy="0">La répétition mentale, les réactions et les</tspan><tspan x="104" dy="18">confirmations nourrissent encore la croyance.</tspan></text>
<rect x="900" y="278" width="420" height="90" rx="20" fill="rgb(245, 239, 227)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="924" y="308" class="boxTitle">Repérage et accueil du vécu</text>
<text x="924" y="332" class="boxText"><tspan x="924" dy="0">La personne reconnaît la pensée, la croyance,</tspan><tspan x="924" dy="18">l’émotion présente et la blessure active.</tspan></text>
<rect x="900" y="384" width="420" height="90" rx="20" fill="rgb(245, 239, 227)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="924" y="414" class="boxTitle">Compréhension de la fonction</text>
<text x="924" y="438" class="boxText"><tspan x="924" dy="0">Elle voit que cette croyance l’a aidée à tenir, à se</tspan><tspan x="924" dy="18">protéger ou à avancer jusqu’ici.</tspan></text>
<rect x="900" y="490" width="420" height="90" rx="20" fill="rgb(245, 239, 227)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="924" y="520" class="boxTitle">Mise en lumière et libération</text>
<text x="924" y="544" class="boxText"><tspan x="924" dy="0">Elle comprend ce qu’elle s’est autorisé à vivre, puis</tspan><tspan x="924" dy="18">choisit de ne plus nourrir ce schéma.</tspan></text>
<rect x="900" y="596" width="420" height="90" rx="20" fill="rgba(255,255,255,0.98)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="924" y="626" class="boxTitle">Croyance expansive</text>
<text x="924" y="650" class="boxText"><tspan x="924" dy="0">Une lecture plus vaste, plus souple et plus vivante</tspan><tspan x="924" dy="18">devient possible.</tspan></text>
<rect x="900" y="702" width="420" height="90" rx="20" fill="rgba(255,255,255,0.98)" stroke="rgba(190, 43, 86, 0.14)" filter="url(#shadow)"></rect>
<text x="924" y="732" class="boxTitle">Choix ajusté et ouverture</text>
<text x="924" y="756" class="boxText"><tspan x="924" dy="0">La personne agit avec plus de conscience, de justesse,</tspan><tspan x="924" dy="18">de liberté et de responsabilité.</tspan></text>

<rect x="528" y="270" width="342" height="576" rx="26" fill="rgba(255,255,255,0.98)" stroke="rgb(190, 43, 86)" stroke-width="1.4" filter="url(#shadow)"></rect>
<text x="700.0" y="308" text-anchor="middle" class="section">Pivot</text>
<text x="700.0" y="342" text-anchor="middle" class="boxTitle" style="font-size: 21px;">Prise de conscience</text>
<text x="700.0" y="370" text-anchor="middle" class="small">La guérison débute lorsque la dynamique devient visible</text>

<rect x="568" y="396" width="264" height="62" rx="18" fill="rgb(245, 239, 227)" stroke="rgba(190, 43, 86, 0.14)"></rect>
<text x="700.0" y="422" text-anchor="middle" class="pill">REPÉRER</text>
<text x="700.0" y="442" text-anchor="middle" class="boxText">La pensée qui traverse l’esprit</text>

<rect x="568" y="474" width="264" height="62" rx="18" fill="rgb(245, 239, 227)" stroke="rgba(190, 43, 86, 0.14)"></rect>
<text x="700.0" y="500" text-anchor="middle" class="pill">RECONNAÎTRE</text>
<text x="700.0" y="520" text-anchor="middle" class="boxText">La croyance qui habite l’être</text>

<rect x="568" y="552" width="264" height="62" rx="18" fill="rgb(245, 239, 227)" stroke="rgba(190, 43, 86, 0.14)"></rect>
<text x="700.0" y="578" text-anchor="middle" class="pill">IDENTIFIER</text>
<text x="700.0" y="598" text-anchor="middle" class="boxText">L’émotion présente et la blessure active</text>

<rect x="568" y="630" width="264" height="62" rx="18" fill="rgb(245, 239, 227)" stroke="rgba(190, 43, 86, 0.14)"></rect>
<text x="700.0" y="656" text-anchor="middle" class="pill">COMPRENDRE</text>
<text x="700.0" y="676" text-anchor="middle" class="boxText">Le sens du comportement et sa fonction</text>

<rect x="568" y="708" width="264" height="112" rx="18" fill="rgba(190, 43, 86, 0.10)" stroke="rgba(190, 43, 86, 0.14)"></rect>
<text x="700.0" y="736" text-anchor="middle" class="pill">BASCULE</text>
<text x="700.0" y="758" text-anchor="middle" class="boxText">La personne voit que cette croyance</text>
<text x="700.0" y="778" text-anchor="middle" class="boxText">a eu une fonction, puis choisit</text>
<text x="700.0" y="798" text-anchor="middle" class="boxText">de ne plus la nourrir.</text>

<line x1="350" y1="218" x2="290" y2="260" stroke="rgb(190, 43, 86)" stroke-width="2.4" marker-end="url(#arrow)"></line>
<line x1="700" y1="218" x2="700" y2="256" stroke="rgb(190, 43, 86)" stroke-width="2.4" marker-end="url(#arrow)"></line>
<line x1="1050" y1="218" x2="1110" y2="262" stroke="rgb(190, 43, 86)" stroke-width="2.4" marker-end="url(#arrow)"></line>

<line x1="500" y1="747" x2="525" y2="747" stroke="rgb(190, 43, 86)" stroke-width="2.4" marker-end="url(#arrow)"></line>
<line x1="870" y1="747" x2="898" y2="747" stroke="rgb(190, 43, 86)" stroke-width="2.4" marker-end="url(#arrow)"></line>

<line x1="270" y1="792" x2="290" y2="870" stroke="rgb(190, 43, 86)" stroke-width="1" marker-end="url(#arrow)"></line>
<line x1="1100" y1="792" x2="1080" y2="870" stroke="rgb(190, 43, 86)" stroke-width="1" marker-end="url(#arrow)"></line>

<rect x="110" y="872" width="1180" height="54" rx="20" fill="rgba(255,255,255,0.98)" stroke="rgba(190, 43, 86, 0.14)"></rect>
<text x="700" y="895" text-anchor="middle" class="section">Clé de lecture</text>
<text x="700" y="916" text-anchor="middle" class="boxText">Ce n’est pas l’événement seul qui détermine la réaction : c’est la lecture intérieure qui s’active, la croyance qu’elle nourrit, puis le comportement qu’elle autorise.</text>
</svg>