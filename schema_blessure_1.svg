<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" width="1600" height="1600" role="img" aria-labelledby="title desc">
<title id="title">Blessures émotionnelles</title>
<desc id="desc">Mandala pédagogique sur l’activation des blessures émotionnelles.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.10)"/>
  </filter>
  <style>
    .bg { fill: rgb(235, 229, 216); }
    .panel { fill: rgba(255,255,255,0.94); stroke: rgba(190, 43, 86, 0.14); stroke-width: 2; }
    .card { fill: rgba(255,255,255,0.98); stroke: rgba(190, 43, 86, 0.14); stroke-width: 2; }
    .soft { fill: rgba(190, 43, 86, 0.10); stroke: rgba(190, 43, 86, 0.14); stroke-width: 2; }
    .ring { fill: none; stroke: rgba(190,43,86,0.10); stroke-width: 2; }
    .connector { fill: none; stroke: rgba(190,43,86,0.18); stroke-width: 2; }
    .title { font-family: Georgia, "Times New Roman", serif; font-size: 50px; font-weight: 700; fill: rgb(190, 43, 86); }
    .subtitle { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 20px; fill: rgba(0,0,0,0.62); }
    .petalTitle { font-family: Georgia, "Times New Roman", serif; font-size: 28px; font-weight: 700; fill: rgb(190, 43, 86); }
    .petalText { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; line-height: 1.4; fill: rgba(0,0,0,0.86); }
    .centerTitle { font-family: Georgia, "Times New Roman", serif; font-size: 44px; font-weight: 700; fill: rgb(190, 43, 86); }
    .centerSub { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 21px; fill: rgba(0,0,0,0.86); }
    .miniTitle { font-family: Georgia, "Times New Roman", serif; font-size: 24px; font-weight: 700; fill: rgb(190, 43, 86); }
    .miniText { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 18px; fill: rgba(0,0,0,0.86); }
  </style>
</defs>

<rect class="bg" x="0" y="0" width="1600" height="1600" rx="0"/>
<rect class="panel" x="70" y="56" width="1460" height="1488" rx="34" filter="url(#shadow)"/>

<text x="800" y="135" text-anchor="middle" class="title">Blessures émotionnelles</text>
<text x="800" y="170" text-anchor="middle" class="subtitle">Mandala de lecture</text>

<circle class="ring" cx="800" cy="800" r="470"/>
<circle class="ring" cx="800" cy="800" r="310"/>

<line class="connector" x1="800.0" y1="625.0" x2="800.0" y2="480.0"/>
<line class="connector" x1="951.6" y1="712.5" x2="1077.1" y2="640.0"/>
<line class="connector" x1="951.6" y1="887.5" x2="1077.1" y2="960.0"/>
<line class="connector" x1="800.0" y1="975.0" x2="800.0" y2="1120.0"/>
<line class="connector" x1="648.4" y1="887.5" x2="522.9" y2="960.0"/>
<line class="connector" x1="648.4" y1="712.5" x2="522.9" y2="640.0"/>
<rect class="card" x="605.0" y="255.0" width="390" height="250" rx="34" filter="url(#shadow)"/>
<text x="800.0" y="313.0" text-anchor="middle" class="petalTitle">Présent</text>
<text x="800.0" y="355.0" text-anchor="middle" class="petalText"><tspan x="800.0" y="355.0">Une parole, un silence,</tspan><tspan x="800.0" y="383.0">un ton, un regard, un geste,</tspan><tspan x="800.0" y="411.0">un imprévu ou une absence</tspan><tspan x="800.0" y="439.0">réveille quelque chose.</tspan></text>
<rect class="card" x="968.7" y="465.0" width="390" height="250" rx="34" filter="url(#shadow)"/>
<text x="1163.7" y="523.0" text-anchor="middle" class="petalTitle">Activation</text>
<text x="1163.7" y="565.0" text-anchor="middle" class="petalText"><tspan x="1163.7306695894642" y="565.0">La situation touche une</tspan><tspan x="1163.7306695894642" y="593.0">douleur déjà inscrite.</tspan><tspan x="1163.7306695894642" y="621.0">La réaction devient plus</tspan><tspan x="1163.7306695894642" y="649.0">forte que l’instant.</tspan></text>
<rect class="card" x="968.7" y="885.0" width="390" height="250" rx="34" filter="url(#shadow)"/>
<text x="1163.7" y="943.0" text-anchor="middle" class="petalTitle">Émotion</text>
<text x="1163.7" y="985.0" text-anchor="middle" class="petalText"><tspan x="1163.7306695894642" y="985.0">L’émotion monte,</tspan><tspan x="1163.7306695894642" y="1013.0">se bloque ou déborde.</tspan><tspan x="1163.7306695894642" y="1041.0">Elle peut rester mal</tspan><tspan x="1163.7306695894642" y="1069.0">identifiée.</tspan></text>
<rect class="card" x="605.0" y="1095.0" width="390" height="250" rx="34" filter="url(#shadow)"/>
<text x="800.0" y="1153.0" text-anchor="middle" class="petalTitle">Croyance</text>
<text x="800.0" y="1195.0" text-anchor="middle" class="petalText"><tspan x="800.0" y="1195.0">La blessure nourrit une</tspan><tspan x="800.0" y="1223.0">croyance limitante qui</tspan><tspan x="800.0" y="1251.0">donne du sens à ce qui est</tspan><tspan x="800.0" y="1279.0">vécu.</tspan></text>
<rect class="card" x="241.3" y="885.0" width="390" height="250" rx="34" filter="url(#shadow)"/>
<text x="436.3" y="943.0" text-anchor="middle" class="petalTitle">Protection</text>
<text x="436.3" y="985.0" text-anchor="middle" class="petalText"><tspan x="436.26933041053576" y="985.0">La personne cherche à</tspan><tspan x="436.26933041053576" y="1013.0">préserver sa cohérence</tspan><tspan x="436.26933041053576" y="1041.0">et à éviter une ancienne</tspan><tspan x="436.26933041053576" y="1069.0">douleur.</tspan></text>
<rect class="card" x="241.3" y="465.0" width="390" height="250" rx="34" filter="url(#shadow)"/>
<text x="436.3" y="523.0" text-anchor="middle" class="petalTitle">Comportement</text>
<text x="436.3" y="565.0" text-anchor="middle" class="petalText"><tspan x="436.2693304105358" y="565.0">Retrait, silence,</tspan><tspan x="436.2693304105358" y="593.0">rigidité, contrôle,</tspan><tspan x="436.2693304105358" y="621.0">manipulation, sacrifice</tspan><tspan x="436.2693304105358" y="649.0">ou suradaptation.</tspan></text>

<circle class="soft" cx="800" cy="800" r="185" filter="url(#shadow)"/>
<circle class="card" cx="800" cy="800" r="130"/>
<text x="800" y="780" text-anchor="middle" class="centerTitle">Blessure</text>
<text x="800" y="828" text-anchor="middle" class="centerTitle">émotionnelle</text>
<text x="800" y="878" text-anchor="middle" class="centerSub"><tspan x="800" y="878">Une douleur plus ancienne</tspan><tspan x="800" y="906">colore le présent</tspan></text>

<rect class="card" x="230.0" y="1280" width="360" height="140" rx="26"/>
<text x="410.0" y="1326" text-anchor="middle" class="miniTitle">Toutes existent</text>
<text x="410.0" y="1358" text-anchor="middle" class="miniText"><tspan x="410.0" y="1358">Chaque être humain porte</tspan><tspan x="410.0" y="1382">les différentes blessures.</tspan></text>
<rect class="card" x="620.0" y="1320" width="360" height="140" rx="26"/>
<text x="800.0" y="1366" text-anchor="middle" class="miniTitle">Prédominance</text>
<text x="800.0" y="1398" text-anchor="middle" class="miniText"><tspan x="800.0" y="1398">Une ou deux blessures</tspan><tspan x="800.0" y="1422">colorent davantage la</tspan><tspan x="800.0" y="1446">personnalité.</tspan></text>
<rect class="card" x="1010.0" y="1280" width="360" height="140" rx="26"/>
<text x="1190.0" y="1326" text-anchor="middle" class="miniTitle">Lecture du monde</text>
<text x="1190.0" y="1358" text-anchor="middle" class="miniText"><tspan x="1190.0" y="1358">Deux personnes peuvent</tspan><tspan x="1190.0" y="1382">vivre la même scène</tspan><tspan x="1190.0" y="1406">très différemment.</tspan></text>
</svg>